      ctx.beginPath(); ctx.moveTo(-s*0.15, -s*0.12); ctx.lineTo(-s*0.05, s*0.02); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s*0.02, -s*0.18); ctx.lineTo(s*0.10, -s*0.06); ctx.stroke();
      break;
    }

    // ── T2: CRYSTAL FANG — ice-blue shimmer, flash at tip ───────────
    case 2: {
      const sh = 0.6 + 0.4 * Math.sin(ts * 0.012);
      ctx.globalAlpha = 1;
      ctx.fillText('⛏', 0, 0);
      drawTintedPick(ctx, '#00d4ff', 0.60);
      // Crystal tip flash
      const gx = -s*0.35, gy = -s*0.35;
      ctx.fillStyle = `rgba(255,255,255,${0.85*sh})`;
      ctx.beginPath(); ctx.arc(gx, gy, s*0.06, 0, Math.PI*2); ctx.fill();
      // Radial ice shimmer
      const ig = ctx.createRadialGradient(gx, gy, 0, gx, gy, s*0.45);
      ig.addColorStop(0, `rgba(200,245,255,${0.55*sh})`);
      ig.addColorStop(1, 'rgba(100,200,240,0)');
      ctx.fillStyle = ig; ctx.beginPath(); ctx.arc(gx, gy, s*0.45, 0, Math.PI*2); ctx.fill();
      // Facet cut lines across head
      ctx.strokeStyle = `rgba(255,255,255,${0.50*sh})`; ctx.lineWidth = 0.9;
      [[-0.30,-0.25,-0.08,-0.08], [-0.18,-0.28, 0.04,-0.10]].forEach(([x1,y1,x2,y2]) => {
        ctx.beginPath(); ctx.moveTo(x1*s, y1*s); ctx.lineTo(x2*s, y2*s); ctx.stroke();
      });
      // Orbiting sparkle stars
      for (let i = 0; i < 4; i++) {
        const a = ts*0.014 + i*1.571;
        ctx.fillStyle = `rgba(220,250,255,${0.8*sh})`;
        ctx.beginPath(); ctx.arc(-s*0.12+Math.cos(a)*s*0.28, -s*0.12+Math.sin(a)*s*0.22, s*0.035, 0, Math.PI*2); ctx.fill();
      }
      break;
    }

    // ── T3: IRON SENTINEL — dark steel, riveted plates ──────────────
    case 3: {
      ctx.globalAlpha = 1;
      ctx.fillText('⛏', 0, 0);
      drawTintedPick(ctx, '#556677', 0.62);
      // Steel plate gleam highlight
      ctx.fillStyle = 'rgba(210,230,245,0.22)';
      ctx.beginPath(); ctx.ellipse(-s*0.10, -s*0.14, s*0.22, s*0.08, -0.7, 0, Math.PI*2); ctx.fill();
      // Rivet dots
      ctx.fillStyle = '#aabbc8';
      [[-0.22,-0.20],[-0.08,-0.10],[0.06,-0.02]].forEach(([dx,dy]) => {
        ctx.beginPath(); ctx.arc(dx*s, dy*s, s*0.045, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.arc(dx*s+s*0.015, dy*s+s*0.015, s*0.025, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#aabbc8';
      });
      // Edge bevel line
      ctx.strokeStyle = 'rgba(240,255,255,0.30)'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(-s*0.38, -s*0.38); ctx.lineTo(s*0.18, s*0.06); ctx.stroke();
      break;
    }

    // ── T4: VOID SHARD — dark purple, dissolving stars ──────────────
    case 4: {
      const f = 0.5 + 0.5 * Math.sin(ts * 0.009);
      ctx.globalAlpha = 1;
      ctx.fillText('⛏', 0, 0);
      drawTintedPick(ctx, '#6600cc', 0.70);
      // Void aura
      const vg = ctx.createRadialGradient(0, 0, 0, 0, 0, s*0.65);
      vg.addColorStop(0, `rgba(100,0,200,${0.22*f})`);
      vg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = vg; ctx.beginPath(); ctx.arc(0, 0, s*0.65, 0, Math.PI*2); ctx.fill();
      // Embedded drifting stars
      for (let i = 0; i < 10; i++) {
        const sa = ts*0.025 + i*0.9;
        const sx2 = -s*0.12 + Math.cos(sa)*s*(0.12+i*0.025);
        const sy2 = -s*0.12 + Math.sin(sa)*s*(0.10+i*0.018);
        ctx.fillStyle = `rgba(210,160,255,${0.4+0.5*Math.sin(ts*0.04+i)})`;
        ctx.beginPath(); ctx.arc(sx2, sy2, s*0.028, 0, Math.PI*2); ctx.fill();
      }
      // Dissolve particles at tip
      const gx = -s*0.35, gy = -s*0.35;
      for (let i = 0; i < 5; i++) {
        const a = ts*0.014 + i*1.257;
        ctx.fillStyle = `rgba(160,50,255,${0.75*f})`;
        ctx.beginPath(); ctx.arc(gx+Math.cos(a)*s*0.14, gy+Math.sin(a)*s*0.14, s*0.038, 0, Math.PI*2); ctx.fill();
      }
      break;
    }

    // ── T5: GOLD SOVEREIGN — gleaming gold, moving shine sweep ──────
    case 5: {
      const sh = 0.6 + 0.4 * Math.sin(ts * 0.007);
      ctx.globalAlpha = 1;
      ctx.fillText('⛏', 0, 0);
      drawTintedPick(ctx, '#d4a000', 0.68);
      // Sweep shine
      const sweep = ((ts * 0.00025) % 1);
      const shineX = -s*0.5 + sweep * s * 1.1;
      const sg = ctx.createLinearGradient(shineX-s*0.18, 0, shineX+s*0.18, 0);
      sg.addColorStop(0, 'rgba(255,255,160,0)');
      sg.addColorStop(0.5, `rgba(255,255,200,${0.55*sh})`);
      sg.addColorStop(1, 'rgba(255,255,160,0)');
      ctx.fillStyle = sg; ctx.fillRect(-s*0.55, -s*0.55, s*1.1, s*1.1);
      // Crown serration bumps along top-left edge
      ctx.fillStyle = '#ffe060';
      for (let i = 0; i < 5; i++) {
        const a = Math.PI*1.05 + i * 0.22;
        ctx.beginPath(); ctx.arc(-s*0.05+Math.cos(a)*s*0.32, -s*0.05+Math.sin(a)*s*0.32, s*0.05, 0, Math.PI*2); ctx.fill();
      }
      // Diamond gem inset at head centre
      ctx.fillStyle = `rgba(255,255,200,${0.92*sh})`;
      ctx.beginPath();
      ctx.moveTo(-s*0.06,-s*0.16); ctx.lineTo(s*0.04,-s*0.06); ctx.lineTo(-s*0.06,s*0.04); ctx.lineTo(-s*0.16,-s*0.06);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(180,120,0,0.7)'; ctx.lineWidth = 0.7;
      ctx.stroke();
      break;
    }

    // ── T6: GLACIAL SPIKE — frost burst, snowflake spokes ───────────
    case 6: {
      const sh = 0.5 + 0.5 * Math.sin(ts * 0.011);
      ctx.globalAlpha = 1;
      ctx.fillText('⛏', 0, 0);
      drawTintedPick(ctx, '#88ddff', 0.62);
      // Frost burst at tip
      const gx = -s*0.35, gy = -s*0.35;
      const ig = ctx.createRadialGradient(gx, gy, 0, gx, gy, s*0.48);
      ig.addColorStop(0, `rgba(220,250,255,${0.70*sh})`);
      ig.addColorStop(1, 'rgba(100,200,240,0)');
      ctx.fillStyle = ig; ctx.beginPath(); ctx.arc(gx, gy, s*0.48, 0, Math.PI*2); ctx.fill();
      // Snowflake spokes radiating from tip
      ctx.strokeStyle = `rgba(200,240,255,${0.70*sh})`; ctx.lineWidth = 0.9;
      [0, 60, 120, 180, 240, 300].forEach(deg => {
        const r = deg*Math.PI/180;
        const len = deg%60===0 ? s*0.28 : s*0.18;
        ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx+Math.cos(r)*len, gy+Math.sin(r)*len); ctx.stroke();
      });
      // Inner ice glow
      ctx.fillStyle = `rgba(255,255,255,${0.35*sh})`;
      ctx.beginPath(); ctx.arc(gx, gy, s*0.09, 0, Math.PI*2); ctx.fill();
      break;
    }

    // ── T7: THUNDER CREST — electric charge, bolt inset, arcs ───────
    case 7: {
      const z = 0.5 + 0.5 * Math.sin(ts * 0.024);
      ctx.globalAlpha = 1;
      ctx.fillText('⛏', 0, 0);
      drawTintedPick(ctx, '#cccc00', 0.65);
      // Electric charge aura
      const eg = ctx.createRadialGradient(0, 0, 0, 0, 0, s*0.60);
      eg.addColorStop(0, `rgba(255,240,40,${0.28*z})`);
      eg.addColorStop(1, 'rgba(180,255,0,0)');
      ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(0, 0, s*0.60, 0, Math.PI*2); ctx.fill();
      // Lightning bolt inset on head
      ctx.fillStyle = `rgba(255,240,20,${0.95})`;
      const bx = -s*0.08, by = -s*0.18;
      ctx.beginPath();
      ctx.moveTo(bx,by); ctx.lineTo(bx-s*0.10, by+s*0.12); ctx.lineTo(bx,by+s*0.12);
      ctx.lineTo(bx-s*0.10,by+s*0.26); ctx.lineTo(bx+s*0.06,by+s*0.10); ctx.lineTo(bx,by+s*0.10);
      ctx.lineTo(bx+s*0.06,by); ctx.closePath(); ctx.fill();
      // Arcing sparks from tip
      const gx = -s*0.35, gy = -s*0.35;
      ctx.strokeStyle = `rgba(255,255,80,${0.90*z})`; ctx.lineWidth = 1.1;
      for (let i = 0; i < 3; i++) {
        const a = ts*0.03 + i*1.047;
        ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx+Math.cos(a)*s*0.30, gy+Math.sin(a)*s*0.28); ctx.stroke();
      }
      break;
    }

    // ── T8: SOUL REAPER — bone-white glow, orbiting soul orbs ───────
    case 8: {
      const dr = 0.5 + 0.5 * Math.sin(ts * 0.007);
      ctx.globalAlpha = 1;
      ctx.fillText('⛏', 0, 0);
      drawTintedPick(ctx, '#cc66ff', 0.58);
      // Bone-white bleach overlay
      drawTintedPick(ctx, '#ffffff', 0.22);
      // Soul-glow aura
      const sg2 = ctx.createRadialGradient(0, 0, 0, 0, 0, s*0.60);
      sg2.addColorStop(0, `rgba(180,80,255,${0.20*dr})`);
      sg2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg2; ctx.beginPath(); ctx.arc(0, 0, s*0.60, 0, Math.PI*2); ctx.fill();
      // Orbiting soul orbs
      const gx = -s*0.35, gy = -s*0.35;
      for (let i = 0; i < 4; i++) {
        const a = ts*0.012 + i*1.571;
        const ox = gx+Math.cos(a)*s*0.26, oy = gy+Math.sin(a)*s*0.22;
        const oa = (0.5+0.4*Math.sin(ts*0.02+i))*dr;
        ctx.fillStyle = `rgba(200,100,255,${oa})`;
        ctx.beginPath(); ctx.arc(ox, oy, s*0.055, 0, Math.PI*2); ctx.fill();
        // Soul orb inner bright core
        ctx.fillStyle = `rgba(255,220,255,${oa*0.7})`;
        ctx.beginPath(); ctx.arc(ox, oy, s*0.025, 0, Math.PI*2); ctx.fill();
      }
      // Rune dots along blade
      ctx.fillStyle = `rgba(160,80,220,${0.70*dr})`;
      [[-0.28,-0.24],[-0.14,-0.10],[0.00,-0.02]].forEach(([dx,dy]) => {
        ctx.beginPath(); ctx.arc(dx*s, dy*s, s*0.038, 0, Math.PI*2); ctx.fill();
      });
      break;
    }

    // ── T9: THE ABYSS FANG — cosmic void, nebula, spectral pulse ────
    case 9: {
      const cos2 = 0.5 + 0.5 * Math.sin(ts * 0.006);
      const spin = ts * 0.009;
      ctx.globalAlpha = 1;
      ctx.fillText('⛏', 0, 0);
      drawTintedPick(ctx, '#0a0020', 0.75);   // deep void blackening
      drawTintedPick(ctx, '#ff00aa', 0.35);   // hot-pink spectral wash on top
      // Full nebula aura
      const ng = ctx.createRadialGradient(0, 0, 0, 0, 0, s*0.75);
      ng.addColorStop(0, `rgba(255,30,180,${0.28*cos2})`);
      ng.addColorStop(0.5, `rgba(60,0,160,${0.18*cos2})`);
      ng.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ng; ctx.beginPath(); ctx.arc(0, 0, s*0.75, 0, Math.PI*2); ctx.fill();
      // Rotating nebula stars
      for (let i = 0; i < 14; i++) {
        const a = spin + i*(Math.PI*2/14);
        const r = s*(0.15 + 0.12*(i%3===0?1:0));
        const sx2 = -s*0.06 + Math.cos(a)*r, sy2 = -s*0.06 + Math.sin(a)*r;
        const sz = 0.35 + 0.55*(i%3===0 ? cos2 : 0.2);
        ctx.fillStyle = i%3===0 ? `rgba(255,160,255,${sz})` : `rgba(100,60,220,${sz})`;
        ctx.beginPath(); ctx.arc(sx2, sy2, s*0.035, 0, Math.PI*2); ctx.fill();
      }
      // Void tip glow
      const gx = -s*0.35, gy = -s*0.35;
      const vtg = ctx.createRadialGradient(gx, gy, 0, gx, gy, s*0.42);
      vtg.addColorStop(0, `rgba(255,80,240,${0.95*cos2})`);
      vtg.addColorStop(0.5, `rgba(120,0,200,${0.55*cos2})`);
      vtg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = vtg; ctx.beginPath(); ctx.arc(gx, gy, s*0.42, 0, Math.PI*2); ctx.fill();
      // Spectral outline trace
      ctx.strokeStyle = `rgba(220,50,200,${0.65*cos2})`; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 0, s*0.45, Math.PI*0.9, Math.PI*2.3); ctx.stroke();
      ctx.strokeStyle = `rgba(80,220,255,${0.50*cos2})`; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, s*0.38, Math.PI*0.0, Math.PI*1.1); ctx.stroke();
      break;
    }

    default:
      ctx.fillText('⛏', 0, 0);
  }

  ctx.restore();
}

// ── END OF PICKAXE DRAWING FUNCTIONS ──────────────────────────────────────
// ================================================================

// ================================================================
//  ARMORY — Pickaxe Selection Screen
// ================================================================
function drawArmory(ts) {
  const W = CANVAS_W, H = CANVAS_H;
  ctx.clearRect(0, 0, W, H);

  // Background
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0610'); bg.addColorStop(1,'#040208');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  const fg = ctx.createRadialGradient(W/2, H, 0, W/2, H, 300);
  fg.addColorStop(0,'rgba(200,80,0,0.10)'); fg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = fg; ctx.fillRect(0,0,W,H);
  for(let i=0;i<5;i++){
    const ex=(Math.sin(i*137+ts*0.0006)*0.5+0.5)*W;
    const ey=H-(((ts*0.00015*(0.5+i*0.18)+i*0.15)%1))*H*0.7;
    ctx.fillStyle=`rgba(255,${80+i*30},0,${0.15+0.15*Math.sin(ts*0.003+i)})`;
    ctx.beginPath(); ctx.arc(ex,ey,1.5,0,Math.PI*2); ctx.fill();
  }

  // Header
  ctx.fillStyle='rgba(20,14,30,0.95)'; ctx.fillRect(0,0,W,60);
  ctx.strokeStyle='rgba(220,80,80,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,60); ctx.lineTo(W,60); ctx.stroke();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 25px Arial, sans-serif';
  const hGrd=ctx.createLinearGradient(0,20,0,52);
  hGrd.addColorStop(0,'#ffaa88'); hGrd.addColorStop(1,'#cc3300');
  ctx.fillStyle=hGrd; ctx.shadowColor='rgba(255,80,40,0.5)'; ctx.shadowBlur=14;
  ctx.fillText('⛏  THE ARMORY  ⛏', W/2, 30); ctx.shadowBlur=0;
  ctx.font='12px Arial, sans-serif'; ctx.fillStyle='rgba(200,170,140,0.7)';
  ctx.fillText(`💎 ${savedShards} shards  ·  Unlock & equip pickaxes`, W/2, 49);

  // Card list
  const CARD_H=86, CARD_GAP=8, CARD_X=12, CARD_W=W-24;
  const HEADER_H=60, FOOTER_H=52;
  const listTop=HEADER_H, listH=H-HEADER_H-FOOTER_H;
  const totalContentH=PICKAXES.length*(CARD_H+CARD_GAP)+14;
  armoryMaxScroll=Math.max(0, totalContentH-listH);

  ctx.save();
  ctx.beginPath(); ctx.rect(0, listTop, W, listH); ctx.clip();

  PICKAXES.forEach((pick, idx) => {
    const cardY=listTop+idx*(CARD_H+CARD_GAP)+8-armoryScrollY;
    if (cardY+CARD_H<listTop||cardY>listTop+listH) return;

    const unlocked=ownedPickaxes.has(idx);
    const equipped=equippedPickaxe===idx;
    const canAfford=savedShards>=pick.cost;
    const pulse=0.5+0.5*Math.sin(ts*0.003+idx*0.8);

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.55)';
    roundRect(CARD_X+2,cardY+3,CARD_W,CARD_H,8); ctx.fill();

    // Background
    const cBg=ctx.createLinearGradient(CARD_X,cardY,CARD_X,cardY+CARD_H);
    if (equipped){
      cBg.addColorStop(0,`${pick.glow}0.30)`); cBg.addColorStop(1,`${pick.glow}0.12)`);
    } else if (unlocked){
      cBg.addColorStop(0,'rgba(36,28,46,0.92)'); cBg.addColorStop(1,'rgba(22,16,30,0.92)');
    } else {
      cBg.addColorStop(0,'rgba(16,12,20,0.78)'); cBg.addColorStop(1,'rgba(10,8,14,0.78)');
    }
    ctx.fillStyle=cBg; roundRect(CARD_X,cardY,CARD_W,CARD_H,8); ctx.fill();

    // Border
    if (equipped){
      ctx.strokeStyle=`${pick.glow}${0.65+pulse*0.35})`; ctx.lineWidth=2.5;
      ctx.shadowColor=pick.color; ctx.shadowBlur=10+6*pulse;
    } else if (unlocked){
      ctx.strokeStyle='rgba(140,110,80,0.45)'; ctx.lineWidth=1.5; ctx.shadowBlur=0;
    } else {
      ctx.strokeStyle='rgba(55,45,65,0.4)'; ctx.lineWidth=1; ctx.shadowBlur=0;
    }
    roundRect(CARD_X,cardY,CARD_W,CARD_H,8); ctx.stroke(); ctx.shadowBlur=0;
    if (equipped){
      ctx.strokeStyle=`${pick.glow}0.18)`; ctx.lineWidth=1;
      roundRect(CARD_X+2,cardY+2,CARD_W-4,CARD_H-4,6); ctx.stroke();
    }

    // Custom pickaxe icon — grows with tier
    const iconSize = 22 + idx * 2.3;
    const emojiX = CARD_X + 36, emojiY = cardY + CARD_H/2;
    ctx.save();
    ctx.globalAlpha = unlocked ? 1 : 0.28;
    if (equipped) { ctx.shadowColor = pick.color; ctx.shadowBlur = 16 + 8*pulse; }
    drawPickaxeIcon(ctx, emojiX, emojiY, iconSize, idx, ts, equipped ? pulse : 0);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    ctx.restore();

    // Tier badge top-left
    ctx.fillStyle=unlocked?`${pick.glow}0.7)`:'rgba(45,38,58,0.8)';
    roundRect(CARD_X+7,cardY+7,24,16,4); ctx.fill();
    ctx.font='bold 9px Arial, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=unlocked?'#fff':'#776688';
    ctx.fillText(`T${idx}`, CARD_X+19, cardY+15);

    // Name
    const TX=CARD_X+64;
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.font='bold 15px Arial, sans-serif';
    if (equipped){ ctx.fillStyle=pick.color; ctx.shadowColor=pick.color; ctx.shadowBlur=5; }
    else ctx.fillStyle=unlocked?'#e8ddc8':'#5a4e68';
    ctx.fillText(pick.name, TX, cardY+9); ctx.shadowBlur=0;

    // Ability
    if (pick.ability!=='none'){
      ctx.font='bold 10px Arial, sans-serif';
      ctx.fillStyle=unlocked?`${pick.glow}0.92)`:'rgba(90,75,110,0.55)';
      ctx.fillText(`✦ ${pick.abilityName}`, TX, cardY+28);

      ctx.font='10px Arial, sans-serif';
      ctx.fillStyle=unlocked?'rgba(200,185,160,0.75)':'rgba(90,80,100,0.45)';
      const maxW=CARD_W-TX+CARD_X-8;
      // simple single-line truncated desc
      let desc=pick.abilityDesc;
      while(ctx.measureText(desc).width>maxW&&desc.length>10) desc=desc.slice(0,-2);
      if (desc!==pick.abilityDesc) desc=desc.trimEnd()+'…';
      ctx.fillText(desc, TX, cardY+42);
      // second line if needed
      if (desc!==pick.abilityDesc){
        const rest=pick.abilityDesc.slice(desc.length-1).trim();
        ctx.fillText(rest.slice(0,Math.floor(maxW/6.2)), TX, cardY+54);
      }
    } else {
      ctx.font='italic 10.5px Arial, sans-serif';
      ctx.fillStyle='rgba(130,118,105,0.45)';
      ctx.fillText('No special ability — the classic choice.', TX, cardY+36);
    }

    // Right: status/cost
    ctx.textAlign='right'; ctx.textBaseline='middle';
    const RX=CARD_X+CARD_W-10;
    if (equipped){
      ctx.font='bold 12px Arial, sans-serif'; ctx.fillStyle=pick.color;
      ctx.shadowColor=pick.color; ctx.shadowBlur=7;
      ctx.fillText('✔ EQUIPPED', RX, cardY+20); ctx.shadowBlur=0;
      ctx.font='10px Arial, sans-serif'; ctx.fillStyle=`${pick.glow}0.65)`;
      ctx.fillText('active', RX, cardY+35);
    } else if (unlocked){
      ctx.font='bold 12px Arial, sans-serif'; ctx.fillStyle='#88dd88';
      ctx.shadowColor='rgba(80,220,80,0.4)'; ctx.shadowBlur=5;
      ctx.fillText('▶ EQUIP', RX, cardY+22); ctx.shadowBlur=0;
      ctx.font='10px Arial, sans-serif'; ctx.fillStyle='rgba(140,200,120,0.55)';
      ctx.fillText('owned', RX, cardY+37);
    } else if (canAfford){
      // Can buy — green BUY button visual
      const bx=RX-72, by=cardY+10, bw=74, bh=28;
      ctx.fillStyle='rgba(40,100,40,0.7)';
      roundRect(bx,by,bw,bh,5); ctx.fill();
      ctx.strokeStyle='rgba(80,220,80,0.7)'; ctx.lineWidth=1.5;
      roundRect(bx,by,bw,bh,5); ctx.stroke();
      ctx.font='bold 11px Arial, sans-serif'; ctx.fillStyle='#88ff88';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('BUY', bx+bw/2, by+bh/2-1);
      ctx.textAlign='right';
      ctx.font='10px Arial, sans-serif'; ctx.fillStyle='#ffdd55';
      const costStr=pick.cost>=1000?(pick.cost/1000).toFixed(0)+'k':String(pick.cost);
      ctx.fillText(`💎 ${costStr}`, RX, cardY+48);
    } else {
      // Can't afford — greyed out with cost
      const bx=RX-72, by=cardY+10, bw=74, bh=28;
      ctx.fillStyle='rgba(30,20,30,0.6)';
      roundRect(bx,by,bw,bh,5); ctx.fill();
      ctx.strokeStyle='rgba(80,60,80,0.4)'; ctx.lineWidth=1;
      roundRect(bx,by,bw,bh,5); ctx.stroke();
      ctx.font='bold 11px Arial, sans-serif'; ctx.fillStyle='#775566';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('LOCKED', bx+bw/2, by+bh/2-1);
      ctx.textAlign='right';
      ctx.font='10px Arial, sans-serif';
      const costStr=pick.cost>=1000?(pick.cost/1000).toFixed(0)+'k':String(pick.cost);
      ctx.fillStyle='#664444';
      ctx.fillText(`💎 ${costStr}`, RX, cardY+46);
      const need=pick.cost-savedShards;
      const needStr=need>=1000?(need/1000).toFixed(1)+'k':String(need);
      ctx.fillStyle='rgba(160,80,80,0.6)';
      ctx.fillText(`-${needStr} short`, RX, cardY+60);
    }
  });

  ctx.restore();

  // Fade edges
  const tFade=ctx.createLinearGradient(0,listTop,0,listTop+22);
  tFade.addColorStop(0,'rgba(8,4,14,0.95)'); tFade.addColorStop(1,'rgba(8,4,14,0)');
  ctx.fillStyle=tFade; ctx.fillRect(0,listTop,W,22);
  const bFade=ctx.createLinearGradient(0,H-FOOTER_H-22,0,H-FOOTER_H);
  bFade.addColorStop(0,'rgba(8,4,14,0)'); bFade.addColorStop(1,'rgba(8,4,14,0.95)');
  ctx.fillStyle=bFade; ctx.fillRect(0,H-FOOTER_H-22,W,22);

  // Scrollbar
  if (armoryMaxScroll>0){
    const sbH=Math.max(24,(listH/totalContentH)*listH);
    const sbY=listTop+(armoryScrollY/armoryMaxScroll)*(listH-sbH);
    ctx.fillStyle='rgba(70,40,90,0.2)'; ctx.fillRect(W-6,listTop,5,listH);
    ctx.fillStyle='rgba(210,70,70,0.5)'; roundRect(W-5,sbY,4,sbH,2); ctx.fill();
  }

  // Footer
  ctx.fillStyle='rgba(12,8,20,0.97)'; ctx.fillRect(0,H-FOOTER_H,W,FOOTER_H);
  ctx.strokeStyle='rgba(180,60,60,0.22)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H-FOOTER_H); ctx.lineTo(W,H-FOOTER_H); ctx.stroke();

  // Back button
  ctx.fillStyle='rgba(50,25,65,0.8)';
  roundRect(12,H-FOOTER_H+11,96,30,6); ctx.fill();
  ctx.strokeStyle='rgba(200,60,60,0.5)'; ctx.lineWidth=1.5;
  roundRect(12,H-FOOTER_H+11,96,30,6); ctx.stroke();
  ctx.font='bold 12px Arial, sans-serif'; ctx.fillStyle='#e8b8b8';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('← Back', 60, H-FOOTER_H+26);

  // Feedback message or equipped summary
  if (armoryMsgTimer > 0) {
    armoryMsgTimer--;
    const fa = Math.min(1, armoryMsgTimer / 20);
    ctx.globalAlpha = fa;
    ctx.font='bold 12px Arial, sans-serif';
    const isErr = armoryMsg.startsWith('❌');
    ctx.fillStyle = isErr ? '#ff8888' : '#88ffaa';
    ctx.shadowColor = isErr ? 'rgba(255,60,60,0.5)' : 'rgba(80,255,120,0.5)';
    ctx.shadowBlur = 8;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(armoryMsg, W/2+28, H-FOOTER_H+26);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  } else {
    const eq=getActivePickaxe();
    ctx.font='12px Arial, sans-serif'; ctx.fillStyle=`${eq.glow}0.88)`;
    ctx.textAlign='center';
    ctx.fillText(`${eq.emoji} ${eq.name}${eq.ability!=='none'?' · '+eq.abilityName:''}`, W/2+28, H-FOOTER_H+26);
  }
}

function armoryClickAt(clientX, clientY) {
  const rect=canvas.getBoundingClientRect();
  const scale=getCanvasScale();
  const cx=(clientX-rect.left)/scale;
  const cy=(clientY-rect.top)/scale;
  const CARD_H=86, CARD_GAP=8, CARD_X=12;
  const HEADER_H=60, FOOTER_H=52;

  // Back button
  if (cy>=CANVAS_H-FOOTER_H+11&&cy<=CANVAS_H-FOOTER_H+41&&cx>=12&&cx<=108){ gameState='START'; return; }

  PICKAXES.forEach((pick, idx) => {
    const cardY=HEADER_H+idx*(CARD_H+CARD_GAP)+8-armoryScrollY;
    if (cy>=cardY&&cy<=cardY+CARD_H&&cx>=CARD_X&&cx<=CARD_X+(CANVAS_W-24)){
      if (ownedPickaxes.has(idx)) {
        // Already owned — just equip
        equippedPickaxe = idx;
        saveEquippedPickaxe();
        SFX.buy();
        armoryMsg = `${pick.emoji} ${pick.name} equipped!`;
        armoryMsgTimer = 90;
      } else if (savedShards >= pick.cost) {
        // Purchase
        savedShards -= pick.cost;
        saveProgress();
        ownedPickaxes.add(idx);
        saveOwnedPickaxes();
        equippedPickaxe = idx;
        saveEquippedPickaxe();
        SFX.buy();
        armoryMsg = `✅ ${pick.name} purchased & equipped!`;
        armoryMsgTimer = 120;
      } else {
        // Can't afford
        SFX.hardDig && SFX.hardDig();
        const need = pick.cost - savedShards;
        armoryMsg = `❌ Need ${need} more 💎`;
        armoryMsgTimer = 90;
      }
    }
  });
}

requestAnimationFrame(render);
</script>
