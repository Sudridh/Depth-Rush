}
function submitScore(name, d, score, biome) {
  const canonical = (name.trim() || 'MINER').toUpperCase();
  const lb = loadLeaderboard();
  const existing = lb.findIndex(e => e.name === canonical);
  if (existing !== -1) {
    // Keep the better run for this player
    if (d > lb[existing].depth || (d === lb[existing].depth && score > lb[existing].score)) {
      lb[existing] = { name: canonical, depth: d, score, biome, date: new Date().toLocaleDateString() };
    }
  } else {
    lb.push({ name: canonical, depth: d, score, biome, date: new Date().toLocaleDateString() });
  }
  lb.sort((a,b) => b.depth - a.depth || b.score - a.score);
  saveLeaderboard(lb.slice(0, 10));
}

// How far did father get? We infer from the deepest journal entry found.
function getFatherDepth() {

  { label:'Deep Vein',      emoji:'💎', color:'#1a4488', darkColor:'#0d2244', type:'shards',     value:80,  weight:2 },

// Build a weighted lookup array for random selection
const WHEEL_POOL = [];
WHEEL_PRIZES.forEach((p,i) => { for(let w=0;w<p.weight;w++) WHEEL_POOL.push(i); });

let wheelAngle       = 0;
let wheelTargetAngle = 0;
let wheelVelocity    = 0;
let wheelSpinning    = false;
let wheelResult      = -1;
let wheelResultTimer = 0;
let wheelTickLast    = 0;

function getWheelFreeDate() { return lsGet('bts_wheelDate',''); }
function setWheelFreeDate() { lsSet('bts_wheelDate', new Date().toDateString()); }
function hasFreeWheelSpin() { return getWheelFreeDate() !== new Date().toDateString(); }

// Run bonuses (applied to next game)
let runBonuses = [];  // array of {type, value}
function loadRunBonuses()  { try { return JSON.parse(lsGet('bts_runBonuses','[]')); } catch(e) { return []; } }
function saveRunBonuses(b) { lsSet('bts_runBonuses', JSON.stringify(b)); }
function addRunBonus(type, value) {
  const b = loadRunBonuses().filter(x=>x.type!==type); // one of each type
  b.push({type,value});
  saveRunBonuses(b);
}
function clearRunBonuses() { saveRunBonuses([]); }

// Active per-run bonus flags (set in initGame from runBonuses)
let runDoubleGems  = false;
let runSenseFree   = false;
let runRadBonus    = 0;
let runFlaskCache  = false;
let runSpiritBane  = 0;  // stun ms
const SPIN_COST    = 30;

let wheelParticles = [];  // burst particles on wheel land

function spinWheel() {
  if (wheelSpinning) return;
  const isFree = hasFreeWheelSpin();
  if (!isFree && savedShards < SPIN_COST) return;
  if (!isFree) { savedShards -= SPIN_COST; saveProgress(); }
  else setWheelFreeDate();

  // Spin to a pre-aimed angle, snap exactly on stop, then read which segment is under the pointer
  const segAngle = (Math.PI * 2) / WHEEL_PRIZES.length;
  const prizePick = WHEEL_POOL[Math.floor(Math.random() * WHEEL_POOL.length)];
  const nudge = (Math.random() - 0.5) * segAngle * 0.6; // small random offset within segment
  const targetSeg = prizePick * segAngle + segAngle / 2 + nudge;
  const revolutions = 5 + Math.floor(Math.random() * 4);
  const targetAngle = revolutions * Math.PI * 2 + (Math.PI * 2 - targetSeg);
  wheelAngle = 0;
  wheelTargetAngle = targetAngle;
  wheelVelocity = targetAngle / 180;
  wheelSpinning = true;
  wheelResultTimer = 0;
  wheelParticles = [];
}

function applyWheelPrize(prize) {
  if (prize.type === 'shards')     { savedShards += prize.value; saveProgress(); }
  else if (prize.type === 'nothing') { /* nothing */ }
  else if (prize.type === 'voidCurse') { addRunBonus('voidCurse', 1); }
  else { addRunBonus(prize.type, prize.value); }
}

function updateWheel() {
  if (!wheelSpinning) return;
  const segAngle = (Math.PI * 2) / WHEEL_PRIZES.length;

  // Eased deceleration
  wheelVelocity *= 0.978;
  wheelAngle += wheelVelocity;

  // Tick sound when crossing segment boundary
  const currentSector = Math.floor(((wheelAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2) / segAngle);
  if (currentSector !== lastWheelSector) {
    lastWheelSector = currentSector;
    SFX.wheelTick();
  }

  if (wheelVelocity < 0.001) {
    // Snap exactly to the intended target so pointer aligns perfectly
    wheelAngle = wheelTargetAngle;
    wheelSpinning = false;
    wheelResultTimer = 1;

    // Read which segment is actually under the pointer now
    // Pointer is at world angle -PI/2. In wheel-local space that is: -PI/2 - wheelAngle
    // Segment i starts at i*seg - PI/2 (local), so pointer hits segment:
    //   i = floor( (-wheelAngle mod 2PI) / segAngle )
    const localPointer = ((-wheelAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    wheelResult = Math.floor(localPointer / segAngle) % WHEEL_PRIZES.length;

    const p = WHEEL_PRIZES[wheelResult];
    applyWheelPrize(p);
    if (p.type === 'shards' && p.value >= 250) SFX.wheelJack();
    else SFX.wheelLand();
    // Burst particles
    const WX2=CANVAS_W/2, WY2=295;
    const isGood = p.type!=='nothing'&&p.type!=='voidCurse';
    const burstColor = p.type==='shards'&&p.value>=250?'#ffd700': isGood?'#88ffaa':'#ff4444';
    for(let b=0;b<28;b++){
      const ang=Math.random()*Math.PI*2;
      const spd=1.5+Math.random()*4;
      wheelParticles.push({x:WX2,y:WY2,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,color:burstColor,size:2+Math.random()*3});
    }
  }
}

let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone({ type='sine', freq=220, endFreq, vol=0.3, dur=0.15, delay=0 }) {
  if (!audioCtx) return;
  const scaledVol = vol * sfxVolume;
  if (scaledVol < 0.001) return;
  const t = audioCtx.currentTime + delay;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, t + dur);
  gain.gain.setValueAtTime(scaledVol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur + 0.01);
}

function playNoise(vol=0.4, dur=0.2) {
  if (!audioCtx) return;
  const scaledVol = vol * sfxVolume;
  if (scaledVol < 0.001) return;
  const t = audioCtx.currentTime;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf  = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
  const src  = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(scaledVol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(gain); gain.connect(audioCtx.destination);
  src.start(t);
}

function getBiome(d) {
  for (let i = BIOMES.length - 1; i >= 0; i--)
    if (d >= BIOMES[i].minDepth) return BIOMES[i];
  return BIOMES[0];
}

const TILE_EMPTY=0, TILE_BLOCK=1, TILE_LAMP=2, TILE_SHARD=3,
      TILE_HARD=4, TILE_EXPLOSIVE=5, TILE_TREASURE=6, TILE_VCRYSTAL=7,
      TILE_FLASK=8, TILE_LAVA=9; // Flask: emergency oil, Lava: ember biome hazard

const blockCaches = {};
const hardCaches  = {};

function buildBlockCache(biome) {
  const key = biome.name;
  if (!blockCaches[key]) {
    const bc = document.createElement('canvas'); bc.width = bc.height = TILE_SIZE;
    const bx = bc.getContext('2d');
    // Base fill
    bx.fillStyle = biome.blockFill; bx.fillRect(0,0,TILE_SIZE,TILE_SIZE);
    // Rock grain noise
    for (let i=0; i<80; i++) {
      bx.fillStyle = `rgba(255,255,255,${Math.random()*0.07})`;
      bx.fillRect(Math.random()*TILE_SIZE, Math.random()*TILE_SIZE, Math.random()*3+1, 1);
    }
    for (let i=0; i<30; i++) {
      bx.fillStyle = `rgba(0,0,0,${Math.random()*0.12})`;
      bx.fillRect(Math.random()*TILE_SIZE, Math.random()*TILE_SIZE, Math.random()*4+1, Math.random()*2+1);
    }
    // Mineral vein streak
    bx.strokeStyle = biome.accentColor; bx.lineWidth = 0.5; bx.globalAlpha = 0.18;
    bx.beginPath(); bx.moveTo(Math.random()*8, Math.random()*TILE_SIZE);
    bx.lineTo(TILE_SIZE-Math.random()*8, Math.random()*TILE_SIZE); bx.stroke();
    bx.globalAlpha = 1;
    // Border
    bx.strokeStyle = biome.blockBorder; bx.lineWidth = 1.5; bx.strokeRect(0.75, 0.75, TILE_SIZE-1.5, TILE_SIZE-1.5);
    // Top highlight (light from above)
    const hi = bx.createLinearGradient(0,0,0,6);
    hi.addColorStop(0,'rgba(255,255,255,0.08)'); hi.addColorStop(1,'rgba(255,255,255,0)');
    bx.fillStyle=hi; bx.fillRect(1,1,TILE_SIZE-2,6);
    blockCaches[key] = bc;
  }
  if (!hardCaches[key]) {
    const hc = document.createElement('canvas'); hc.width = hc.height = TILE_SIZE;
    const hx = hc.getContext('2d');
    // Base fill
    hx.fillStyle = biome.hardFill; hx.fillRect(0,0,TILE_SIZE,TILE_SIZE);
    // Dense grain
    for (let i=0; i<100; i++) {
      hx.fillStyle = `rgba(255,255,255,${Math.random()*0.05})`;
      hx.fillRect(Math.random()*TILE_SIZE, Math.random()*TILE_SIZE, Math.random()*2+1, 1);
    }
    // Reinforcing cracks — jagged lines suggesting compressed stone
    hx.strokeStyle = biome.hardAccent; hx.lineWidth = 0.8; hx.globalAlpha = 0.5;
    const cracks = [[5,8,14,22],[TILE_SIZE-5,5,TILE_SIZE-16,20],[10,TILE_SIZE-8,22,TILE_SIZE-22],[TILE_SIZE-12,TILE_SIZE-8,TILE_SIZE-22,TILE_SIZE-20],[TILE_SIZE/2,4,TILE_SIZE/2+4,TILE_SIZE-4]];
    cracks.forEach(([x1,y1,x2,y2]) => { hx.beginPath(); hx.moveTo(x1,y1); hx.lineTo(x2,y2); hx.stroke(); });
    // Double cross-hatch
    hx.globalAlpha = 0.28; hx.lineWidth = 1.5; hx.strokeRect(1, 1, TILE_SIZE-2, TILE_SIZE-2);
    hx.globalAlpha = 0.2; hx.beginPath(); hx.moveTo(6,6); hx.lineTo(TILE_SIZE-6,TILE_SIZE-6); hx.stroke();
    hx.beginPath(); hx.moveTo(TILE_SIZE-6,6); hx.lineTo(6,TILE_SIZE-6); hx.stroke();
    // Metallic accent line along top
    const metalSheen = hx.createLinearGradient(0,0,TILE_SIZE,0);
    metalSheen.addColorStop(0,`rgba(255,255,255,0)`); metalSheen.addColorStop(0.5,biome.hardAccent); metalSheen.addColorStop(1,`rgba(255,255,255,0)`);
    hx.globalAlpha = 0.3; hx.strokeStyle = metalSheen; hx.lineWidth = 1.5;
    hx.beginPath(); hx.moveTo(2,3); hx.lineTo(TILE_SIZE-2,3); hx.stroke();
    hx.globalAlpha = 1;
    hardCaches[key] = hc;
  }
}

function generateRow(d) {
  const row = [];
  for (let x=0; x<COLS; x++) {
    const r = Math.random();

    // Hard blocks: none in first 8m, then gradually scale up — eases player in
    const hardRate     = d < 8 ? 0 : Math.min(0.13 + (d-8) * 0.0006, 0.31);

    // Spawnables fade with depth but never below a minimum floor
    const depthFactor  = Math.max(0.25, 1 - d * 0.004); // 1.0 at surface → 0.25 floor at ~190m+
    const lampRate     = 0.07 * depthFactor;
    const shardRate    = 0.03 * depthFactor;
    const explosiveRate= 0.02 * depthFactor;
    const treasureRate = 0.015 * depthFactor;
    const vcrystalRate = 0.005 * depthFactor;

    // Oil flasks: rare emergency refill (depth 15+)
    const flaskRate     = d >= 15 ? 0.006 : 0;
    // Lava hazard: only in Ember Depths band (depth 30–70)
    const lavaRate      = (d >= 30 && d <= 70) ? 0.022 : 0;

    // Block density scales with depth — sparse early (40%), full by depth 30
    const blockDensity = Math.min(0.52, 0.40 + d * 0.004);
    // Stack thresholds
    const tBlock    = blockDensity;
    const tHard     = tBlock     + hardRate;
    const tLamp     = tHard      + lampRate;
    const tShard    = tLamp      + shardRate;
    const tExplo    = tShard     + explosiveRate;
    const tTreasure = tExplo     + treasureRate;
    const tVcrystal = tTreasure  + vcrystalRate;
    const tFlask    = tVcrystal  + flaskRate;
    const tLava     = tFlask     + lavaRate;
    // remainder → TILE_EMPTY

    let type = TILE_EMPTY;
    if      (r < tBlock)    type = TILE_BLOCK;
    else if (r < tHard)     type = TILE_HARD;
    else if (r < tLamp)     type = TILE_LAMP;
    else if (r < tShard)    type = TILE_SHARD;
    else if (r < tExplo)    type = TILE_EXPLOSIVE;
    else if (r < tTreasure) type = TILE_TREASURE;
    else if (r < tVcrystal) type = TILE_VCRYSTAL;
    else if (r < tFlask)    type = TILE_FLASK;
    else if (r < tLava)     type = TILE_LAVA;

    let hp = type === TILE_HARD ? (upgPick >= 1 ? 1 : 2) : 1;
    row.push({ type, hp, maxHp: hp });
  }
  return row;
}

function initGame() {

  if (pickAbility === 'voidMastery') {

  depth = shards = shakeTimer = 0;

  activeEventMsg = ''; activeEventTimer = 0;

  for (let y=4; y<ROWS; y++) grid.push(generateRow(0));

  player = { x:4, y:1, trail:[] };
  currentBiomeName = BIOMES[0].name;
  lastOilDrain = performance.now();

  // Flask cache: scatter 3 guaranteed flasks near the top of the grid
  if (runFlaskCache) {
    let placed = 0;
    for (let y=5; y<10 && placed < 3; y++) {
      for (let x=0; x<COLS && placed < 3; x++) {
        if (grid[y][x].type === TILE_BLOCK) {
          grid[y][x] = { type: TILE_FLASK, hp:1, maxHp:1 };

        }

  }

  // Spirit Bane: stun any ghosts spawned in first scroll
  if (runSpiritBane > 0 && ghosts.length > 0) {
    const until = performance.now() + runSpiritBane;
    for (const g of ghosts) g.stunnedUntil = until;
  }

  gameState = 'PLAYING';
}

function createDust() {
  return { x: Math.random()*CANVAS_W, y: Math.random()*CANVAS_H, vy: Math.random()*0.4+0.1, vx: (Math.random()-0.5)*0.3, r: Math.random()*1.5+0.5, life: Math.random(), maxLife: Math.random()*0.4+0.2 };
}

function updateDust() {
  const biome = getBiome(depth);
  // Occasionally spawn extra thematic particles
  if (Math.random() < 0.18) {
    if (depth < 30) {
      // Shallows: water drips falling fast from ceiling
      particles.push({ x: Math.random()*CANVAS_W, y:0, vx:0, vy: 1.2+Math.random()*1.8, life:0.7, size:1.5, color:'rgba(100,140,200,0.5)', isDrip:true });
    } else if (depth < 65) {
      // Ember Depths: rising sparks
      particles.push({ x: Math.random()*CANVAS_W, y:CANVAS_H, vx:(Math.random()-0.5)*0.8, vy:-(1+Math.random()*2.5), life:0.6, size:1.5+Math.random()*1.5, color:`rgba(255,${80+Math.floor(Math.random()*100)},0,0.7)` });
    } else if (depth < 110) {
      // Crystal Caverns: drifting motes of light
      particles.push({ x: Math.random()*CANVAS_W, y: Math.random()*CANVAS_H, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3, life:0.9+Math.random()*0.5, size:1+Math.random()*2, color:`rgba(80,220,240,${0.3+Math.random()*0.4})` });
    } else {
      // The Void: slow-drifting purple wisps
      particles.push({ x: Math.random()*CANVAS_W, y: Math.random()*CANVAS_H, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.4, life:1.2, size:2+Math.random()*3, color:`rgba(${120+Math.floor(Math.random()*60)},20,${180+Math.floor(Math.random()*60)},${0.15+Math.random()*0.25})` });
    }
  }
  for (let i=0; i<ambientDust.length; i++) {
    const d = ambientDust[i];
    d.x += d.vx; d.y += d.vy; d.life -= 0.002;
    if (d.life <= 0 || d.y > CANVAS_H) ambientDust[i] = createDust();
  }
  for (const d of ambientDust) {
    const a = Math.min(d.life / d.maxLife, 1) * 0.35;
    ctx.fillStyle = biome.dustColor + a + ')';
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
  }
}

function spawnParticles(tx, ty, color, count=6) {
  for (let i=0; i<count; i++) particles.push({ x: tx*TILE_SIZE+TILE_SIZE/2, y: ty*TILE_SIZE+TILE_SIZE/2, vx: (Math.random()*5)-2.5, vy: (Math.random()*4)-4, life: 1.0, size: Math.random()*4+2, color });
}

function spawnExplosionParticles(tx, ty, color) {
  for (let i=0; i<20; i++) {
    const angle = (Math.PI*2/20)*i + Math.random()*0.3, speed = Math.random()*5+2;
    particles.push({ x: tx*TILE_SIZE+TILE_SIZE/2, y: ty*TILE_SIZE+TILE_SIZE/2, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 2, life: 1.0, size: Math.random()*6+3, color });
  }
}

function updateParticles() {
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.vy += 0.2; p.x += p.vx; p.y += p.vy; p.life -= 0.04;
    if (p.life<=0) particles.splice(i,1);
  }
}

function addFloat(x, y, text, color='#ffffff') { floatingTexts.push({ x, y, text, color, life:1.0, vy:-1.2 }); }

function updateFloats() {
  for (let i=floatingTexts.length-1; i>=0; i--) {
    const f = floatingTexts[i];
    f.y += f.vy; f.vy *= 0.97; f.life -= 0.025;
    if (f.life<=0) floatingTexts.splice(i,1);
  }
}

function spawnGhost(forced=false) {
  const maxGhosts = Math.min(4, 1 + Math.floor(depth / 50));
  if (!forced && ghosts.length >= maxGhosts) return;
  let gx, gy, tries=0;
  do { gx = Math.floor(Math.random()*COLS); gy = Math.floor(Math.random()*ROWS); tries++; }
  while (tries < 20 && Math.abs(gx-player.x)+Math.abs(gy-player.y) < 5);
  ghosts.push({ x:gx, y:gy, lastMove:performance.now(), phase:Math.random()*Math.PI*2, striking:null, stunnedUntil:0, _gid: ghostIdCounter++ });
}

function getOilDrainMult() {
  let mult = oblivionActive ? 6 : 1;
  for (const e of timedEffects) { if (e.type === 'oilMult') mult = Math.max(mult, e.data); }
  return mult;
}
function getGhostSpeedMult() {
  let mult = 1;
  for (const e of timedEffects) { if (e.type === 'ghostSpeed') mult = Math.max(mult, e.data); }
  return mult;
}

function updateTimedEffects(ts) {
  timedEffects = timedEffects.filter(e => ts < e.endsAt);
}

function updateGhosts(ts) {
  if (depth >= 18 && ghosts.length === 0) spawnGhost();
  const speedMult = getGhostSpeedMult();
  let maxDanger = 0;

  for (const ghost of ghosts) {
    ghost.phase += 0.05;
    if (ts >= ghost.stunnedUntil) {
      const voidSlowMult = getActivePickaxe().ability === 'voidMastery' ? 1.25 : 1;
      const spd = Math.max(200, (1400 - depth * 4) / speedMult * voidSlowMult);
      if (ts - ghost.lastMove > spd && !ghost.striking) {
        ghost.lastMove = ts;
        const dx = Math.sign(player.x - ghost.x), dy = Math.sign(player.y - ghost.y);
        const distX = Math.abs(player.x - ghost.x), distY = Math.abs(player.y - ghost.y);
        if      (distX > distY) ghost.x += dx;
        else if (distY > distX) ghost.y += dy;
        else if (Math.random()<0.5) ghost.x += dx;
        else ghost.y += dy;
        ghost.x = Math.max(0, Math.min(COLS-1, ghost.x));
        ghost.y = Math.max(0, Math.min(ROWS-1, ghost.y));
      }
      if (ghost.x === player.x && ghost.y === player.y) {
        if (!ghost.striking) { ghost.striking = ts; }
        else if (ts - ghost.striking > 600) {
          const shieldBonus = (getActivePickaxe().ability === 'spiritShield' || getActivePickaxe().ability === 'voidMastery') ? 5 : 0;
          const oilDrain = Math.max(5, 25 - upgWard * 5 - shieldBonus);
          lanternOil = Math.max(0, lanternOil - oilDrain);
          shakeTimer = 25; SFX.ghostHit();
          const wardMsg = (upgWard > 0 || shieldBonus > 0) ? `🛡 -${oilDrain} OIL` : `-${oilDrain} OIL`;
          addFloat(player.x*TILE_SIZE+TILE_SIZE/2, player.y*TILE_SIZE, wardMsg, (upgWard > 0 || shieldBonus > 0) ? '#aa88ff' : '#ff4444');
          spawnParticles(player.x, player.y, (upgWard > 0 || shieldBonus > 0) ? '#aa88ff' : '#9933cc', 10);

          // soulHarvest: track hits on each ghost — 3 hits banishes it for 8 shards
          if (getActivePickaxe().ability === 'soulHarvest') {
            const gid = ghost._gid;
            pickGhostStunCounts[gid] = (pickGhostStunCounts[gid] || 0) + 1;
            if (pickGhostStunCounts[gid] >= 3) {
              delete pickGhostStunCounts[gid];
              shards += 8; totalScore += 80;
              spawnParticles(ghost.x, ghost.y, '#cc44ff', 16);
              addFloat(ghost.x*TILE_SIZE+TILE_SIZE/2, ghost.y*TILE_SIZE, '💀 SOUL +8', '#cc44ff');
              SFX.gem();
              ghost._banished = true; // mark for removal after loop
            } else {
              addFloat(ghost.x*TILE_SIZE+TILE_SIZE/2, ghost.y*TILE_SIZE-16, `💀 ${pickGhostStunCounts[gid]}/3`, '#cc44ff');
            }
          }

          ghost.x = Math.floor(Math.random()*COLS); ghost.y = 0; ghost.striking = null;
        }
      } else { ghost.striking = null; }
    }
    const dist = Math.abs(ghost.x-player.x) + Math.abs(ghost.y-player.y);
    const danger = dist < 4 ? (1-dist/4)*0.35 : 0;
    if (danger > maxDanger) maxDanger = danger;
  }
  ghostWarningAlpha += (maxDanger - ghostWarningAlpha) * 0.08;
  // Remove banished ghosts (soulHarvest)
  if (ghosts.some(g => g._banished)) {
    ghosts = ghosts.filter(g => !g._banished);
  }
}

function triggerDepthEvent(d) {
  const ev = DEPTH_EVENTS[d];
  if (!ev || triggeredEvents.has(d)) return;
  triggeredEvents.add(d);
  activeEventMsg = ev.name; activeEventTimer = 300;
  addFloat(CANVAS_W/2, CANVAS_H/2-60, ev.msg, '#ff6644');
  SFX.biome();
  shakeTimer = 20;

  if (d === 50 || d === 150) {
    spawnGhost(true); // Force extra ghost
  } else if (d === 75) {
    timedEffects.push({ type:'oilMult', endsAt: performance.now()+18000, data:2.5 });
    addFloat(CANVAS_W/2, CANVAS_H/2-20, '⚠ OIL x2.5 for 18s', '#ff8800');
  } else if (d === 100) {
    // Swarm: fill up to max ghosts immediately
    const target = Math.min(4, 1 + Math.floor(d/50));
    while (ghosts.length < target) spawnGhost(true);
    timedEffects.push({ type:'ghostSpeed', endsAt: performance.now()+20000, data:1.8 });
    addFloat(CANVAS_W/2, CANVAS_H/2-20, '⚠ SPIRITS ACCELERATED', '#ff4444');
  } else if (d === 130) {
    timedEffects.push({ type:'oilMult', endsAt: performance.now()+22000, data:3 });
    addFloat(CANVAS_W/2, CANVAS_H/2-20, '⚠ OIL x3 for 22s', '#ff4400');
  } else if (d === 180) {
    timedEffects.push({ type:'oilMult', endsAt: performance.now()+25000, data:4 });
    timedEffects.push({ type:'ghostSpeed', endsAt: performance.now()+25000, data:2 });
    addFloat(CANVAS_W/2, CANVAS_H/2-20, '⚠ VOID HUNGER ACTIVE', '#cc00ff');
  } else if (d === 200) {
    const target = 4;
    while (ghosts.length < target) spawnGhost(true);
    timedEffects.push({ type:'ghostSpeed', endsAt: performance.now()+30000, data:2.5 });
    timedEffects.push({ type:'oilMult',   endsAt: performance.now()+30000, data:2 });
    addFloat(CANVAS_W/2, CANVAS_H/2-20, '⚠ THE SIEGE - 30s', '#ff0000');
  } else if (d === 250) {
    timedEffects.push({ type:'oilMult', endsAt: performance.now()+30000, data:5 });
    addFloat(CANVAS_W/2, CANVAS_H/2-20, '⚠ OIL x5 FOR 30s', '#ff6600');
  } else if (d === 300) {
    oblivionActive = true; // permanent darkness — handled directly in drain/vignette logic
    while (ghosts.length < 4) spawnGhost(true);
    timedEffects.push({ type:'ghostSpeed', endsAt: performance.now()+99999999, data:3 });
  }
}

function doExplosion(cx, cy) {
  SFX.explosion(); shakeTimer = 30;
  const biome = getBiome(depth);
  spawnExplosionParticles(cx, cy, biome.accentColor);
  addFloat(cx*TILE_SIZE+TILE_SIZE/2, cy*TILE_SIZE-10, '💥 BOOM!', '#ff9900');
  
  // Stun any nearby ghost (radius scales with upgPick tier)
  const stunRadius = 3 + upgPick;
  for (const g of ghosts) {
    if (Math.abs(g.x - cx) + Math.abs(g.y - cy) <= stunRadius) {
      g.stunnedUntil = performance.now() + 3000; g.striking = null;
      addFloat(g.x*TILE_SIZE+TILE_SIZE/2, g.y*TILE_SIZE, 'STUNNED!', '#aaaaaa');
    }
  }

  let clearedCount = 0;
  for (let dy=-1; dy<=1; dy++) {
    for (let dx=-1; dx<=1; dx++) {
      const nx=cx+dx, ny=cy+dy;
      if (nx>=0&&nx<COLS&&ny>=0&&ny<ROWS) {
        if (grid[ny][nx].type===TILE_BLOCK||grid[ny][nx].type===TILE_HARD) {
          grid[ny][nx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };
          spawnParticles(nx, ny, biome.particleColor, 3);
          clearedCount++;
        }
      }
    }
  }
  grid[cy][cx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };

  // Oil cost reduced to 3; large blasts (5+ blocks) refund 8 oil
  if (clearedCount >= 5) {
    lanternOil = Math.min(maxOil, lanternOil + 8);
    addFloat(cx*TILE_SIZE+TILE_SIZE/2, cy*TILE_SIZE+20, '+8 OIL SURGE', '#ffaa33');
  } else {
    lanternOil = Math.max(0, lanternOil - 3);
  }
}

const keys = {};
let heldInterval = null;

function handleGameOverDeath() {
  if (deathFading) return;
  deathFading = true;
  SFX.death();
  savedShards += shards;
  prevDepthRecord = depthRecord; // snapshot before we potentially overwrite it
  if (depth > depthRecord) {
    wasNewRecord = true;
    highScoreReward = Math.max(5, Math.floor(depth / 8));
    savedShards += highScoreReward;
    depthRecord = depth;
    lsSet('bts_depthRec', depthRecord);
  }
  saveProgress();
  // Auto-submit score using stored player name — no name prompt needed
  pendingRunData = { depth, score: totalScore, biome: getBiome(depth).name };
  submitScore(playerName || 'MINER', pendingRunData.depth, pendingRunData.score, pendingRunData.biome);
  pendingRunData = null;
}

let shopFeedback = '';
let shopFeedbackTimer = 0;
const MAX_LIGHT = 5;
const MAX_WARD  = 3;
const MAX_GREED = 3;
const MAX_PICK  = 2;   // Tier 1: one-hit hard; Tier 2: shockwave splash on hard break
const MAX_SENSE = 1;   // Ghost Sense: directional arrow to nearest spirit

function buyUpgrade(type) {
  if (type === 'oil') {
    const cost = 50 * (upgOil + 1);
    if (savedShards >= cost) {
      savedShards -= cost; upgOil++; SFX.buy(); saveProgress();
      shopFeedback = `✅ Lantern Oil upgraded to Lvl ${upgOil}!`; shopFeedbackTimer = 120;
    } else {
      shopFeedback = `❌ Not enough shards! Need 💎 ${cost}`; shopFeedbackTimer = 90;
    }
  } else if (type === 'pick') {
    if (upgPick >= MAX_PICK) { shopFeedback = '❌ Max level reached!'; shopFeedbackTimer = 90; return; }
    const pickCosts = [250, 450];
    const cost = pickCosts[upgPick];
    if (savedShards >= cost) {
      savedShards -= cost; upgPick++; SFX.buy(); saveProgress();
      const msgs = ['✅ Void Pickaxe unlocked! Hard rock crumbles in one hit.', '✅ Shockwave unlocked! Hard breaks crack nearby stone.'];
      shopFeedback = msgs[upgPick-1]; shopFeedbackTimer = 120;
    } else {
      shopFeedback = `❌ Not enough shards! Need 💎 ${cost}`; shopFeedbackTimer = 90;
    }
  } else if (type === 'sense') {
    if (upgSense >= MAX_SENSE) { shopFeedback = '❌ Already owned!'; shopFeedbackTimer = 90; return; }
    const cost = 120;
    if (savedShards >= cost) {
      savedShards -= cost; upgSense++; SFX.buy(); saveProgress();
      shopFeedback = '✅ Ghost Sense active! Arrow shows nearest spirit.'; shopFeedbackTimer = 120;
    } else {
      shopFeedback = `❌ Not enough shards! Need 💎 ${cost}`; shopFeedbackTimer = 90;
    }
  } else if (type === 'light') {
    if (upgLight >= MAX_LIGHT) { shopFeedback = '❌ Max level reached!'; shopFeedbackTimer = 90; return; }
    const cost = 75 * (upgLight + 1);
    if (savedShards >= cost) {
      savedShards -= cost; upgLight++; SFX.buy(); saveProgress();
      shopFeedback = upgLight >= MAX_LIGHT ? '✅ Radiance maxed out!' : `✅ Radiance upgraded to Lvl ${upgLight}!`;
      shopFeedbackTimer = 120;
    } else {
      shopFeedback = `❌ Not enough shards! Need 💎 ${cost}`; shopFeedbackTimer = 90;
    }
  } else if (type === 'ward') {
    if (upgWard >= MAX_WARD) { shopFeedback = '❌ Max level reached!'; shopFeedbackTimer = 90; return; }
    const cost = 100 * (upgWard + 1);
    if (savedShards >= cost) {
      savedShards -= cost; upgWard++; SFX.buy(); saveProgress();
      shopFeedback = upgWard >= MAX_WARD ? '✅ Spirit Ward maxed out!' : `✅ Spirit Ward upgraded to Lvl ${upgWard}!`;
      shopFeedbackTimer = 120;
    } else {
      shopFeedback = `❌ Not enough shards! Need 💎 ${cost}`; shopFeedbackTimer = 90;
    }
  } else if (type === 'greed') {
    if (upgGreed >= MAX_GREED) { shopFeedback = '❌ Max level reached!'; shopFeedbackTimer = 90; return; }
    const cost = 80 * (upgGreed + 1);
    if (savedShards >= cost) {
      savedShards -= cost; upgGreed++; SFX.buy(); saveProgress();
      shopFeedback = upgGreed >= MAX_GREED ? '✅ Greedy Grasp maxed out!' : `✅ Greedy Grasp upgraded to Lvl ${upgGreed}!`;
      shopFeedbackTimer = 120;
    } else {
      shopFeedback = `❌ Not enough shards! Need 💎 ${cost}`; shopFeedbackTimer = 90;
    }
  }
}

document.addEventListener('keydown', e => {
  ensureAudio();

  // Register screen — one-time name entry at first launch
  if (gameState === 'REGISTER') {
    if (e.code === 'Enter' || e.code === 'Space') {
      if (registerInput.length > 0) {
        playerName = registerInput.toUpperCase();
        lsSet('bts_playerName', playerName);
        gameState = 'START';
      }
      return;
    }
    if (e.code === 'Backspace') { registerInput = registerInput.slice(0, -1); SFX.nameType(); return; }
    // Alphanumeric only
    if (e.key.length === 1 && /^[a-zA-Z0-9]$/.test(e.key) && registerInput.length < 12) {
      registerInput += e.key.toUpperCase(); SFX.nameType();
    }
    return;
  }

  if (gameState === 'START') {
    if (e.code === 'Space') initGame();
    if (e.code === 'KeyS') gameState = 'SHOP';
    if (e.code === 'KeyL') gameState = 'LEADERBOARD';
    if (e.code === 'KeyW') { gameState = 'WHEEL'; wheelResult = -1; wheelResultTimer = 0; }
    if (e.code === 'KeyA') { gameState = 'ARMORY'; armoryScrollY = 0; }
    if (e.code === 'Slash' || e.key === '?') { helpScrollY = 0; helpFromState = 'START'; gameState = 'HELP'; }
    return;
  }
  if (gameState === 'SHOP') {
    if (e.code === 'Escape' || e.code === 'Space') gameState = 'START';
    if (e.code === 'Digit1') buyUpgrade('oil');
    if (e.code === 'Digit2') buyUpgrade('pick');
    if (e.code === 'Digit3') buyUpgrade('light');
    if (e.code === 'Digit4') buyUpgrade('ward');
    if (e.code === 'Digit5') buyUpgrade('greed');
    if (e.code === 'Digit6') buyUpgrade('sense');
    return;
  }
  if (gameState === 'LEADERBOARD') {
    if (e.code === 'Escape' || e.code === 'Space') gameState = 'START';
    return;
  }
  if (gameState === 'ARMORY') {
    if (e.code === 'Escape' || e.code === 'Space') { gameState = 'START'; return; }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') { armoryScrollY = Math.min(armoryMaxScroll, armoryScrollY + 80); return; }
    if (e.code === 'ArrowUp'   || e.code === 'KeyW') { armoryScrollY = Math.max(0, armoryScrollY - 80); return; }
    return;
  }
  if (gameState === 'WHEEL') {
    if (e.code === 'Escape' && !wheelSpinning) { gameState = 'START'; return; }
    if (e.code === 'Space' && !wheelSpinning) spinWheel();
    return;
  }
  if (gameState === 'PAUSED') {
    if (e.code === 'Escape' || e.code === 'Space') { gameState = prevGameState; }
    return;
  }
  if (gameState === 'HELP') {
    if (e.code === 'Escape' || e.code === 'Space' || e.code === 'Enter') { gameState = helpFromState; return; }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') { helpScroll(80); return; }
    if (e.code === 'ArrowUp'   || e.code === 'KeyW') { helpScroll(-80); return; }
    return;
  }
  if ((gameState === 'GAMEOVER' || gameState === 'HIGHSCORE') && (e.code === 'Space' || e.code === 'Enter')) {
    hsParticles = []; gameState = 'START'; return;
  }

  if (gameState === 'PLAYING' && e.code === 'Escape') {
    prevGameState = 'PLAYING'; gameState = 'PAUSED'; pauseShowControls = false; return;
  }

  if (!keys[e.code]) { keys[e.code] = true; tryMove(e.code); }
  clearInterval(heldInterval);
  heldInterval = setInterval(() => { if(gameState==='PLAYING') tryMove(e.code); }, MOVE_DEBOUNCE());
});
document.addEventListener('keyup', e => { keys[e.code] = false; clearInterval(heldInterval); });

canvas.addEventListener('wheel', e => {
  if (gameState === 'HELP') { e.preventDefault(); helpScroll(e.deltaY * 0.6); }
  if (gameState === 'ARMORY') {
    e.preventDefault();
    armoryScrollY = Math.max(0, Math.min(armoryMaxScroll, armoryScrollY + e.deltaY * 0.6));
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (gameState === 'HELP' && helpDragStart !== null) {
    const dy = helpDragStart - e.touches[0].clientY;
    const scale = getCanvasScale();
    const HEADER_H = 54, FOOTER_H = 52;
    const bodyH = CANVAS_H - HEADER_H - FOOTER_H;
    const maxScroll = Math.max(0, helpContentHeight - bodyH);
    helpScrollY = Math.max(0, Math.min(maxScroll, helpDragScrollStart + dy / scale));
  }
  if (gameState === 'ARMORY' && touchStart !== null) {
    const dy = touchStart.y - e.touches[0].clientY;
    const scale = getCanvasScale();
    armoryScrollY = Math.max(0, Math.min(armoryMaxScroll, armoryDragScrollStart + dy / scale));
  }
}, { passive: true });

// Shop item hit zones (for click/tap): [y_top, y_bot, upgrade_type]
const SHOP_ZONES = [
  [134, 188, 'oil'],
  [196, 250, 'pick'],
  [258, 312, 'light'],
  [320, 374, 'ward'],
  [382, 436, 'greed'],
  [444, 498, 'sense'],
];

function getCanvasScale() {
  return parseFloat(canvas.style.width) / CANVAS_W;
}

function shopClickAt(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scale = getCanvasScale();
  const cx = (clientX - rect.left) / scale;
  const cy = (clientY - rect.top)  / scale;
  for (const [yt, yb, type] of SHOP_ZONES) {
    if (cy >= yt && cy <= yb && cx >= 20 && cx <= CANVAS_W - 20) {
      buyUpgrade(type); return;
    }
  }
}

canvas.addEventListener('click', e => {
  ensureAudio();
  if (gameState === 'HELP')   { helpClick(e.clientX, e.clientY); return; }
  if (gameState === 'PAUSED') { pauseMenuClick(e.clientX, e.clientY); return; }
  if (gameState === 'SHOP') { shopClickAt(e.clientX, e.clientY); return; }
  if (gameState === 'ARMORY') { armoryClickAt(e.clientX, e.clientY); return; }
  if (gameState === 'START') {
    // Check nav button clicks (SHOP, LEADERBOARD, WHEEL, ARMORY, HELP)
    const rect0 = canvas.getBoundingClientRect();
    const scale0 = getCanvasScale();
    const cx0 = (e.clientX - rect0.left) / scale0;
    const cy0 = (e.clientY - rect0.top)  / scale0;
    // 5 cards: nwCard=66, nGap=7, totalNavW=5*66+4*7=358, navStartX=21, navY=502, nHCard=64
    const navStartX0 = (CANVAS_W - (5*66+4*7)) / 2; // ~21
    const navY0 = 502, nwCard0 = 66, nHCard0 = 64, nGap0 = 7;
    if (cy0 >= navY0 && cy0 <= navY0 + nHCard0) {
      const navActions = ['shop','leaderboard','wheel','armory','help'];
      for (let i=0; i<5; i++) {
        const nx = navStartX0 + i*(nwCard0+nGap0);
        if (cx0 >= nx && cx0 <= nx+nwCard0) {
          const act = navActions[i];
          if (act === 'shop')        { gameState = 'SHOP'; return; }
          if (act === 'leaderboard') { gameState = 'LEADERBOARD'; return; }
          if (act === 'wheel')       { gameState = 'WHEEL'; wheelResult = -1; wheelResultTimer = 0; return; }
          if (act === 'armory')      { gameState = 'ARMORY'; armoryScrollY = 0; return; }
          if (act === 'help')        { helpScrollY = 0; helpFromState = 'START'; gameState = 'HELP'; return; }
        }
      }
    }
    initGame(); return;
  }
  if (gameState === 'GAMEOVER' || gameState === 'HIGHSCORE') { hsParticles=[]; gameState = 'START'; return; }
  if (gameState === 'LEADERBOARD') { gameState = 'START'; return; }
  if (gameState === 'WHEEL') {
    const rect = canvas.getBoundingClientRect();
    const scale = getCanvasScale();
    const cx = (e.clientX - rect.left) / scale;
    const cy = (e.clientY - rect.top)  / scale;
    // Spin button at bottom center
    if (cy > 680 && cy < 740 && cx > 80 && cx < 320 && !wheelSpinning) { spinWheel(); return; }
    if (cy > 750 && !wheelSpinning) { gameState = 'START'; return; }
  }
  if (gameState === 'REGISTER') {
    if (registerInput.length > 0) {
      playerName = registerInput.toUpperCase();
      lsSet('bts_playerName', playerName);
      gameState = 'START';
    }
    return;
  }
  // Pause button click during PLAYING
  if (gameState === 'PLAYING') {
    const rect = canvas.getBoundingClientRect();
    const scale = getCanvasScale();
    const cx = (e.clientX - rect.left) / scale;
    const cy = (e.clientY - rect.top)  / scale;
    // Pause button: inside top HUD bar, top-right, 34×34
    if (cx >= CANVAS_W - 42 && cx <= CANVAS_W - 8 && cy >= 8 && cy <= 42) {
      prevGameState = 'PLAYING'; gameState = 'PAUSED'; pauseShowControls = false;
    }
  }
});

let touchStart = null;
let armoryDragScrollStart = 0;
canvas.addEventListener('touchstart', e => {
  ensureAudio();
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (gameState === 'HELP') {
    helpDragStart = e.touches[0].clientY;
    helpDragScrollStart = helpScrollY;
  }
  if (gameState === 'ARMORY') {
    armoryDragScrollStart = armoryScrollY;
  }
}, {passive:true});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const touch = e.changedTouches[0];
  const dx = touch.clientX - touchStart.x, dy = touch.clientY - touchStart.y;
  touchStart = null;
  if (gameState === 'SHOP') {
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) { shopClickAt(touch.clientX, touch.clientY); }
    return;
  }
  if (gameState === 'ARMORY') {
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) { armoryClickAt(touch.clientX, touch.clientY); }
    else if (Math.abs(dy) > Math.abs(dx)) { armoryScrollY = Math.max(0, Math.min(armoryMaxScroll, armoryScrollY - dy * 0.5 / getCanvasScale())); }
    return;
  }
  if (gameState === 'PAUSED') {
    pauseMenuClick(touch.clientX, touch.clientY);
    return;
  }
  if (gameState === 'HELP') {
    helpDragStart = null;
    if (Math.abs(dy) < 10) { helpClick(touch.clientX, touch.clientY); }
    return;
  }
  if (gameState === 'LEADERBOARD') { gameState = 'START'; return; }
  if (gameState === 'WHEEL') {
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20 && !wheelSpinning) spinWheel();
    return;
  }
  if (gameState === 'NAME_ENTRY' || gameState === 'REGISTER') {
    if (registerInput.length > 0) {
      playerName = registerInput.toUpperCase();
      lsSet('bts_playerName', playerName);
      gameState = 'START';
    }
    return;
  }
  if (gameState==='START'||gameState==='GAMEOVER'||gameState==='HIGHSCORE') {
    hsParticles=[];
    if (gameState==='HIGHSCORE'||gameState==='GAMEOVER') { gameState='START'; return; }
    // START: check nav buttons before starting the game
    const rectN = canvas.getBoundingClientRect();
    const scaleN = getCanvasScale();
    const cxN = (touch.clientX - rectN.left) / scaleN;
    const cyN = (touch.clientY - rectN.top)  / scaleN;
    const navStartXN = (CANVAS_W - (5*66+4*7)) / 2;
    const navYN = 502, nwCardN = 66, nHCardN = 64, nGapN = 7;
    if (cyN >= navYN && cyN <= navYN + nHCardN) {
      const navActions = ['shop','leaderboard','wheel','armory','help'];
      for (let i=0; i<5; i++) {
        const nxN = navStartXN + i*(nwCardN+nGapN);
        if (cxN >= nxN && cxN <= nxN+nwCardN) {
          const act = navActions[i];
          if (act === 'shop')        { gameState = 'SHOP'; return; }
          if (act === 'leaderboard') { gameState = 'LEADERBOARD'; return; }
          if (act === 'wheel')       { gameState = 'WHEEL'; wheelResult = -1; wheelResultTimer = 0; return; }
          if (act === 'armory')      { gameState = 'ARMORY'; armoryScrollY = 0; return; }
          if (act === 'help')        { helpScrollY = 0; helpFromState = 'START'; gameState = 'HELP'; return; }
        }
      }
    }
    initGame(); return;
  }
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    // Check pause button tap
    if (gameState === 'PLAYING') {
      const rect2 = canvas.getBoundingClientRect();
      const scale2 = getCanvasScale();
      const tx2 = (touch.clientX - rect2.left) / scale2;
      const ty2 = (touch.clientY - rect2.top)  / scale2;
      if (tx2 >= CANVAS_W-42 && tx2 <= CANVAS_W-8 && ty2 >= 8 && ty2 <= 42) {
        prevGameState = 'PLAYING'; gameState = 'PAUSED'; pauseShowControls = false; return;
      }
    }
    return;
  }
  if (Math.abs(dx) > Math.abs(dy)) tryMove(dx>0?'ArrowRight':'ArrowLeft'); else tryMove(dy>0?'ArrowDown':'ArrowUp');
}, {passive:true});

function tryMove(code) {
  if (gameState!=='PLAYING') return;
  const now = performance.now();
  if (now - lastMoveTime < MOVE_DEBOUNCE()) return;
  lastMoveTime = now;
  let dx=0, dy=0;
  if (code==='ArrowLeft' ||code==='KeyA') dx=-1;
  if (code==='ArrowRight'||code==='KeyD') dx= 1;
  if (code==='ArrowUp'   ||code==='KeyW') dy=-1;
  if (code==='ArrowDown' ||code==='KeyS') dy= 1;
  if (!dx && !dy) return;

  const tx=player.x+dx, ty=player.y+dy;
  if (tx<0||tx>=COLS||ty<0||ty>=ROWS) return;
  
  const cell = grid[ty][tx];
  const type = cell.type;
  const biome = getBiome(depth);
  const pickAbility = getActivePickaxe().ability;

  // Phase Clip: 15% chance to pass through any block
  if ((type === TILE_BLOCK || type === TILE_HARD) && pickAbility === 'phaseClip' && Math.random() < 0.15) {
    grid[ty][tx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };
    spawnParticles(tx, ty, '#aa66ff', 8);
    addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE, '👻 PHASE!', '#aa66ff');
    player.x=tx; player.y=ty;
    if (player.y > ROWS/2) scrollWorld();
    return;
  }

  player.trail.push({ x:player.x, y:player.y, life:0.8 });
  if (player.trail.length > 5) player.trail.shift();

  if (type===TILE_BLOCK) {
    cell.hp--;
    if (cell.hp <= 0) grid[ty][tx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };
    spawnParticles(tx, ty, biome.particleColor);
    // voidMastery: oil drain 25% slower (min 1)
    const oilCost = pickAbility === 'voidMastery' ? Math.max(1, Math.floor((Math.min(2, 1 + depth/25)) * 0.75)) : Math.min(2, 1 + depth/25);
    shakeTimer = 10; lanternOil = Math.max(0, lanternOil - oilCost); SFX.dig();
    // oilRegen: +1 oil on every block dig
    if (pickAbility === 'oilRegen') { lanternOil = Math.min(maxOil, lanternOil + 1); }
    // Midas: every 10th dig drops a free shard
    if (pickAbility === 'midas' || pickAbility === 'voidMastery') {
      pickMidasCounter++;
      if (pickMidasCounter >= 10) {
        pickMidasCounter = 0;
        shards += 1; totalScore += 10;
        addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE-16, '👑 MIDAS +1', '#ffd700');
        spawnParticles(tx, ty, '#ffd700', 6);
      }
    }
    handleCombo(tx, ty);
  } else if (type===TILE_HARD) {
    // voidMastery: one-hit hard
    if (pickAbility === 'voidMastery') { cell.hp = 0; }
    cell.hp--;
    SFX.hardDig();
    if (cell.hp <= 0) {
      grid[ty][tx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };
      spawnParticles(tx, ty, biome.hardAccent, 10);
      shakeTimer = 18; lanternOil = Math.max(0, lanternOil-4);
      handleCombo(tx, ty);
      addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE, 'CRUSHED!', biome.hardAccent);
      // Tier-2 shockwave: crack adjacent hard blocks
      if (upgPick >= 2) {
        let cracked = 0;
        for (let sy=-1; sy<=1; sy++) for (let sx=-1; sx<=1; sx++) {
          if (sx===0&&sy===0) continue;
          const nx=tx+sx, ny=ty+sy;
          if (nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&grid[ny][nx].type===TILE_HARD) {
            grid[ny][nx].hp = Math.max(0, grid[ny][nx].hp - 1);
            if (grid[ny][nx].hp <= 0) { grid[ny][nx] = { type:TILE_EMPTY, hp:0, maxHp:0 }; spawnParticles(nx,ny,biome.hardAccent,5); cracked++; }
          }
        }
        if (cracked > 0) addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE-20, `⚡ SHOCKWAVE x${cracked}`, '#eeddff');
      }
      // deepFreeze: freeze ALL nearby spirits on hard break
      if (pickAbility === 'deepFreeze' || pickAbility === 'voidMastery') {
        let frozenCount = 0;
        for (const g of ghosts) {
          if (Math.abs(g.x-tx)+Math.abs(g.y-ty) <= 6) {
            g.stunnedUntil = performance.now() + 3000; g.striking = null; frozenCount++;
          }
        }
        if (frozenCount > 0) { SFX.freeze(); addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE-20, `🧊 FREEZE x${frozenCount}`, '#88ddff'); }
      }
      // chainLightning: arc to 2 adjacent blocks, destroy instantly
      if (pickAbility === 'chainLightning') {
        let arced = 0;
        const candidates = [];
        for (let sy=-2; sy<=2; sy++) for (let sx=-2; sx<=2; sx++) {
          if (sx===0&&sy===0) continue;
          const nx=tx+sx, ny=ty+sy;
          if (nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&(grid[ny][nx].type===TILE_HARD||grid[ny][nx].type===TILE_BLOCK)) candidates.push({nx,ny});
        }
        candidates.sort(()=>Math.random()-0.5);
        for (let c=0; c<Math.min(2,candidates.length); c++) {
          const {nx,ny}=candidates[c];
          grid[ny][nx] = { type:TILE_EMPTY, hp:0, maxHp:0 };
          spawnParticles(nx, ny, '#ffee44', 8);
          lightningArcs.push({ x1:tx, y1:ty, x2:nx, y2:ny, life:1.0 });
          arced++;
        }
        if (arced > 0) addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE-20, `⚡ CHAIN x${arced}`, '#ffee44');
      }
    } else {
      spawnParticles(tx, ty, biome.hardAccent, 4);
      shakeTimer = 8; lanternOil = Math.max(0, lanternOil-3);
      addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE, 'HIT!', biome.hardAccent);
    }
    // oilRegen: +1 oil on every dig, including hard blocks
    if (pickAbility === 'oilRegen') { lanternOil = Math.min(maxOil, lanternOil + 1); }
  } else if (type===TILE_EXPLOSIVE) {
    doExplosion(tx, ty); player.x=tx; player.y=ty;
  } else {
    if (type===TILE_LAMP) {
      grid[ty][tx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };
      lanternOil = Math.min(maxOil, lanternOil+25);
      SFX.lamp(); addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE, '+25 OIL', '#ffaa00');
    } else if (type===TILE_SHARD) {
      grid[ty][tx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };
      const bonus = Math.floor(comboCount/3);
      const greedBonus = upgGreed;
      const doubleBonus = (runDoubleGems || pickAbility === 'voidMastery') ? 1 : 0;
      const gemPickBonus = (pickAbility === 'gemPlus1') ? 1 : 0;
      shards += 1+bonus+greedBonus+doubleBonus+gemPickBonus; totalScore += 10*(1+bonus); SFX.gem();
      const totalGain = 1+bonus+greedBonus+doubleBonus+gemPickBonus;
      const suffix = (runDoubleGems || pickAbility==='voidMastery') ? ' ×2!' : '';
      addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE, (greedBonus>0||doubleBonus>0||gemPickBonus>0) ? `💎x${totalGain}${suffix}` : (bonus>0?`💎x${totalGain}`:'💎 +1'), (runDoubleGems||pickAbility==='voidMastery') ? '#ffe066' : (greedBonus>0||gemPickBonus>0 ? '#ffe066' : '#44ddff'));
    } else if (type===TILE_TREASURE) {
      grid[ty][tx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };
      const greedBonus = Math.ceil(upgGreed * 1.5);
      shards += 5+greedBonus; totalScore += 100; lanternOil = Math.min(maxOil, lanternOil+15);
      SFX.treasure(); shakeTimer = 12; spawnParticles(tx, ty, '#ffdd00', 12);
      addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE, greedBonus>0 ? `💰 TREASURE! +${5+greedBonus}` : '💰 TREASURE!', '#ffdd00');
    } else if (type===TILE_VCRYSTAL) {
      grid[ty][tx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };
      const greedBonus = upgGreed;
      shards += 3+greedBonus; totalScore += 50; lanternOil = Math.min(maxOil, lanternOil+10);
      SFX.gem(); spawnParticles(tx, ty, getBiome(depth).accentColor, 10);
      addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE, greedBonus>0 ? `✨ VOID CRYSTAL +${3+greedBonus}` : '✨ VOID CRYSTAL', getBiome(depth).accentColor);
      // Freeze nearby ghosts for 2.5 seconds
      let frozenCount = 0;
      for (const g of ghosts) {
        if (Math.abs(g.x-tx)+Math.abs(g.y-ty) <= 5) {
          g.stunnedUntil = performance.now() + 2500; g.striking = null; frozenCount++;
        }
      }
      if (frozenCount > 0) { SFX.freeze(); addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE-18, `🧊 SPIRITS FROZEN!`, '#88eeff'); }
    } else if (type===TILE_FLASK) {
      grid[ty][tx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };
      const refill = Math.floor(maxOil * 0.4);
      lanternOil = Math.min(maxOil, lanternOil + refill);
      totalScore += 30; SFX.flask();
      spawnParticles(tx, ty, '#ff9933', 12);
      addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE, `🧪 +${refill} OIL!`, '#ff9933');
    } else if (type===TILE_LAVA) {
      grid[ty][tx] = { type: TILE_EMPTY, hp: 0, maxHp: 0 };
      const burn = 18;
      lanternOil = Math.max(0, lanternOil - burn);
      shakeTimer = 20; SFX.lava();
      spawnParticles(tx, ty, '#ff4400', 14);
      addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE, `🔥 -${burn} OIL`, '#ff4400');
    }
    player.x=tx; player.y=ty;
    if (player.y > ROWS/2) scrollWorld();
  }
}

function handleCombo(tx, ty) {
  const now = performance.now();
  if (now - lastDigTime < COMBO_WINDOW) {
    comboCount++;
    if (comboCount >= 2) { SFX.combo(comboCount); addFloat(tx*TILE_SIZE+TILE_SIZE/2, ty*TILE_SIZE-20, `COMBO x${comboCount}!`, '#ffcc00'); totalScore += comboCount * 5; }
  } else { comboCount = 1; }
  lastDigTime = now; totalScore += 1;
}

function scrollWorld() {
  depth++; totalScore += 2;
  grid.shift(); grid.push(generateRow(depth));
  player.y--;
  for (const g of ghosts) {
    g.y--;
    if (g.y < 0) { g.x = Math.floor(Math.random()*COLS); g.y = ROWS-1; g.striking = null; }
  }
  triggerDepthEvent(depth);
  if (MILESTONES[depth] && !shownMilestones.has(depth)) { milestoneMsg = MILESTONES[depth]; milestoneTimer = 180; shownMilestones.add(depth); }
  // Father's journal: show entries at depth milestones — min 100m apart
  if (FATHER_JOURNAL[depth] && !shownJournalEntries.has(depth) && (depth - lastJournalDepth) >= 100) {
    shownJournalEntries.add(depth);
    journalMsg = FATHER_JOURNAL[depth];
    journalTimer = 340;
    lastJournalDepth = depth;
  }
  // Milestone chime every 25m (when not coinciding with a biome change)
  const newBiome = getBiome(depth);
  if (depth % 25 === 0 && newBiome.name === currentBiomeName) SFX.milestone();
  if (newBiome.name !== currentBiomeName) { currentBiomeName = newBiome.name; biomeTransitionMsg = `⛏ ${newBiome.name.toUpperCase()}`; biomeTransTimer = 150; SFX.biome(); }
}

function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

function drawGemSparkle(px, py) { const glow = 0.5 + 0.5*Math.sin(sparkleT*0.08 + px); ctx.shadowColor = '#44ffee'; ctx.shadowBlur = 8 * glow; ctx.font = '22px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('💎', px+TILE_SIZE/2, py+TILE_SIZE/2 + Math.sin(sparkleT*0.07+px)*1.5); ctx.shadowBlur = 0; }
function drawLamp(px, py) { const flicker = 0.7 + 0.3*Math.sin(sparkleT*0.15+px*3); ctx.shadowColor = '#ffaa33'; ctx.shadowBlur = 12 * flicker; ctx.font = '22px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('🕯️', px+TILE_SIZE/2, py+TILE_SIZE/2); ctx.shadowBlur = 0; }
function drawExplosive(px, py) { ctx.fillStyle = '#2a1008'; ctx.fillRect(px+3, py+3, TILE_SIZE-6, TILE_SIZE-6); ctx.fillStyle = '#cc4400'; ctx.globalAlpha = 0.7; for (let s=0; s<4; s++) { ctx.fillRect(px + s*10, py+3, 5, TILE_SIZE-6); } ctx.globalAlpha = 1; ctx.font = '18px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.globalAlpha = Math.sin(sparkleT*0.2) > 0 ? 1 : 0.6; ctx.fillText('💣', px+TILE_SIZE/2, py+TILE_SIZE/2); ctx.globalAlpha = 1; }
function drawTreasure(px, py) { const glow = 0.6 + 0.4*Math.sin(sparkleT*0.05+py); ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 14 * glow; ctx.font = '22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('💰', px+TILE_SIZE/2, py+TILE_SIZE/2); ctx.shadowBlur = 0; }
function drawVoidCrystal(px, py) { const glow = 0.5 + 0.5*Math.sin(sparkleT*0.06+px+py); ctx.shadowColor = getBiome(depth).accentColor; ctx.shadowBlur = 10 * glow; ctx.font = '22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🔮', px+TILE_SIZE/2, py+TILE_SIZE/2); ctx.shadowBlur = 0; }
function drawFlask(px, py) { const glow = 0.5+0.5*Math.sin(sparkleT*0.1+px); ctx.shadowColor='#ff9933'; ctx.shadowBlur=10*glow; ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🧪', px+TILE_SIZE/2, py+TILE_SIZE/2+Math.sin(sparkleT*0.09+py)*2); ctx.shadowBlur=0; }
function drawLava(px, py) {
  const pulse = 0.5+0.5*Math.sin(sparkleT*0.12+px*0.3+py*0.2);
  const pulse2 = 0.5+0.5*Math.sin(sparkleT*0.18+px*0.5);
  // Base lava pool
  const lg = ctx.createLinearGradient(px,py,px,py+TILE_SIZE);
  lg.addColorStop(0,`rgb(${220+Math.floor(pulse*35)},${50+Math.floor(pulse*40)},0)`);
  lg.addColorStop(0.5,`rgb(180,30,0)`);
  lg.addColorStop(1,`rgb(120,15,0)`);
  ctx.fillStyle=lg; ctx.fillRect(px,py,TILE_SIZE,TILE_SIZE);
  // Flowing bright veins
  ctx.globalAlpha=0.35+0.35*pulse2;
  ctx.fillStyle=`rgb(255,${120+Math.floor(pulse*80)},0)`;
  ctx.fillRect(px+3+Math.sin(sparkleT*0.1+py)*2, py+6, TILE_SIZE-8, 4);
  ctx.fillRect(px+6+Math.sin(sparkleT*0.08+px)*3, py+16, TILE_SIZE-12, 3);
  ctx.globalAlpha=0.6+0.4*pulse;
  ctx.font='18px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🔥', px+TILE_SIZE/2, py+TILE_SIZE/2);
  // Heat shimmer top-of-tile
  ctx.globalAlpha=0.15+0.15*pulse;
  ctx.fillStyle='rgba(255,200,100,1)';
  ctx.fillRect(px+2,py,TILE_SIZE-4,3);
  ctx.globalAlpha=1;
}

// Total scrollable height — computed once per draw
let helpContentHeight = 0;

function drawHelp(ts) {
  const W = CANVAS_W, H = CANVAS_H;

  // Background
  ctx.fillStyle = '#06050d';
  ctx.fillRect(0, 0, W, H);

  // Subtle stone texture overlay
  const stoneGrd = ctx.createLinearGradient(0, 0, 0, H);
  stoneGrd.addColorStop(0, 'rgba(20,15,30,0.9)');
  stoneGrd.addColorStop(1, 'rgba(8,6,14,0.95)');
  ctx.fillStyle = stoneGrd; ctx.fillRect(0, 0, W, H);

  // Ambient dust motes
  for (let i = 0; i < 10; i++) {
    const mx = (Math.sin(i * 137.5 + ts * 0.00003) * 0.5 + 0.5) * W;
    const my = ((ts * 0.000012 * (0.4 + i * 0.1) + i * 0.08) % 1.0) * H;
    const ma = 0.04 + 0.03 * Math.sin(ts * 0.0007 + i * 1.4);
    ctx.fillStyle = `rgba(180,160,120,${ma})`;
    ctx.beginPath(); ctx.arc(mx, my, 0.7, 0, Math.PI * 2); ctx.fill();
  }

  // Clip region — scrollable body (between header and footer bars)
  const HEADER_H = 54, FOOTER_H = 52;
  const bodyTop = HEADER_H, bodyH = H - HEADER_H - FOOTER_H;

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, bodyTop, W, bodyH);
  ctx.clip();

  // ── Draw all sections ─────────────────────────────────────────────────────
  const PAD = 18;
  let y = bodyTop - helpScrollY + 12;
  const sectionGap = 10;

  function drawSectionHeader(icon, title, yy) {
    // Glowing rule line
    ctx.strokeStyle = 'rgba(120,80,200,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD, yy + 1); ctx.lineTo(W - PAD, yy + 1); ctx.stroke();
    // Icon + title
    ctx.font = 'bold 15px Arial, sans-serif';
    ctx.fillStyle = 'rgba(180,140,255,0.95)';
    ctx.shadowColor = 'rgba(140,90,255,0.5)'; ctx.shadowBlur = 8;
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(icon + '  ' + title, PAD, yy + 6);
    ctx.shadowBlur = 0;
    // Accent underline
    ctx.strokeStyle = 'rgba(150,100,255,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD, yy + 25); ctx.lineTo(W - PAD, yy + 25); ctx.stroke();
    return yy + 32;
  }

  function wrapText(text, x, startY, maxW, lineH, style, color, alpha) {
    ctx.font = style; ctx.fillStyle = color; ctx.globalAlpha = alpha;
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    // Handle \n manually
    const paragraphs = text.split('\n');
    let cy = startY;
    for (const para of paragraphs) {
      if (para.trim() === '') { cy += lineH * 0.6; continue; }
      const words = para.split(' ');
      let line = '';
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line, x, cy); cy += lineH; line = word;
        } else { line = test; }
      }
      if (line) { ctx.fillText(line, x, cy); cy += lineH; }
      cy += lineH * 0.15; // inter-paragraph gap
    }
    ctx.globalAlpha = 1;
    return cy;
  }

  for (const sec of HELP_SECTIONS) {
    // Section card background
    const cardPad = 6;
    const cardStartY = y - cardPad;

    if (sec.type === 'header') {
      y = drawSectionHeader(sec.icon, sec.title, y);
      y = wrapText(sec.body, PAD + 2, y + 4, W - PAD * 2 - 4, 20, '13.5px Arial, sans-serif', 'rgba(215,200,240,0.88)', 1);
      y += sectionGap + 6;

    } else if (sec.type === 'controls') {
      y = drawSectionHeader(sec.icon, sec.title, y);
      y += 4;
      for (const [action, keys] of sec.rows) {
        // Row bg
        ctx.fillStyle = 'rgba(30,22,50,0.45)';
        roundRect(PAD - 2, y, W - PAD * 2 + 4, 24, 4); ctx.fill();
        ctx.strokeStyle = 'rgba(80,55,140,0.25)'; ctx.lineWidth = 1;
        roundRect(PAD - 2, y, W - PAD * 2 + 4, 24, 4); ctx.stroke();

        ctx.font = '13px Arial, sans-serif';
        ctx.fillStyle = 'rgba(200,185,235,0.9)';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(action, PAD + 6, y + 12);

        ctx.font = 'bold 12px Arial, sans-serif';
        ctx.fillStyle = 'rgba(160,120,255,0.95)';
        ctx.textAlign = 'right';
        ctx.fillText(keys, W - PAD - 4, y + 12);
        y += 28;
      }
      y += sectionGap + 4;

    } else if (sec.type === 'tiles') {
      y = drawSectionHeader(sec.icon, sec.title, y);
      y += 4;
      for (const [name, desc] of sec.items) {
        // Item card
        ctx.fillStyle = 'rgba(22,16,38,0.5)';
        // Estimate height: name (20px) + wrapped desc
        const descLines = Math.ceil(ctx.measureText(desc).width / (W - PAD * 2 - 16)) + 1;
        const cardH = 20 + descLines * 18 + 10;
        roundRect(PAD - 2, y, W - PAD * 2 + 4, cardH, 5); ctx.fill();
        ctx.strokeStyle = 'rgba(90,60,160,0.2)'; ctx.lineWidth = 1;
        roundRect(PAD - 2, y, W - PAD * 2 + 4, cardH, 5); ctx.stroke();

        ctx.font = 'bold 13px Arial, sans-serif';
        ctx.fillStyle = 'rgba(200,170,255,0.95)';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(name, PAD + 4, y + 6);
        y = wrapText(desc, PAD + 4, y + 22, W - PAD * 2 - 8, 18, '12.5px Arial, sans-serif', 'rgba(185,175,215,0.82)', 1);
        y += 8;
      }
      y += sectionGap;

    } else if (sec.type === 'tips') {
      y = drawSectionHeader(sec.icon, sec.title, y);
      y += 4;
      for (let ti = 0; ti < sec.items.length; ti++) {
        const tip = sec.items[ti];
        // Alternating row tint
        ctx.fillStyle = ti % 2 === 0 ? 'rgba(25,18,45,0.5)' : 'rgba(18,14,32,0.3)';
        const tipLines = Math.ceil(ctx.measureText(tip).width / (W - PAD * 2 - 26)) + 1;
        const tipH = tipLines * 18 + 12;
        roundRect(PAD - 2, y, W - PAD * 2 + 4, tipH, 4); ctx.fill();

        // Bullet
        ctx.font = 'bold 12px Arial, sans-serif';
        ctx.fillStyle = 'rgba(160,120,255,0.8)';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText('›', PAD + 4, y + 6);

        y = wrapText(tip, PAD + 16, y + 6, W - PAD * 2 - 20, 18, '12.5px Arial, sans-serif', 'rgba(210,200,235,0.88)', 1);
        y += 6;
      }
      y += sectionGap + 6;
    }
  }

  // A little breathing room at the bottom
  y += 20;
  helpContentHeight = (y + helpScrollY) - bodyTop;

  ctx.restore();

  // ── Top fade gradient (hides clipped content gracefully) ──────────────────
  const topFade = ctx.createLinearGradient(0, bodyTop, 0, bodyTop + 28);
  topFade.addColorStop(0, '#06050d'); topFade.addColorStop(1, 'rgba(6,5,13,0)');
  ctx.fillStyle = topFade; ctx.fillRect(0, bodyTop, W, 28);

  const botFade = ctx.createLinearGradient(0, H - FOOTER_H - 28, 0, H - FOOTER_H);
  botFade.addColorStop(0, 'rgba(6,5,13,0)'); botFade.addColorStop(1, '#06050d');
  ctx.fillStyle = botFade; ctx.fillRect(0, H - FOOTER_H - 28, W, 28);

  // ── Scrollbar ─────────────────────────────────────────────────────────────
  const maxScroll = Math.max(0, helpContentHeight - bodyH);
  if (maxScroll > 0) {
    const sbH = Math.max(30, (bodyH / helpContentHeight) * bodyH);
    const sbY = bodyTop + (helpScrollY / maxScroll) * (bodyH - sbH);
    ctx.fillStyle = 'rgba(100,70,180,0.15)';
    ctx.fillRect(W - 6, bodyTop, 5, bodyH);
    ctx.fillStyle = 'rgba(150,100,255,0.45)';
    roundRect(W - 5, sbY, 4, sbH, 2); ctx.fill();
  }

  // ── Header bar ────────────────────────────────────────────────────────────
  const hdrGrd = ctx.createLinearGradient(0, 0, 0, HEADER_H);
  hdrGrd.addColorStop(0, '#0e0b18'); hdrGrd.addColorStop(1, 'rgba(10,8,18,0.95)');
  ctx.fillStyle = hdrGrd; ctx.fillRect(0, 0, W, HEADER_H);
  ctx.strokeStyle = 'rgba(120,80,200,0.35)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, HEADER_H); ctx.lineTo(W, HEADER_H); ctx.stroke();

  // Title
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 20px Arial, sans-serif';
  ctx.fillStyle = 'rgba(200,170,255,0.95)';
  ctx.shadowColor = 'rgba(160,100,255,0.6)'; ctx.shadowBlur = 14;
  ctx.fillText('❓  HOW TO PLAY', W / 2, HEADER_H / 2);
  ctx.shadowBlur = 0;

  // Scroll hint (top)
  if (helpScrollY > 4) {
    ctx.font = '11px Arial, sans-serif';
    ctx.fillStyle = 'rgba(140,110,200,0.5)';
    ctx.fillText('▲  scroll up', W / 2, HEADER_H - 8);
  }

  // ── Footer bar ────────────────────────────────────────────────────────────
  const ftrGrd = ctx.createLinearGradient(0, H - FOOTER_H, 0, H);
  ftrGrd.addColorStop(0, 'rgba(10,8,18,0.95)'); ftrGrd.addColorStop(1, '#0e0b18');
  ctx.fillStyle = ftrGrd; ctx.fillRect(0, H - FOOTER_H, W, FOOTER_H);
  ctx.strokeStyle = 'rgba(120,80,200,0.35)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H - FOOTER_H); ctx.lineTo(W, H - FOOTER_H); ctx.stroke();

  // Scroll hint (bottom)
  const maxScroll2 = Math.max(0, helpContentHeight - bodyH);
  if (helpScrollY < maxScroll2 - 4) {
    ctx.font = '11px Arial, sans-serif';
    ctx.fillStyle = 'rgba(140,110,200,0.5)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('▼  scroll down', W / 2, H - FOOTER_H + 4);
  }

  // Back button
  const bx = PAD, by = H - FOOTER_H + 9, bw = 100, bh = 32;
  ctx.fillStyle = 'rgba(35,25,65,0.7)';
  roundRect(bx, by, bw, bh, 6); ctx.fill();
  ctx.strokeStyle = 'rgba(120,85,210,0.55)'; ctx.lineWidth = 1.5;
  roundRect(bx, by, bw, bh, 6); ctx.stroke();
  ctx.font = 'bold 13px Arial, sans-serif';
  ctx.fillStyle = '#c8a8ff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(150,100,255,0.4)'; ctx.shadowBlur = 5;
  ctx.fillText('← BACK', bx + bw / 2, by + bh / 2);
  ctx.shadowBlur = 0;

  // "Scroll to top" if scrolled down
  if (helpScrollY > 100) {
    const tx2 = W - PAD - 110, ty2 = H - FOOTER_H + 9;
    ctx.fillStyle = 'rgba(35,25,65,0.6)';
    roundRect(tx2, ty2, 110, 32, 6); ctx.fill();
    ctx.strokeStyle = 'rgba(100,70,180,0.4)'; ctx.lineWidth = 1;
    roundRect(tx2, ty2, 110, 32, 6); ctx.stroke();
    ctx.font = '12px Arial, sans-serif';
    ctx.fillStyle = 'rgba(180,150,240,0.7)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▲ Back to top', tx2 + 55, ty2 + 16);
  }
}

function helpClick(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scale = getCanvasScale();
  const cx = (clientX - rect.left) / scale;
  const cy = (clientY - rect.top)  / scale;
  const HEADER_H = 54, FOOTER_H = 52;
  const bodyH = CANVAS_H - HEADER_H - FOOTER_H;
  const maxScroll = Math.max(0, helpContentHeight - bodyH);

  // Back button
  if (cy >= CANVAS_H - FOOTER_H + 9 && cy <= CANVAS_H - FOOTER_H + 41 && cx >= 18 && cx <= 118) {
    gameState = helpFromState; return;
  }
  // Scroll to top button
  if (helpScrollY > 100 && cy >= CANVAS_H - FOOTER_H + 9 && cy <= CANVAS_H - FOOTER_H + 41 && cx >= CANVAS_W - 128 && cx <= CANVAS_W - 18) {
    helpScrollY = 0; return;
  }
  // Tap lower half to scroll down
  if (cy > CANVAS_H / 2 + 60) {
    helpScrollY = Math.min(maxScroll, helpScrollY + 160);
  }
}

function helpScroll(delta) {
  const HEADER_H = 54, FOOTER_H = 52;
  const bodyH = CANVAS_H - HEADER_H - FOOTER_H;
  const maxScroll = Math.max(0, helpContentHeight - bodyH);
  helpScrollY = Math.max(0, Math.min(maxScroll, helpScrollY + delta));
}

// ================================================================
//  PAUSE MENU
// ================================================================
function pauseMenuClick(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scale = getCanvasScale();
  const cx = (clientX - rect.left) / scale;
  const cy = (clientY - rect.top)  / scale;
  for (const [key, z] of Object.entries(PAUSE_ZONES)) {
    if (cx >= z.x && cx <= z.x+z.w && cy >= z.y && cy <= z.y+z.h) {
      switch(key) {
        case 'resume':   gameState = prevGameState; break;
        case 'volDown':  sfxVolume = Math.max(0, +(sfxVolume - 0.1).toFixed(2)); savePauseSettings(); break;
        case 'volUp':    sfxVolume = Math.min(1, +(sfxVolume + 0.1).toFixed(2)); savePauseSettings(); SFX.buy(); break;
        case 'brightDown': brightness = Math.max(0.4, +(brightness - 0.1).toFixed(2)); savePauseSettings(); break;
        case 'brightUp':   brightness = Math.min(1.6, +(brightness + 0.1).toFixed(2)); savePauseSettings(); break;
        case 'controls': pauseShowControls = !pauseShowControls; break;
        case 'restart':  gameState = 'PLAYING'; initGame(); break;
        case 'mainmenu': gameState = 'START'; break;
        case 'help':     helpScrollY = 0; helpFromState = 'PAUSED'; gameState = 'HELP'; break;
      }
      break;
    }
  }
}

function drawPauseMenu(ts) {
  const W = CANVAS_W, H = CANVAS_H;

  // Semi-transparent dark stone overlay
  ctx.fillStyle = 'rgba(4,3,10,0.82)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  const PX = 30, PY = pauseShowControls ? 50 : 130, PW = W - 60;
  const PH = pauseShowControls ? H - 100 : H - 260;

  const panelGrd = ctx.createLinearGradient(PX, PY, PX, PY + PH);
  panelGrd.addColorStop(0, '#0e0b18'); panelGrd.addColorStop(1, '#08060e');
  ctx.fillStyle = panelGrd;
  roundRect(PX, PY, PW, PH, 12); ctx.fill();
  ctx.strokeStyle = 'rgba(120,90,200,0.45)'; ctx.lineWidth = 2;
  roundRect(PX, PY, PW, PH, 12); ctx.stroke();
  ctx.strokeStyle = 'rgba(200,170,255,0.1)'; ctx.lineWidth = 1;
  roundRect(PX+4, PY+4, PW-8, PH-8, 10); ctx.stroke();

  // Title
  const titlePulse = 0.85 + 0.15*Math.sin(ts*0.004);
  ctx.font = 'bold 28px Arial, sans-serif';
  ctx.fillStyle = `rgba(200,170,255,${titlePulse})`;
  ctx.shadowColor = 'rgba(160,100,255,0.7)'; ctx.shadowBlur = 18;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('⏸  PAUSED', W/2, PY + 38);
  ctx.shadowBlur = 0;

  // Divider
  ctx.strokeStyle = 'rgba(100,70,160,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PX+20, PY+60); ctx.lineTo(PX+PW-20, PY+60); ctx.stroke();

  // ── Helper: draw a stone button ──────────────────────────────────────────
  function stoneBtn(label, x, y, w, h, key, highlight=false) {
    PAUSE_ZONES[key] = {x, y, w, h};
    const hover = highlight;
    ctx.fillStyle = hover ? 'rgba(90,55,160,0.5)' : 'rgba(40,30,65,0.6)';
    roundRect(x, y, w, h, 6); ctx.fill();
    ctx.strokeStyle = hover ? 'rgba(180,120,255,0.8)' : 'rgba(100,70,170,0.45)';
    ctx.lineWidth = 1.5; roundRect(x, y, w, h, 6); ctx.stroke();
    ctx.font = `bold 14px Arial, sans-serif`;
    ctx.fillStyle = hover ? '#ddbbff' : '#b898e8';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(160,100,255,0.4)'; ctx.shadowBlur = 4;
    ctx.fillText(label, x + w/2, y + h/2);
    ctx.shadowBlur = 0;
  }

  // ── Helper: draw a row control with –/+ buttons ──────────────────────────
  function sliderRow(label, value, minV, maxV, yRow, keyDown, keyUp, fmt) {
    ctx.font = '14px Arial, sans-serif';
    ctx.fillStyle = 'rgba(200,185,230,0.85)';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(label, PX+18, yRow+14);

    // Track background
    const trackX = PX+140, trackW = PW-200, trackY = yRow+8, trackH = 12;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    roundRect(trackX, trackY, trackW, trackH, 4); ctx.fill();
    ctx.strokeStyle = 'rgba(80,60,130,0.5)'; ctx.lineWidth = 1;
    roundRect(trackX, trackY, trackW, trackH, 4); ctx.stroke();

    // Fill
    const frac = (value - minV) / (maxV - minV);
    if (frac > 0) {
      const fillGrd = ctx.createLinearGradient(trackX, 0, trackX + trackW, 0);
      fillGrd.addColorStop(0, 'rgba(100,60,200,0.8)'); fillGrd.addColorStop(1, 'rgba(180,120,255,0.9)');
      ctx.fillStyle = fillGrd;
      roundRect(trackX, trackY, trackW * frac, trackH, 4); ctx.fill();
    }
    // Thumb
    const thumbX = trackX + trackW * frac - 6;
    ctx.fillStyle = '#e0c8ff';
    ctx.beginPath(); ctx.arc(trackX + trackW * frac, trackY + trackH/2, 7, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(120,80,200,0.8)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(trackX + trackW * frac, trackY + trackH/2, 7, 0, Math.PI*2); ctx.stroke();

    // Value label
    ctx.font = 'bold 13px Arial, sans-serif';
    ctx.fillStyle = '#c8a8ff';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(fmt(value), PX + PW - 54, yRow+14);

    // - and + buttons
    stoneBtn('-', PX+PW-48, yRow+2, 22, 24, keyDown);
    stoneBtn('+', PX+PW-22, yRow+2, 22, 24, keyUp);
  }

  if (!pauseShowControls) {
    let ry = PY + 74;

    // Volume
    sliderRow('⚡ SFX Volume', sfxVolume, 0, 1, ry, 'volDown', 'volUp', v => Math.round(v*100)+'%');
    ry += 38;

    // Brightness
    sliderRow('☀ Brightness', brightness, 0.4, 1.6, ry, 'brightDown', 'brightUp', v => Math.round((v-1)*100)+'%');
    ry += 46;

    // Divider
    ctx.strokeStyle = 'rgba(80,55,130,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PX+20, ry); ctx.lineTo(PX+PW-20, ry); ctx.stroke();
    ry += 14;

    // Show Controls toggle
    stoneBtn(pauseShowControls ? '📖 Hide Controls' : '📖 Show Controls', PX+12, ry, PW-24, 34, 'controls');
    ry += 44;

    // Resume
    PAUSE_ZONES['resume'] = {x: PX+12, y: ry, w: PW-24, h: 40};
    const rpulse = 0.5+0.5*Math.sin(ts*0.005);
    ctx.fillStyle = `rgba(50,30,110,${0.4+rpulse*0.15})`;
    roundRect(PX+12, ry, PW-24, 40, 8); ctx.fill();
    ctx.strokeStyle = `rgba(160,100,255,${0.6+rpulse*0.3})`; ctx.lineWidth = 2;
    roundRect(PX+12, ry, PW-24, 40, 8); ctx.stroke();
    ctx.font = 'bold 18px Arial, sans-serif';
    ctx.fillStyle = '#ddbbff';
    ctx.shadowColor = 'rgba(180,120,255,0.6)'; ctx.shadowBlur = 10+rpulse*8;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▶  RESUME', W/2, ry+20);
    ctx.shadowBlur = 0;
    ry += 52;

    // Two-column bottom buttons
    const bw = (PW-28)/2;
    stoneBtn('🔄 Restart Run',      PX+12,         ry, bw, 34, 'restart');
    stoneBtn('🏠 Main Menu',        PX+14+bw+4,    ry, bw, 34, 'mainmenu');
    ry += 44;

    // Help button
    stoneBtn('❓ How to Play',      PX+12,         ry, PW-24, 30, 'help');

    // Hint
    ctx.font = 'italic 12px Arial, sans-serif';
    ctx.fillStyle = 'rgba(140,110,200,0.55)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('ESC or SPACE to resume', W/2, ry+4);

  } else {
    // Controls reference panel
    let ry = PY + 74;
    const controls = [
      ['Move / Dig',   '↑ ↓ ← → or WASD'],
      ['Pause',        'ESC'],
      ['Navigate menus','ESC / SPACE / ENTER'],
      ['Shop',         'S  (from main menu)'],
      ['Leaderboard',  'L  (from main menu)'],
      ['Wheel of Fate','W  (from main menu)'],
      ['Buy upgrade',  '1–6  (in shop)'],
      ['Dig through',  'Move into rock tile'],
      ['Explosive',    'Walk into 💣 to detonate'],
      ['Oil Flask',    'Walk into 🧪 to refill'],
    ];
    ctx.textBaseline = 'middle';
    for (const [action, key] of controls) {
      ctx.font = '13px Arial, sans-serif';
      ctx.fillStyle = 'rgba(190,170,230,0.9)';
      ctx.textAlign = 'left';
      ctx.fillText(action, PX+18, ry+8);
      ctx.font = 'bold 13px Arial, sans-serif';
      ctx.fillStyle = 'rgba(160,120,255,0.95)';
      ctx.textAlign = 'right';
      ctx.fillText(key, PX+PW-18, ry+8);
      // tiny separator
      ctx.strokeStyle = 'rgba(60,45,100,0.3)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(PX+16, ry+22); ctx.lineTo(PX+PW-16, ry+22); ctx.stroke();
      ry += 28;
    }

    ry += 8;
    stoneBtn('← Back', PX+12, ry, 100, 32, 'controls');
    stoneBtn('▶  Resume', PX+PW-112, ry, 100, 32, 'resume');
  }
}

function render(ts) {
  sparkleT++;
  if (gameState==='PLAYING') {
    if (ts - lastOilDrain >= 1000) {
      const voidMult = getActivePickaxe().ability === 'voidMastery' ? 0.75 : 1;
      lanternOil = Math.max(0, lanternOil - 0.5 * getOilDrainMult() * voidMult);
      lastOilDrain = ts;
    }
    updateTimedEffects(ts);

    // Death fade: once triggered, build alpha then switch state
    if (deathFading) {
      deathFadeAlpha = Math.min(1, deathFadeAlpha + 0.018);
      if (deathFadeAlpha >= 1) {
        deathFading = false; deathFadeAlpha = 1;
        gameState = wasNewRecord ? 'HIGHSCORE' : 'GAMEOVER';
      }
    } else if (lanternOil <= 0) {
      handleGameOverDeath();
    }

    // Heartbeat SFX when oil critically low (< 25%)
    if (!deathFading && lanternOil / maxOil < 0.25) {
      const bpm = lanternOil / maxOil < 0.1 ? 380 : 600; // faster when near-dead
      if (ts - lastHeartbeat > bpm) { SFX.heartbeat(); lastHeartbeat = ts; }
    }

    updateGhosts(ts); updateParticles(); updateFloats();
    if (milestoneTimer>0) milestoneTimer--; if (biomeTransTimer>0) biomeTransTimer--; if (activeEventTimer>0) activeEventTimer--; vigFlicker += 0.05;
  }

  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  const biome = getBiome(depth);
  const bg = ctx.createLinearGradient(0,0,0,CANVAS_H); bg.addColorStop(0, biome.bgTop); bg.addColorStop(1, biome.bgBot);
  ctx.fillStyle = bg; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  if (gameState==='START')       { drawStart(ts); requestAnimationFrame(render); return; }
  if (gameState==='SHOP')        { drawShop(ts);  requestAnimationFrame(render); return; }
  if (gameState==='LEADERBOARD') { drawLeaderboard(ts); requestAnimationFrame(render); return; }
  if (gameState==='WHEEL')       { updateWheel(); drawWheel(ts); requestAnimationFrame(render); return; }
  if (gameState==='ARMORY')      { drawArmory(ts); requestAnimationFrame(render); return; }
  if (gameState==='REGISTER')    { drawRegister(ts); requestAnimationFrame(render); return; }
  if (gameState==='NAME_ENTRY')  { drawRegister(ts); requestAnimationFrame(render); return; } // fallback safety
  if (gameState==='HELP')        { drawHelp(ts); requestAnimationFrame(render); return; }
  if (gameState==='PAUSED') {
    // Draw frozen game world (re-use drawing code without updates)
    // Fall through to draw the world, then overlay pause menu
  }

  updateDust();
  ctx.fillStyle = biome.ambientLightColor; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  let shaking = false;
  if (shakeTimer>0) { ctx.save(); ctx.translate((Math.random()*6)-3, (Math.random()*6)-3); shakeTimer--; shaking = true; }

  buildBlockCache(biome);
  for (let y=0; y<ROWS; y++) {
    for (let x=0; x<COLS; x++) {
      const cell = grid[y][x];
      const type = cell.type;
      if (type===TILE_EMPTY) continue;
      const px=x*TILE_SIZE, py=y*TILE_SIZE;
      if (type===TILE_BLOCK)     ctx.drawImage(blockCaches[biome.name], px, py);
      else if (type===TILE_HARD) {
        ctx.drawImage(hardCaches[biome.name], px, py);
        if (cell.hp < cell.maxHp) { ctx.fillStyle = `rgba(255,100,50,${0.2+0.15*Math.sin(sparkleT*0.2)})`; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE); }
      }
      else if (type===TILE_LAMP)      drawLamp(px, py);
      else if (type===TILE_SHARD)     drawGemSparkle(px, py);
      else if (type===TILE_EXPLOSIVE) drawExplosive(px, py);
      else if (type===TILE_TREASURE)  drawTreasure(px, py);
      else if (type===TILE_VCRYSTAL)  drawVoidCrystal(px, py);
      else if (type===TILE_FLASK)     drawFlask(px, py);
      else if (type===TILE_LAVA)      drawLava(px, py);
    }
  }

  // Player trail — tinted to active pickaxe color
  const activePick = getActivePickaxe();
  const pickTrailColor = activePick.color;
  for (const t of player.trail) {
    const tr = t.life * 20;
    const tg = ctx.createRadialGradient(t.x*TILE_SIZE+TILE_SIZE/2, t.y*TILE_SIZE+TILE_SIZE/2, 0, t.x*TILE_SIZE+TILE_SIZE/2, t.y*TILE_SIZE+TILE_SIZE/2, tr);
    tg.addColorStop(0, `${activePick.glow}${t.life*0.22})`); tg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=tg; ctx.beginPath(); ctx.arc(t.x*TILE_SIZE+TILE_SIZE/2, t.y*TILE_SIZE+TILE_SIZE/2, tr, 0, Math.PI*2); ctx.fill();
    t.life -= 0.2;
  }
  player.trail = player.trail.filter(t=>t.life>0);

  // Draw chain lightning arc visuals
  if (lightningArcs.length > 0) {
    lightningArcs.forEach(arc => {
      arc.life -= 0.06;
      if (arc.life <= 0) return;
      ctx.save();
      ctx.globalAlpha = arc.life;
      ctx.strokeStyle = '#ffee44';
      ctx.shadowColor = '#ffee44';
      ctx.shadowBlur = 8;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(arc.x1*TILE_SIZE+TILE_SIZE/2, arc.y1*TILE_SIZE+TILE_SIZE/2);
      // Jagged zigzag bolt
      const steps = 5;
      for (let s=1; s<steps; s++) {
        const t2 = s/steps;
        const lx = (arc.x1 + (arc.x2-arc.x1)*t2)*TILE_SIZE+TILE_SIZE/2 + (Math.random()-0.5)*8;
        const ly = (arc.y1 + (arc.y2-arc.y1)*t2)*TILE_SIZE+TILE_SIZE/2 + (Math.random()-0.5)*8;
        ctx.lineTo(lx, ly);
      }
      ctx.lineTo(arc.x2*TILE_SIZE+TILE_SIZE/2, arc.y2*TILE_SIZE+TILE_SIZE/2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    });
    lightningArcs = lightningArcs.filter(a => a.life > 0);
  }

  // Player lantern corona — color tinted to active pickaxe
  const oilRatioP = lanternOil / maxOil;
  const px0 = player.x*TILE_SIZE+TILE_SIZE/2, py0 = player.y*TILE_SIZE+TILE_SIZE/2;
  const coronaR = 24 + 5*Math.sin(sparkleT*0.08);

  // Outer pickaxe-colored aura
  const auraGrd = ctx.createRadialGradient(px0,py0,6,px0,py0,coronaR*1.6);
  auraGrd.addColorStop(0, `${activePick.glow}${oilRatioP < 0.25 ? 0.22 : 0.14})`);
  auraGrd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=auraGrd; ctx.beginPath(); ctx.arc(px0,py0,coronaR*1.6,0,Math.PI*2); ctx.fill();

  // Inner oil flame glow
  const flameCol = oilRatioP < 0.25 ? `rgba(255,60,0,` : `rgba(255,160,40,`;
  const coronaGrd = ctx.createRadialGradient(px0,py0,4,px0,py0,coronaR);
  coronaGrd.addColorStop(0, flameCol+'0.30)'); coronaGrd.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=coronaGrd; ctx.beginPath(); ctx.arc(px0,py0,coronaR,0,Math.PI*2); ctx.fill();

  // Per-ability ambient effect
