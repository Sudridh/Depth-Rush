  drawPickaxeAura(ctx, px0, py0, activePick, sparkleT, oilRatioP);

  // Player sprite — custom pickaxe icon, bobbing + swinging
  const playerBob = Math.sin(sparkleT * 0.12) * 1.5;
  const playerSwing = Math.sin(sparkleT * 0.09) * 0.18;
  ctx.save();
  ctx.translate(px0, py0 + playerBob);
  ctx.rotate(playerSwing);
  ctx.shadowColor = oilRatioP < 0.25 ? 'rgba(255,40,0,0.9)' : activePick.color;
  ctx.shadowBlur = 14 + 6*Math.sin(sparkleT*0.08);
  drawPickaxeIcon(ctx, 0, 0, 28, activePick.id, sparkleT, 0.5+0.5*Math.sin(sparkleT*0.06));
  ctx.shadowBlur = 0;
  ctx.restore();

  for (const ghost of ghosts) {
    const isStunned = ts < ghost.stunnedUntil;
    const isStriking = ghost.striking && (ts - ghost.striking > 0);
    ctx.save();
    let gx = ghost.x*TILE_SIZE+TILE_SIZE/2;
    let gy = ghost.y*TILE_SIZE+TILE_SIZE/2;
    if (isStunned) {
      gx += (Math.random()*4-2); gy += (Math.random()*4-2);
      ctx.globalAlpha = 0.5; ctx.filter = 'grayscale(100%)';
    } else if (isStriking) {
      const strikeScale = 1 + ((ts - ghost.striking) / 600) * 0.5;
      ctx.translate(gx, gy); ctx.scale(strikeScale, strikeScale); ctx.translate(-gx, -gy);
      ctx.shadowColor = '#ff0000';
    } else {
      ctx.globalAlpha = 0.7 + 0.3*Math.sin(ghost.phase);
      ctx.shadowColor = getBiome(depth).accentColor;
    }
    const biomeG = getBiome(depth);
    const ghostEmoji = depth >= 110 ? '🕷' : depth >= 65 ? '💠' : depth >= 30 ? '🔥' : '👻';
    const ghostGlow = depth >= 110 ? '#cc44ff' : depth >= 65 ? '#44eeff' : depth >= 30 ? '#ff6622' : biomeG.accentColor;
    const gFloat = isStunned ? 0 : Math.sin(ghost.phase*0.7)*3;
    ctx.shadowBlur = 14; ctx.font = '26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor = isStunned ? '#888' : (isStriking ? '#ff0000' : ghostGlow);
    ctx.fillText(isStunned ? '😵' : (isStriking ? '👹' : ghostEmoji), gx, gy+gFloat);
    ctx.restore();
  }

  for (const p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size); } ctx.globalAlpha = 1;

  for (const f of floatingTexts) { ctx.globalAlpha = f.life; ctx.font = `bold 20px Arial, sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle = f.color; ctx.shadowColor = f.color; ctx.shadowBlur = 6; ctx.fillText(f.text, f.x, f.y); ctx.shadowBlur=0; } ctx.globalAlpha = 1;

  const oilRatio = lanternOil/maxOil;
  const vigR = (100 + (upgLight+runRadBonus)*20 + oilRatio*120) * (1 + 0.02*Math.sin(vigFlicker));
  const pxV = player.x*TILE_SIZE+TILE_SIZE/2, pyV = player.y*TILE_SIZE+TILE_SIZE/2;
  const vig = ctx.createRadialGradient(pxV,pyV,vigR*0.2,pxV,pyV,vigR*2.5);
  vig.addColorStop(0, `rgba(${biome.vigColor},0)`); vig.addColorStop(0.45,`rgba(${biome.vigColor},${0.25+(1-oilRatio)*0.35})`); vig.addColorStop(1, `rgba(${biome.vigColor},${0.88+(1-oilRatio)*0.1})`);
  ctx.fillStyle = vig; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  if (ghostWarningAlpha > 0.01) { ctx.fillStyle = `rgba(200,0,0,${ghostWarningAlpha})`; ctx.fillRect(0,0,CANVAS_W,CANVAS_H); }

  // Oil panic: red pulse overlay when critically low
  if (gameState==='PLAYING' && !deathFading) {
    const oilRatio = lanternOil / maxOil;
    if (oilRatio < 0.25) {
      const panicIntensity = (0.25 - oilRatio) / 0.25; // 0→1 as oil approaches 0
      const panicPulse = 0.5 + 0.5 * Math.sin(ts * 0.006 * (1 + panicIntensity * 3));
      ctx.fillStyle = `rgba(180,0,0,${panicIntensity * panicPulse * 0.22})`;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }
  }

  // Death fade to black
  if (deathFading && deathFadeAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${deathFadeAlpha})`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  if (shaking) ctx.restore();

  drawHUD(biome);

  if (milestoneTimer>0) { const a = Math.min(milestoneTimer/30, 1) * Math.min(1, milestoneTimer/10); ctx.globalAlpha = a; ctx.font = `italic 18px Arial, sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle = '#d8d0c0'; ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=8; ctx.fillText(milestoneMsg, CANVAS_W/2, CANVAS_H/2 - 30); ctx.shadowBlur=0; ctx.globalAlpha=1; }
  // Father's journal entry — anchored just above the oil bar, larger text, non-intrusive
  if (journalTimer > 0) {
    journalTimer--;
    // Fade in over first 40 frames, fade out over last 50
    const ja = Math.min(journalTimer / 50, 1) * Math.min(1, (340 - journalTimer) / 40 + 0.01);
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, ja));

    // Word-wrap at canvas width with generous margins
    ctx.font = 'italic 16px Georgia, serif';
    const maxW = CANVAS_W - 56;
    const words = journalMsg.split(' ');
    const lines = [];
    let line = '';
    for (const w of words) {
      const test = line ? line + ' ' + w : w;
      if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
      else line = test;
    }
    if (line) lines.push(line);

    const lineH = 22;
    const textBlockH = lines.length * lineH;
    const panelH = textBlockH + 44; // 18px header + gap + text + padding
    const panelY = CANVAS_H - 46 - panelH; // sits just above the oil bar area
    const panelX = 16;
    const panelW = CANVAS_W - 32;

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(panelX + 3, panelY + 4, panelW, panelH, 7); ctx.fill();

    // Aged paper body
    const paperGrd = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
    paperGrd.addColorStop(0, 'rgba(38,28,14,0.94)');
    paperGrd.addColorStop(1, 'rgba(26,18,8,0.96)');
    ctx.fillStyle = paperGrd;
    roundRect(panelX, panelY, panelW, panelH, 7); ctx.fill();

    // Border — aged ink
    ctx.strokeStyle = 'rgba(180,145,75,0.35)'; ctx.lineWidth = 1.5;
    roundRect(panelX, panelY, panelW, panelH, 7); ctx.stroke();
    // Inner rule
    ctx.strokeStyle = 'rgba(160,125,60,0.12)'; ctx.lineWidth = 1;
    roundRect(panelX + 4, panelY + 4, panelW - 8, panelH - 8, 5); ctx.stroke();

    // Torn top edge
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.moveTo(panelX, panelY);
    for (let x = panelX; x <= panelX + panelW; x += 7) {
      ctx.lineTo(x, panelY + Math.sin(x * 0.65) * 2.2 + Math.sin(x * 1.1 + 0.4) * 1.3);
    }
    ctx.lineTo(panelX + panelW, panelY); ctx.closePath(); ctx.fill();

    // Header label — small caps, sepia
    ctx.font = 'bold 12px Arial, sans-serif';
    ctx.fillStyle = 'rgba(210,170,90,0.65)';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('— HIS JOURNAL —', panelX + 14, panelY + 10);

    // Depth stamp on the right
    ctx.font = '11px Arial, sans-serif';
    ctx.fillStyle = 'rgba(180,145,70,0.45)';
    ctx.textAlign = 'right';
    ctx.fillText(`${depth}m`, panelX + panelW - 14, panelY + 10);

    // Divider line under header
    ctx.strokeStyle = 'rgba(180,145,75,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(panelX + 14, panelY + 26);
    ctx.lineTo(panelX + panelW - 14, panelY + 26);
    ctx.stroke();

    // Body text
    ctx.font = 'italic 16px Georgia, serif';
    ctx.fillStyle = 'rgba(238,215,160,0.95)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 5;
    const textStartY = panelY + 32;
    lines.forEach((l, i) => ctx.fillText(l, CANVAS_W / 2, textStartY + i * lineH));
    ctx.shadowBlur = 0;

    ctx.restore();
  }
  if (biomeTransTimer>0) { const a = Math.min(1, biomeTransTimer/20) * Math.min(1,(biomeTransTimer)/10); ctx.globalAlpha = a; ctx.font = `bold 22px Arial, sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle = biome.accentColor; ctx.shadowColor=biome.accentColor; ctx.shadowBlur=15; ctx.fillText(biomeTransitionMsg, CANVAS_W/2, 82); ctx.shadowBlur=0; ctx.globalAlpha=1; }

  if (gameState==='GAMEOVER') drawGameOver();
  if (gameState==='HIGHSCORE') drawHighScore(ts);
  if (gameState==='PAUSED') drawPauseMenu(ts);

  // Active challenge event banner — below HUD bar, clear of badges
  if (activeEventTimer > 0 && gameState === 'PLAYING') {
    const a = Math.min(activeEventTimer/30, 1) * Math.min(1, activeEventTimer/15);
    ctx.globalAlpha = a;
    ctx.font = 'bold 19px Arial, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff6633'; ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 14;
    ctx.fillText(activeEventMsg, CANVAS_W/2, 82);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }

  // Brightness overlay (applied globally during gameplay)
  if (brightness < 1) {
    ctx.fillStyle = `rgba(0,0,0,${(1-brightness)*0.7})`;
    ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  } else if (brightness > 1) {
    ctx.fillStyle = `rgba(255,230,180,${(brightness-1)*0.35})`;
    ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  }

  requestAnimationFrame(render);
}

function drawHUD(biome) {
  const HUD_H = 52; // solid top bar height

  // ── Top bar background ─────────────────────────────────────────────────────
  const barGrd = ctx.createLinearGradient(0, 0, 0, HUD_H);
  barGrd.addColorStop(0, 'rgba(8,6,16,0.97)');
  barGrd.addColorStop(1, 'rgba(4,3,10,0.92)');
  ctx.fillStyle = barGrd;
  ctx.fillRect(0, 0, CANVAS_W, HUD_H);
  // Bottom edge line
  ctx.strokeStyle = 'rgba(80,60,140,0.45)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, HUD_H); ctx.lineTo(CANVAS_W, HUD_H); ctx.stroke();

  ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;

  // ── LEFT: depth + biome name ───────────────────────────────────────────────
  const journalDepths = Object.keys(FATHER_JOURNAL).map(Number);
  const nextJournal = journalDepths.filter(d => d > depth).sort((a,b)=>a-b)[0];
  const closeHint = nextJournal && nextJournal - depth <= 5;

  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = 'bold 19px Arial, sans-serif';
  ctx.fillStyle = closeHint ? '#ffcc66' : '#e8e0d0';
  ctx.fillText(`⛏ ${depth}m${closeHint ? ' …' : ''}`, 10, 8);

  ctx.font = '12px Arial, sans-serif';
  ctx.fillStyle = biome.accentColor;
  ctx.globalAlpha = 0.85;
  ctx.fillText(biome.name, 12, 31);
  ctx.globalAlpha = 1;

  // ── RIGHT: shards + score + pause button ──────────────────────────────────
  // Pause button — fits inside the bar
  const pbx = CANVAS_W - 42, pby = 8, pbw = 34, pbh = 34;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(pbx, pby, pbw, pbh, 6); ctx.fill();
  ctx.strokeStyle = 'rgba(120,90,200,0.5)'; ctx.lineWidth = 1.5;
  roundRect(pbx, pby, pbw, pbh, 6); ctx.stroke();
  ctx.font = '17px Arial, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(200,180,255,0.85)';
  ctx.fillText('⏸', pbx + pbw / 2, pby + pbh / 2);

  // Shards
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.font = 'bold 18px Arial, sans-serif'; ctx.fillStyle = '#e8e0d0';
  ctx.fillText(`💎 ${shards}`, pbx - 8, 7);
  // Score
  ctx.font = '12px Arial, sans-serif'; ctx.fillStyle = 'rgba(200,200,190,0.7)';
  ctx.fillText(`SCORE ${totalScore}`, pbx - 8, 30);

  // ── CENTER: spirit warning (compact, inside bar) ───────────────────────────
  if (ghosts.length > 0 && ghostWarningAlpha > 0.05) {
    const a = Math.min(ghostWarningAlpha * 3, 0.95);
    ctx.globalAlpha = a;
    ctx.font = 'bold 13px Arial, sans-serif';
    ctx.fillStyle = '#ff5555';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const spiritLabel = ghosts.length > 1 ? `💀 ${ghosts.length} SPIRITS` : '💀 SPIRIT';
    ctx.fillText(spiritLabel, CANVAS_W / 2, 6);
    ctx.globalAlpha = 1;
  }

  // ── EFFECT BADGES (below the bar, compact pill row) ───────────────────────
  const oilMult = getOilDrainMult();
  const spdMult = getGhostSpeedMult();
  if (oilMult > 1 || spdMult > 1) {
    let bx = 8;
    const by = HUD_H + 5;
    const drawBadge = (label, color, borderColor) => {
      ctx.font = 'bold 11px Arial, sans-serif';
      const tw = ctx.measureText(label).width;
      const bw = tw + 12, bh = 18;
      ctx.fillStyle = `rgba(0,0,0,0.55)`;
      roundRect(bx, by, bw, bh, 4); ctx.fill();
      ctx.strokeStyle = borderColor; ctx.lineWidth = 1;
      roundRect(bx, by, bw, bh, 4); ctx.stroke();
      ctx.fillStyle = color;
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(label, bx + 6, by + bh / 2);
      bx += bw + 5;
    };
    if (oilMult > 1) drawBadge(`🔥 OIL ×${oilMult.toFixed(1)}`, '#ff8844', 'rgba(255,100,40,0.6)');
    if (spdMult > 1) drawBadge(`💨 SPD ×${spdMult.toFixed(1)}`, '#ff6677', 'rgba(255,60,80,0.6)');
  }

  ctx.shadowBlur = 0;

  // ── Ghost Sense directional arrow ─────────────────────────────────────────
  if ((upgSense >= 1 || runSenseFree) && ghosts.length > 0) {
    let nearest = null, nearDist = Infinity;
    for (const g of ghosts) {
      const d = Math.abs(g.x - player.x) + Math.abs(g.y - player.y);
      if (d < nearDist) { nearDist = d; nearest = g; }
    }
    if (nearest) {
      const adx = nearest.x - player.x, ady = nearest.y - player.y;
      const angle = Math.atan2(ady, adx);
      const px2 = player.x * TILE_SIZE + TILE_SIZE / 2;
      const py2 = player.y * TILE_SIZE + TILE_SIZE / 2;
      const ax = px2 + Math.cos(angle) * 26, ay = py2 + Math.sin(angle) * 26;
      ctx.save();
      ctx.translate(ax, ay); ctx.rotate(angle);
      const pulse2 = 0.6 + 0.4 * Math.sin(sparkleT * 0.15);
      ctx.globalAlpha = pulse2;
      ctx.fillStyle = nearDist <= 3 ? '#ff3333' : '#ffcc00';
      ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(-6, -5); ctx.lineTo(-6, 5); ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0; ctx.restore(); ctx.globalAlpha = 1;
    }
  }

  // ── LANTERN OIL BAR (bottom) ───────────────────────────────────────────────
  const oilRatio = lanternOil / maxOil;
  const isCritical = oilRatio < 0.25;
  const barW = 200, barH = 14, barX = (CANVAS_W - barW) / 2, barY = CANVAS_H - 36;
  const fillW = oilRatio * barW;

  ctx.fillStyle = 'rgba(0,0,0,0.55)'; roundRect(barX - 2, barY - 2, barW + 4, barH + 4, 4); ctx.fill();
  if (isCritical) {
    const critPulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.008);
    ctx.strokeStyle = `rgba(255,50,50,${0.5 + critPulse * 0.5})`; ctx.lineWidth = 2;
  } else {
    ctx.strokeStyle = 'rgba(100,100,120,0.5)'; ctx.lineWidth = 1;
  }
  roundRect(barX - 2, barY - 2, barW + 4, barH + 4, 4); ctx.stroke();

  const flicker = 0.82 + Math.random() * 0.18;
  const r = 255, g = Math.floor(oilRatio * 160), b = 0;
  ctx.globalAlpha = flicker;
  if (fillW > 0) {
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    roundRect(barX, barY, fillW, barH, 3); ctx.fill();
    ctx.shadowColor = `rgb(${r},${g},${b})`;
    ctx.shadowBlur = isCritical ? 14 : 8 * oilRatio;
    roundRect(barX, barY, fillW, barH, 3); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
  ctx.font = '13px Arial, sans-serif'; ctx.fillStyle = 'rgba(210,210,210,0.85)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('LANTERN OIL', CANVAS_W / 2, barY - 4);

  // Biome name — bottom left
  ctx.font = '13px Arial, sans-serif'; ctx.fillStyle = biome.accentColor;
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.globalAlpha = 0.85; ctx.fillText(biome.name, 10, CANVAS_H - 8); ctx.globalAlpha = 1;

  // Combo — bottom right
  if (comboCount >= 2 && (performance.now() - lastDigTime) < COMBO_WINDOW) {
    ctx.font = 'bold 17px Arial, sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillStyle = '#ffcc00'; ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 8;
    ctx.fillText(`🔥 COMBO ×${comboCount}`, CANVAS_W - 10, CANVAS_H - 45);
    ctx.shadowBlur = 0;
  }
}

function drawStart(ts) {
  const W = CANVAS_W, H = CANVAS_H;
  const flkr = 0.82 + 0.18*Math.sin(ts*0.011 + 0.4);
  const flkr2 = 0.78 + 0.22*Math.sin(ts*0.017);

  // ── 1. BACKGROUND: deep cave with visible stone walls ──────────────────────
  ctx.fillStyle = '#08080f'; ctx.fillRect(0,0,W,H);

  // Left rock wall — large organic shape
  ctx.save();
  ctx.beginPath(); ctx.moveTo(0,0);
  for (let y=0; y<=H; y+=20) {
    const wx = 55 + Math.sin(y*0.04+1.2)*22 + Math.sin(y*0.018+2.7)*18 + Math.sin(y*0.009)*12;
    ctx.lineTo(wx, y);
  }
  ctx.lineTo(0,H); ctx.closePath();
  const lwg = ctx.createLinearGradient(0,0,90,0);
  lwg.addColorStop(0,'#1a1620'); lwg.addColorStop(0.6,'#141218'); lwg.addColorStop(1,'rgba(12,10,16,0)');
  ctx.fillStyle=lwg; ctx.fill();
  // Wall grain texture
  ctx.globalAlpha=0.06;
  for(let i=0;i<18;i++){
    const gy=Math.random()*H, gx=Math.random()*65, gw=Math.random()*30+10;
    ctx.fillStyle=`rgba(200,180,150,1)`; ctx.fillRect(gx,gy,gw,1);
  }
  ctx.globalAlpha=1; ctx.restore();

  // Right rock wall
  ctx.save();
  ctx.beginPath(); ctx.moveTo(W,0);
  for (let y=0; y<=H; y+=20) {
    const wx = W - 55 - Math.sin(y*0.038+0.8)*24 - Math.sin(y*0.021+1.4)*16 - Math.sin(y*0.011+3.1)*10;
    ctx.lineTo(wx, y);
  }
  ctx.lineTo(W,H); ctx.closePath();
  const rwg = ctx.createLinearGradient(W,0,W-90,0);
  rwg.addColorStop(0,'#1a1620'); rwg.addColorStop(0.6,'#141218'); rwg.addColorStop(1,'rgba(12,10,16,0)');
  ctx.fillStyle=rwg; ctx.fill();
  ctx.globalAlpha=1; ctx.restore();

  // Cave ceiling — heavy stone mass at top, irregular bottom edge
  ctx.save();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(W,0);
  for (let x=W; x>=0; x-=12) {
    const cy = 62 + Math.sin(x*0.05+0.3)*22 + Math.sin(x*0.022+1.8)*14 + Math.sin(x*0.011)*8;
    ctx.lineTo(x, cy);
  }
  ctx.closePath();
  const ceilGrd = ctx.createLinearGradient(0,0,0,80);
  ceilGrd.addColorStop(0,'#1e1a26'); ceilGrd.addColorStop(1,'rgba(14,12,20,0)');
  ctx.fillStyle=ceilGrd; ctx.fill();
  ctx.globalAlpha=1; ctx.restore();

  // ── 2. STALACTITES — prominent, varied, with glowing tips ─────────────────
  const stalData = [
    {x:0.08, h:110, w:12, drip:true},  {x:0.19, h:68,  w:9,  drip:false},
    {x:0.31, h:88,  w:11, drip:true},  {x:0.44, h:52,  w:7,  drip:false},
    {x:0.56, h:76,  w:10, drip:false}, {x:0.68, h:95,  w:13, drip:true},
    {x:0.80, h:60,  w:8,  drip:false}, {x:0.92, h:82,  w:10, drip:true},
  ];
  stalData.forEach(({x,h,w,drip},i) => {
    const sx = x*W;
    // Stone gradient on stalagtite body
    const sg = ctx.createLinearGradient(sx-w,0,sx+w,0);
    sg.addColorStop(0,'#0e0c14'); sg.addColorStop(0.4,'#1c1820'); sg.addColorStop(1,'#0a0810');
    ctx.fillStyle=sg;
    ctx.beginPath();
    ctx.moveTo(sx-w, 0); ctx.lineTo(sx+w, 0);
    ctx.quadraticCurveTo(sx+w*0.6, h*0.7, sx+1.5, h);
    ctx.quadraticCurveTo(sx-w*0.6, h*0.7, sx-1.5, h);
    ctx.closePath(); ctx.fill();
    // Subtle highlight on left face
    ctx.strokeStyle='rgba(80,70,90,0.18)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(sx-w+2,0); ctx.quadraticCurveTo(sx-w*0.5+1,h*0.6,sx,h); ctx.stroke();
    if (drip) {
      // Water drip at tip
      const dy = ((ts*0.00025 + i*0.31)%1.0)*70;
      const da = Math.max(0, 1 - dy/70);
      ctx.fillStyle=`rgba(100,150,220,${0.35*da})`;
      ctx.beginPath(); ctx.ellipse(sx, h+dy, 1.5, 2.5+dy*0.06, 0, 0, Math.PI*2); ctx.fill();
    }
  });

  // ── 3. CAVE FLOOR — organic stone at bottom ────────────────────────────────
  ctx.save();
  ctx.beginPath(); ctx.moveTo(0,H);
  for (let x=0; x<=W; x+=14) {
    const fy = H - 38 - Math.sin(x*0.06+0.5)*18 - Math.sin(x*0.025+2.1)*12 - Math.abs(Math.sin(x*0.012))*8;
    ctx.lineTo(x, fy);
  }
  ctx.lineTo(W,H); ctx.closePath();
  const flrGrd = ctx.createLinearGradient(0,H-60,0,H);
  flrGrd.addColorStop(0,'rgba(20,17,26,0)'); flrGrd.addColorStop(0.3,'#161320'); flrGrd.addColorStop(1,'#0e0c18');
  ctx.fillStyle=flrGrd; ctx.fill();
  ctx.globalAlpha=1; ctx.restore();

  // Stalagmites from floor
  const stagData=[{x:0.05,h:55,w:7},{x:0.13,h:35,w:5},{x:0.78,h:42,w:6},{x:0.87,h:62,w:8},{x:0.96,h:28,w:4}];
  stagData.forEach(({x,h,w})=>{
    const sx=x*W, sby=H-38;
    const stg=ctx.createLinearGradient(sx-w,sby,sx+w,sby);
    stg.addColorStop(0,'#0c0a14'); stg.addColorStop(0.5,'#1a1622'); stg.addColorStop(1,'#090810');
    ctx.fillStyle=stg;
    ctx.beginPath();
    ctx.moveTo(sx-w,sby); ctx.lineTo(sx+w,sby);
    ctx.quadraticCurveTo(sx+w*0.5,sby-h*0.6,sx,sby-h);
    ctx.quadraticCurveTo(sx-w*0.5,sby-h*0.6,sx-w,sby);
    ctx.closePath(); ctx.fill();
  });

  // ── 4. AMBIENT DUST / MOTES ─────────────────────────────────────────────────
  for(let i=0;i<18;i++){
    const mx=(Math.sin(i*137.5+ts*0.00004)*0.5+0.5)*W;
    const my=80+((ts*0.000018*(0.4+i*0.08)+i*0.055)%1.0)*(H-100);
    const ma=0.06+0.05*Math.sin(ts*0.0008+i*1.3);
    ctx.fillStyle=`rgba(180,160,120,${ma})`; ctx.beginPath(); ctx.arc(mx,my,0.8+Math.sin(i)*0.4,0,Math.PI*2); ctx.fill();
  }

  // ── 5. LANTERN — hero element, larger, dramatic glow ──────────────────────
  const swingAngle = Math.sin(ts*0.0009)*0.16 + Math.sin(ts*0.0021)*0.04;
  const lnX = W/2, lnAnchorY = 0;
  ctx.save(); ctx.translate(lnX, lnAnchorY); ctx.rotate(swingAngle);

  // Long chain from ceiling
  ctx.strokeStyle='rgba(160,140,110,0.55)'; ctx.lineWidth=1.5;
  ctx.setLineDash([3,4]);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,68); ctx.stroke();
  ctx.setLineDash([]);

  // Large ambient glow — fills the upper cave
  const bigGlow = ctx.createRadialGradient(0,90,8,0,90,160);
  bigGlow.addColorStop(0,`rgba(255,180,60,${0.22*flkr})`);
  bigGlow.addColorStop(0.3,`rgba(255,100,20,${0.10*flkr})`);
  bigGlow.addColorStop(0.65,`rgba(200,60,0,${0.04*flkr2})`);
  bigGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bigGlow; ctx.beginPath(); ctx.arc(0,90,160,0,Math.PI*2); ctx.fill();

  // Inner warm core glow
  const innerGlow = ctx.createRadialGradient(0,90,0,0,90,55);
  innerGlow.addColorStop(0,`rgba(255,220,100,${0.7*flkr})`);
  innerGlow.addColorStop(0.4,`rgba(255,140,30,${0.35*flkr})`);
  innerGlow.addColorStop(1,'rgba(255,60,0,0)');
  ctx.fillStyle=innerGlow; ctx.beginPath(); ctx.arc(0,90,55,0,Math.PI*2); ctx.fill();

  // Lantern body — hand-drawn style box
  ctx.save(); ctx.translate(0,90);
  // Cage bars
  ctx.strokeStyle=`rgba(180,150,80,${0.8*flkr})`; ctx.lineWidth=1.5;
  ctx.strokeRect(-9,-13,18,26);
  ctx.beginPath(); ctx.moveTo(0,-13); ctx.lineTo(0,13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(9,0); ctx.stroke();
  // Flame inside
  ctx.font='18px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor=`rgba(255,200,60,${flkr})`; ctx.shadowBlur=14*flkr;
  ctx.fillText('🔥',0,0); ctx.shadowBlur=0;
  // Top hook
  ctx.strokeStyle='rgba(160,130,70,0.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-4,-13); ctx.lineTo(4,-13); ctx.lineTo(0,-19); ctx.stroke();
  ctx.restore();

  ctx.restore();

  // ── 6. TITLE ────────────────────────────────────────────────────────────────
  ctx.textAlign='center'; ctx.textBaseline='middle';

  // Etched background stone panel behind title
  const panelY = 198;
  const panelGrd = ctx.createLinearGradient(0,panelY,0,panelY+130);
  panelGrd.addColorStop(0,'rgba(22,18,28,0.0)');
  panelGrd.addColorStop(0.15,'rgba(22,18,28,0.65)');
  panelGrd.addColorStop(0.85,'rgba(22,18,28,0.65)');
  panelGrd.addColorStop(1,'rgba(22,18,28,0.0)');
  ctx.fillStyle=panelGrd; ctx.fillRect(0,panelY,W,130);

  // Thin gold rule lines above/below title
  const ruleAlpha = 0.3 + 0.1*Math.sin(ts*0.0006);
  ctx.strokeStyle=`rgba(200,160,70,${ruleAlpha})`; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(40,203); ctx.lineTo(W-40,203); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(40,323); ctx.lineTo(W-40,323); ctx.stroke();
  // Diamond ornaments on the rules
  [[40,203],[W-40,203],[40,323],[W-40,323]].forEach(([rx,ry])=>{
    ctx.fillStyle=`rgba(200,160,70,${ruleAlpha+0.1})`;
    ctx.beginPath(); ctx.moveTo(rx,ry-4); ctx.lineTo(rx+4,ry); ctx.lineTo(rx,ry+4); ctx.lineTo(rx-4,ry); ctx.closePath(); ctx.fill();
  });

  // Subtitle — small caps, spaced out
  ctx.font='bold 11px Arial, sans-serif'; ctx.fillStyle='rgba(190,160,90,0.65)';
  ctx.letterSpacing='4px';
  ctx.fillText('Y O U R   F A T H E R   W E N T   D O W N', W/2, 216);
  ctx.letterSpacing='0px';

  // Main title — two lines, large, with amber-to-warm gradient
  const tGrd1 = ctx.createLinearGradient(0,232,0,268);
  tGrd1.addColorStop(0,'#f0dfa8'); tGrd1.addColorStop(0.5,'#d4aa60'); tGrd1.addColorStop(1,'#a87830');
  ctx.font='bold 46px Arial, sans-serif'; ctx.fillStyle=tGrd1;
  ctx.shadowColor='rgba(220,150,40,0.3)'; ctx.shadowBlur=18;
  ctx.fillText('DEPTH', W/2, 250);

  const tGrd2 = ctx.createLinearGradient(0,272,0,314);
  tGrd2.addColorStop(0,'#f0dfa8'); tGrd2.addColorStop(0.5,'#d4aa60'); tGrd2.addColorStop(1,'#8a6428');
  ctx.font='bold 58px Arial, sans-serif'; ctx.fillStyle=tGrd2;
  ctx.shadowBlur=24;
  ctx.fillText('RUSH', W/2, 300); ctx.shadowBlur=0;

  // ── 7. FATHER'S TORN NOTE — the emotional hook ─────────────────────────────
  const noteY = 338;
  const noteH = 84;
  const noteX = 32;
  const noteW = W - 64;

  // Torn paper texture — slightly off-white, warm
  ctx.save();
  // Slight rotation for handwritten feel
  ctx.translate(W/2, noteY + noteH/2); ctx.rotate(-0.005);
  ctx.translate(-W/2, -(noteY + noteH/2));

  // Paper shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  roundRect(noteX+3, noteY+4, noteW, noteH, 3); ctx.fill();

  // Paper body
  const paperGrd = ctx.createLinearGradient(0,noteY,0,noteY+noteH);
  paperGrd.addColorStop(0,'rgba(52,44,30,0.88)');
  paperGrd.addColorStop(1,'rgba(38,32,20,0.88)');
  ctx.fillStyle=paperGrd; roundRect(noteX,noteY,noteW,noteH,3); ctx.fill();

  // Torn top edge — irregular
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.moveTo(noteX,noteY);
  for(let x=noteX; x<=noteX+noteW; x+=8){
    const tear = Math.sin(x*0.7)*2.5+Math.sin(x*1.3+0.4)*1.5;
    ctx.lineTo(x, noteY+tear);
  }
  ctx.lineTo(noteX+noteW, noteY); ctx.closePath(); ctx.fill();

  // Paper border — faded ink
  ctx.strokeStyle='rgba(160,130,70,0.3)'; ctx.lineWidth=1;
  roundRect(noteX,noteY,noteW,noteH,3); ctx.stroke();

  // Handwritten text — italic, sepia
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.font='italic 12.5px Georgia, serif';
  ctx.fillStyle='rgba(230,205,150,0.55)';
  ctx.fillText('— His last letter home —', W/2, noteY+9);

  ctx.font='italic 15px Georgia, serif';
  ctx.fillStyle='rgba(240,220,170,0.88)';
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=3;
  ctx.fillText('"I\'ll be home by Sunday. The new seam is rich.', W/2, noteY+28);
  ctx.fillText('Don\'t worry. I know these tunnels."', W/2, noteY+47);
  ctx.shadowBlur=0;

  ctx.font='italic 12px Georgia, serif';
  ctx.fillStyle='rgba(200,170,100,0.45)';
  ctx.fillText('That was 47 days ago.', W/2, noteY+66);

  ctx.restore();

  // ── 8. PRESS TO PLAY — prominent bordered button box ──────────────────────
  const ctaBoxY = 438;
  const ctaBoxH = 46;
  const ctaBoxX = W/2 - 150;
  const ctaBoxW = 300;
  const ctaPulse = 0.6 + 0.4*Math.abs(Math.sin(ts*0.0022));

  // Outer glow
  const ctaGlow = ctx.createRadialGradient(W/2, ctaBoxY+ctaBoxH/2, 0, W/2, ctaBoxY+ctaBoxH/2, 130);
  ctaGlow.addColorStop(0, `rgba(200,140,40,${0.18*ctaPulse})`);
  ctaGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ctaGlow;
  ctx.beginPath(); ctx.arc(W/2, ctaBoxY+ctaBoxH/2, 130, 0, Math.PI*2); ctx.fill();

  // Button fill — dark stone
  const ctaBg = ctx.createLinearGradient(0, ctaBoxY, 0, ctaBoxY+ctaBoxH);
  ctaBg.addColorStop(0, `rgba(55,44,22,${0.85+0.1*ctaPulse})`);
  ctaBg.addColorStop(1, `rgba(28,22,10,${0.85+0.1*ctaPulse})`);
  ctx.fillStyle = ctaBg;
  roundRect(ctaBoxX, ctaBoxY, ctaBoxW, ctaBoxH, 8); ctx.fill();

  // Outer border — golden, pulsing
  ctx.strokeStyle = `rgba(210,170,65,${0.7*ctaPulse})`; ctx.lineWidth = 2;
  roundRect(ctaBoxX, ctaBoxY, ctaBoxW, ctaBoxH, 8); ctx.stroke();

  // Inner bevel
  ctx.strokeStyle = `rgba(255,220,100,${0.15*ctaPulse})`; ctx.lineWidth = 1;
  roundRect(ctaBoxX+3, ctaBoxY+3, ctaBoxW-6, ctaBoxH-6, 6); ctx.stroke();

  // Pickaxe decorations left & right
  ctx.globalAlpha = 0.7 * ctaPulse;
  ctx.font = '16px serif';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.fillText('⛏', ctaBoxX+22, ctaBoxY+ctaBoxH/2);
  ctx.fillText('⛏', ctaBoxX+ctaBoxW-22, ctaBoxY+ctaBoxH/2);
  ctx.globalAlpha = 1;

  // CTA text
  ctx.globalAlpha = ctaPulse;
  ctx.font = 'bold 16px Arial, sans-serif'; ctx.fillStyle = '#ede0b8';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(220,160,40,0.6)'; ctx.shadowBlur = 12*ctaPulse;
  ctx.fillText('PRESS SPACE TO DESCEND', W/2, ctaBoxY+ctaBoxH/2);
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;

  // ── 9. NAV BUTTONS — icon cards with emoji + label ────────────────────────
  const navY = 502;
  const navItems = [
    { key:'S', label:'SOUL\nFORGE', icon:'⚒', color:'rgba(200,140,40,', border:'rgba(180,130,40,' },
    { key:'L', label:'RECORDS', icon:'📜', color:'rgba(60,160,220,', border:'rgba(60,140,200,' },
    { key:'W', label:'WHEEL', icon:'🎡', color:'rgba(160,60,220,', border:'rgba(140,60,200,' },
    { key:'A', label:'ARMORY', icon:'⛏', color:'rgba(220,80,80,', border:'rgba(200,60,60,' },
    { key:'?', label:'HELP', icon:'?', color:'rgba(80,200,140,', border:'rgba(60,180,120,' },
  ];
  const navCount = navItems.length;
  const nwCard = 66;
  const nHCard = 64;
  const nGap = 7;
  const totalNavW = navCount * nwCard + (navCount-1)*nGap;
  const navStartX = (W - totalNavW) / 2;

  navItems.forEach(({key,label,icon,color,border},i)=>{
    const nx = navStartX + i*(nwCard+nGap);
    const isHelp = key === '?';

    // Card shadow
    ctx.fillStyle='rgba(0,0,0,0.35)';
    roundRect(nx+2, navY+3, nwCard, nHCard, 7); ctx.fill();

    // Card background
    const nbg = ctx.createLinearGradient(nx, navY, nx, navY+nHCard);
    nbg.addColorStop(0, `${color}0.22)`);
    nbg.addColorStop(1, `${color}0.08)`);
    ctx.fillStyle = nbg;
    roundRect(nx, navY, nwCard, nHCard, 7); ctx.fill();

    // Card border
    ctx.strokeStyle = `${border}0.55)`; ctx.lineWidth = 1.5;
    roundRect(nx, navY, nwCard, nHCard, 7); ctx.stroke();
    // Inner bevel
    ctx.strokeStyle = `${color}0.12)`; ctx.lineWidth = 1;
    roundRect(nx+2, navY+2, nwCard-4, nHCard-4, 5); ctx.stroke();

    // Icon circle
    const icX = nx + nwCard/2, icY = navY + 24;
    const icGrd = ctx.createRadialGradient(icX, icY, 0, icX, icY, 16);
    icGrd.addColorStop(0, `${color}0.35)`);
    icGrd.addColorStop(1, `${color}0.05)`);
    ctx.fillStyle = icGrd;
    ctx.beginPath(); ctx.arc(icX, icY, 16, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = `${border}0.4)`; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(icX, icY, 16, 0, Math.PI*2); ctx.stroke();

    // Icon
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const displayIcon = (key === 'A') ? getActivePickaxe().emoji : icon;
    if (isHelp) {
      ctx.font = 'bold 16px Arial, sans-serif';
      ctx.fillStyle = '#aaffd0';
      ctx.shadowColor = 'rgba(80,200,140,0.6)'; ctx.shadowBlur = 8;
      ctx.fillText('?', icX, icY); ctx.shadowBlur = 0;
    } else {
      ctx.font = '17px serif';
      ctx.shadowBlur = 0;
      ctx.fillText(displayIcon, icX, icY);
    }

    // Keyboard shortcut badge — top-left corner
    ctx.fillStyle = `${color}0.85)`;
    roundRect(nx+5, navY+5, 16, 14, 3); ctx.fill();
    ctx.font = 'bold 9px Arial, sans-serif';
    ctx.fillStyle = key === '?' ? '#aaffd0' : '#0a0808';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(key, nx+13, navY+12);

    // Label below icon
    const lines = label.split('\n');
    ctx.font = 'bold 9px Arial, sans-serif';
    ctx.fillStyle = 'rgba(220,200,150,0.85)';
    if (lines.length === 2) {
      ctx.fillText(lines[0], nx+nwCard/2, navY+44);
      ctx.fillText(lines[1], nx+nwCard/2, navY+55);
    } else {
      ctx.fillText(lines[0], nx+nwCard/2, navY+50);
    }
  });

  // ── 10. RECORD + CONTROLS — minimal, bottom ────────────────────────────────
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='13px Arial, sans-serif';

  if (depthRecord > 0) {
    ctx.fillStyle='rgba(180,155,100,0.6)';
    ctx.fillText(`Deepest: ⛏ ${depthRecord}m`, W/2, 584);
  }
  ctx.fillStyle='rgba(130,120,100,0.4)';
  ctx.fillText('Arrow Keys · WASD · Swipe', W/2, depthRecord>0?600:590);

  // Run bonuses — small amber strip
  const bonuses = loadRunBonuses();
  if (bonuses.length > 0) {
    const bNames = bonuses.map(b => WHEEL_PRIZES.find(p=>p.type===b.type)?.emoji||'✨').join(' ');
    ctx.font='bold 13px Arial, sans-serif'; ctx.fillStyle='rgba(255,200,60,0.75)';
    ctx.shadowColor='rgba(255,180,0,0.3)'; ctx.shadowBlur=6;
    ctx.fillText(`🎡 ${bNames}  ready for next run`, W/2, depthRecord>0?620:608);
    ctx.shadowBlur=0;
  }
}

function drawShopItem(label, sublabel, cost, owned, maxed, canAfford, yTop) {
  const yMid = yTop + 27;
  // Stone slab background
  const itemGrd = ctx.createLinearGradient(20, yTop, 20, yTop+54);
  if(maxed || owned){
    itemGrd.addColorStop(0,'rgba(30,80,30,0.22)'); itemGrd.addColorStop(1,'rgba(20,55,20,0.14)');
  } else if(canAfford){
    itemGrd.addColorStop(0,'rgba(50,40,25,0.18)'); itemGrd.addColorStop(1,'rgba(30,25,15,0.1)');
  } else {
    itemGrd.addColorStop(0,'rgba(25,22,18,0.12)'); itemGrd.addColorStop(1,'rgba(15,13,10,0.08)');
  }
  ctx.fillStyle = itemGrd;
  ctx.strokeStyle = maxed||owned ? 'rgba(60,180,60,0.4)' : (canAfford ? 'rgba(180,140,60,0.3)' : 'rgba(70,65,55,0.2)');
  ctx.lineWidth = 1.5;
  roundRect(18, yTop, CANVAS_W-36, 54, 4); ctx.fill();
  roundRect(18, yTop, CANVAS_W-36, 54, 4); ctx.stroke();
  // Inner bevel
  ctx.strokeStyle = maxed||owned ? 'rgba(30,100,30,0.15)' : 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1; roundRect(22, yTop+3, CANVAS_W-44, 48, 3); ctx.stroke();

  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.font='bold 18px Arial, sans-serif';
  ctx.fillStyle = (maxed||owned) ? '#55ee66' : (canAfford ? '#e8d8b0' : '#706860');
  ctx.shadowColor = (maxed||owned) ? 'rgba(50,220,60,0.25)' : 'transparent'; ctx.shadowBlur = (maxed||owned)?4:0;
  ctx.fillText(label, 32, yMid - 8); ctx.shadowBlur=0;

  ctx.font='14px Arial, sans-serif';
  ctx.fillStyle = (maxed||owned) ? 'rgba(100,210,110,0.9)' : (canAfford ? 'rgba(200,185,155,0.9)' : 'rgba(130,120,105,0.8)');
  ctx.fillText(sublabel, 32, yMid + 11);

  ctx.textAlign='right';
  if (maxed || owned) {
    ctx.font='bold 18px Arial, sans-serif'; ctx.fillStyle='#55ee66';
    ctx.fillText('✔ ' + (maxed ? 'MAX' : 'OWNED'), CANVAS_W-28, yMid);
  } else {
    ctx.font='bold 18px Arial, sans-serif';
    ctx.fillStyle = canAfford ? '#ffdd55' : '#555548';
    ctx.fillText(`💎 ${cost}`, CANVAS_W-28, yMid);
  }
}

function drawShop(ts) {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  // Deep stone background
  const sbg = ctx.createLinearGradient(0,0,0,CANVAS_H);
  sbg.addColorStop(0,'#080810'); sbg.addColorStop(1,'#030308');
  ctx.fillStyle=sbg; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Forge glow from below
  const forgeGlow = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H, 20, CANVAS_W/2, CANVAS_H, 250);
  forgeGlow.addColorStop(0,'rgba(255,80,0,0.12)'); forgeGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=forgeGlow; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  // Ember sparks drifting up
  for(let i=0;i<6;i++){
    const ex=(Math.sin(i*137+ts*0.0006)*0.5+0.5)*CANVAS_W;
    const ey=CANVAS_H-(((ts*0.00015*(0.5+i*0.18)+i*0.15)%1))*CANVAS_H*0.8;
    const ea=0.2+0.2*Math.sin(ts*0.003+i);
    ctx.fillStyle=`rgba(255,${100+i*20},0,${ea})`; ctx.beginPath(); ctx.arc(ex,ey,1+Math.random(),0,Math.PI*2); ctx.fill();
  }

  // Header — stone tablet style
  ctx.textAlign='center'; ctx.textBaseline='middle';
  // Stone banner
  ctx.fillStyle='rgba(30,24,18,0.85)'; roundRect(20,18,CANVAS_W-40,54,4); ctx.fill();
  ctx.strokeStyle='rgba(180,130,60,0.35)'; ctx.lineWidth=1.5; roundRect(20,18,CANVAS_W-40,54,4); ctx.stroke();
  // Chisel marks on banner edges
  for(let i=0;i<8;i++){ const mx=30+i*44; ctx.strokeStyle='rgba(100,80,50,0.3)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(mx,20); ctx.lineTo(mx+22,20); ctx.stroke(); }

  ctx.font='bold 36px Arial, sans-serif';
  const sfGrd = ctx.createLinearGradient(0,30,0,66);
  sfGrd.addColorStop(0,'#ffcc66'); sfGrd.addColorStop(1,'#cc7722');
  ctx.fillStyle=sfGrd; ctx.shadowColor='rgba(255,140,40,0.45)'; ctx.shadowBlur=16;
  ctx.fillText('⚒  SOUL FORGE  ⚒', CANVAS_W/2, 45); ctx.shadowBlur=0;

  // Shard count
  ctx.font='17px Arial, sans-serif'; ctx.fillStyle='#d8c8a0';
  ctx.fillText(`Banked Shards: 💎 ${savedShards}`, CANVAS_W/2, 90);
  ctx.font='14px Arial, sans-serif'; ctx.fillStyle='rgba(170,155,125,0.8)';
  ctx.fillText('Tap an item or press [1]–[6]', CANVAS_W/2, 108);

  const cOil    = 50  * (upgOil   + 1);
  const pickNextCost = upgPick >= MAX_PICK ? 0 : [250, 450][upgPick];
  const cLight  = upgLight  < MAX_LIGHT  ? 75  * (upgLight  + 1) : 0;
  const cWard   = upgWard   < MAX_WARD   ? 100 * (upgWard   + 1) : 0;
  const cGreed  = upgGreed  < MAX_GREED  ? 80  * (upgGreed  + 1) : 0;
  const cSense  = upgSense  < MAX_SENSE  ? 120 : 0;

  const pickMaxed  = upgPick  >= MAX_PICK;
  const lightMaxed = upgLight >= MAX_LIGHT;
  const wardMaxed  = upgWard  >= MAX_WARD;
  const greedMaxed = upgGreed >= MAX_GREED;
  const senseOwned = upgSense >= MAX_SENSE;

  const pickLabels = ['[2] Void Pickaxe  (Not owned)', '[2] Void Pickaxe  (Tier 1/2)', '[2] Void Pickaxe  (Tier 2/2 MAX)'];
  const pickSubs   = [
    `One-hit reinforced stone  ·  Next: 💎 250`,
    `Shockwave: cracks adjacent stone on hard break  ·  Next: 💎 450`,
    'One-hit hard + Shockwave  ·  Fully upgraded!',
  ];

  drawShopItem(`[1] Lantern Oil  (Lvl ${upgOil})`, `+25 max oil per level  ·  No cap  ·  Next: 💎 ${cOil}`, cOil, false, false, savedShards >= cOil, 122);
  drawShopItem(pickLabels[upgPick], pickSubs[upgPick], pickNextCost, false, pickMaxed, !pickMaxed && savedShards >= pickNextCost, 178);
  drawShopItem(`[3] Radiance  (Lvl ${upgLight} / ${MAX_LIGHT})`, lightMaxed ? 'Light radius fully upgraded!' : `+20 light radius per level  ·  Next: 💎 ${cLight}`, cLight, false, lightMaxed, !lightMaxed && savedShards >= cLight, 234);
  drawShopItem(`[4] Spirit Ward  (Lvl ${upgWard} / ${MAX_WARD})`, wardMaxed ? 'Ghost drains only 10 oil  ·  Max reached!' : `Ghost hits -5 oil per level  ·  Now: ${25 - upgWard*5} oil  ·  Next: 💎 ${cWard}`, cWard, false, wardMaxed, !wardMaxed && savedShards >= cWard, 290);
  drawShopItem(`[5] Greedy Grasp  (Lvl ${upgGreed} / ${MAX_GREED})`, greedMaxed ? `+${upgGreed} bonus shard per gem  ·  Max reached!` : `+1 shard per gem per level  ·  Now: +${upgGreed}  ·  Next: 💎 ${cGreed}`, cGreed, false, greedMaxed, !greedMaxed && savedShards >= cGreed, 346);
  drawShopItem(`[6] Ghost Sense`, senseOwned ? 'Directional arrow to nearest spirit  ·  Active!' : `See nearest spirit direction at all times  ·  Cost: 💎 120`, cSense, senseOwned, false, !senseOwned && savedShards >= 120, 402);

  if (shopFeedbackTimer > 0) {
    shopFeedbackTimer--;
    const a = Math.min(shopFeedbackTimer / 20, 1);
    ctx.globalAlpha = a;
    ctx.font='bold 17px Arial, sans-serif';
    ctx.fillStyle = shopFeedback.startsWith('✅') ? '#44ff88' : '#ff6655';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10;
    ctx.fillText(shopFeedback, CANVAS_W/2, 466);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }

  ctx.globalAlpha = 0.5+0.4*Math.sin(ts*0.0025);
  ctx.font='17px Arial, sans-serif'; ctx.fillStyle='#c8b888';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⛏  SPACE or ESC to Return  ⛏', CANVAS_W/2, 490);
  ctx.globalAlpha=1;
}

let hsParticles = [];
function drawHighScore(ts) {
  // Gem rain particles
  if (Math.random() < 0.4) {
    hsParticles.push({ x: Math.random()*CANVAS_W, y:-10, vy: Math.random()*3+2, vx:(Math.random()-0.5)*1.5, emoji: Math.random()<0.7?'💎':'✨', life:1, size:16+Math.random()*10 });
  }
  for (let i=hsParticles.length-1;i>=0;i--) {
    const p=hsParticles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.008;
    if(p.y>CANVAS_H+20||p.life<=0){hsParticles.splice(i,1);continue;}
    ctx.globalAlpha=p.life; ctx.font=`${p.size}px serif`; ctx.textAlign='center'; ctx.fillText(p.emoji,p.x,p.y);
  }
  ctx.globalAlpha=1;

  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  // Gold shimmer title
  const pulse = 0.5+0.5*Math.sin(ts*0.004);
  ctx.font='48px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🏆', CANVAS_W/2, 160);

  const grad = ctx.createLinearGradient(0,200,CANVAS_W,220);
  grad.addColorStop(0,'#ffaa00'); grad.addColorStop(0.5,'#ffffaa'); grad.addColorStop(1,'#ffaa00');
  ctx.font='bold 34px Arial, sans-serif'; ctx.fillStyle=grad;
  ctx.shadowColor='rgba(255,200,0,0.8)'; ctx.shadowBlur=20+10*pulse;
  ctx.fillText('✨ NEW RECORD! ✨', CANVAS_W/2, 215); ctx.shadowBlur=0;

  if (playerName) {
    ctx.font = 'bold 14px Arial, sans-serif';
    ctx.fillStyle = 'rgba(255,220,100,0.6)';
    ctx.fillText(playerName, CANVAS_W/2, 240);
  }

  ctx.font='22px Arial, sans-serif'; ctx.fillStyle='#e8dcc8';
  ctx.fillText(`Depth: ${depth}m`, CANVAS_W/2, 268);
  const jKeysHS = Object.keys(FATHER_JOURNAL).map(Number).sort((a,b)=>a-b);
  const foundHS = jKeysHS.filter(d => d <= depth);
  if (foundHS.length > 0) {
    ctx.font='italic 14px Arial, sans-serif'; ctx.fillStyle='rgba(200,175,110,0.8)';
    ctx.fillText(`Found ${foundHS.length} of his journal pages`, CANVAS_W/2, 290);
  }
  ctx.font='21px Arial, sans-serif'; ctx.fillStyle='rgba(200,200,185,0.9)';
  ctx.fillText(prevDepthRecord > 0 ? `Previous best: ${prevDepthRecord}m` : 'First record!', CANVAS_W/2, 294);

  ctx.strokeStyle='rgba(255,200,60,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(60,316); ctx.lineTo(340,316); ctx.stroke();

  ctx.font='bold 28px Arial, sans-serif'; ctx.fillStyle='#44ffaa';
  ctx.shadowColor='rgba(50,255,150,0.6)'; ctx.shadowBlur=14;
  ctx.fillText(`+ 💎 ${highScoreReward} BONUS SHARDS`, CANVAS_W/2, 355); ctx.shadowBlur=0;
  ctx.font='21px Arial, sans-serif'; ctx.fillStyle='rgba(190,230,190,0.95)';
  ctx.fillText('Rewarded for breaking the record!', CANVAS_W/2, 382);

  ctx.strokeStyle='rgba(255,200,60,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(60,400); ctx.lineTo(340,400); ctx.stroke();

  ctx.font='17px Arial, sans-serif'; ctx.fillStyle='#d0c8b8';
  ctx.textBaseline='middle';
  ctx.fillText(`Score: ${totalScore}`, CANVAS_W/2, 428);
  ctx.fillText(`Shards collected: 💎 ${shards}`, CANVAS_W/2, 455);

  const p2 = 0.5+0.5*Math.sin(ts*0.003);
  ctx.globalAlpha = 0.55+p2*0.45;
  ctx.font='21px Arial, sans-serif'; ctx.fillStyle='#e8dcc8';
  ctx.fillText('Press SPACE to continue', CANVAS_W/2, 510);
  ctx.globalAlpha=1;
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  // Cracks radiating from center top — cave-in effect
  ctx.save();
  ctx.strokeStyle='rgba(100,80,60,0.35)'; ctx.lineWidth=1;
  const crackOrigin = {x: CANVAS_W/2, y: 200};
  const crackLines = [[0,0,60,120],[0,0,-50,110],[0,0,30,160],[0,0,-80,90],[0,0,90,80],[0,0,-100,60],[0,0,5,180]];
  ctx.translate(crackOrigin.x, crackOrigin.y);
  crackLines.forEach(([x1,y1,x2,y2])=>{ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); });
  ctx.restore();

  // Falling debris
  for(let i=0;i<5;i++){
    const dx=(Math.sin(i*117+Date.now()*0.0004)*0.5+0.5)*CANVAS_W;
    const dy=((Date.now()*0.00012*(0.4+i*0.15)+i*0.2)%1)*CANVAS_H;
    ctx.fillStyle=`rgba(120,100,80,${0.12+i*0.04})`; ctx.beginPath(); ctx.arc(dx,dy,2+i%3,0,Math.PI*2); ctx.fill();
  }

  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='50px serif'; ctx.fillText('🪨', CANVAS_W/2, 222);

  ctx.font='italic bold 44px Arial, sans-serif';
  const goGrd = ctx.createLinearGradient(0,268,0,308);
  goGrd.addColorStop(0,'#d07050'); goGrd.addColorStop(1,'#804030');
  ctx.fillStyle=goGrd; ctx.shadowColor='rgba(200,80,40,0.5)'; ctx.shadowBlur=16;
  ctx.fillText('The Light Faded', CANVAS_W/2, 288); ctx.shadowBlur=0;

  // Player name — small, under title
  if (playerName) {
    ctx.font = 'bold 13px Arial, sans-serif';
    ctx.fillStyle = 'rgba(200,165,100,0.55)';
    ctx.fillText(playerName, CANVAS_W/2, 312);
  }

  ctx.strokeStyle='rgba(160,100,60,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(60,320); ctx.lineTo(340,320); ctx.stroke();

  // How close did you get to father?
  const jKeys = Object.keys(FATHER_JOURNAL).map(Number).sort((a,b)=>a-b);
  const lastFound = jKeys.filter(d => d <= depth);
  const fatherProgress = lastFound.length > 0 ? `Found ${lastFound.length} of his journal pages` : "Found none of his trail";
  ctx.font='21px Arial, sans-serif'; ctx.fillStyle='#c8c0b0';
  ctx.fillText(`Depth Reached: ⛏ ${depth}m`, CANVAS_W/2, 352);
  ctx.fillText(`Soul Shards: 💎 ${shards}`, CANVAS_W/2, 378);
  ctx.fillText(`Score: ${totalScore}`, CANVAS_W/2, 404);
  const biome = getBiome(depth);
  ctx.font='17px Arial, sans-serif'; ctx.fillStyle=biome.accentColor;
  ctx.globalAlpha=1.0; ctx.fillText(`Perished in ${biome.name}`, CANVAS_W/2, 428); ctx.globalAlpha=1;
  // Father narrative line
  ctx.font='italic 15px Arial, sans-serif'; ctx.fillStyle='rgba(200,175,120,0.75)';
  ctx.fillText(fatherProgress, CANVAS_W/2, 448);

  ctx.strokeStyle='rgba(160,100,60,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(60,468); ctx.lineTo(340,468); ctx.stroke();

  // Tombstone epitaph flavor
  const epitaphs = ['He is still waiting.','You were so close.','The lantern goes dark. He remains.','Next time. Go deeper.','He heard your pick. He is sure of it.'];
  const eIdx = Math.floor((depth/17)) % epitaphs.length;
  ctx.font='italic 15px Arial, sans-serif'; ctx.fillStyle='rgba(160,145,120,0.6)';
  ctx.fillText(epitaphs[eIdx], CANVAS_W/2, 488);

  const pulse = 0.5+0.5*Math.sin(Date.now()/400);
  ctx.globalAlpha = 0.55+pulse*0.45; ctx.font='20px Arial, sans-serif'; ctx.fillStyle='#e8dcc8';
  ctx.fillText('Press SPACE to Return', CANVAS_W/2, 510); ctx.globalAlpha=1;
}

// ================================================================
//  REGISTER SCREEN (one-time first-launch name entry)
// ================================================================
function drawRegister(ts) {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Deep cave background
  const nebg = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  nebg.addColorStop(0, '#06040e'); nebg.addColorStop(1, '#020108');
  ctx.fillStyle = nebg; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Ambient dust motes
  for (let i = 0; i < 14; i++) {
    const mx = (Math.sin(i * 137.5 + ts * 0.00003) * 0.5 + 0.5) * CANVAS_W;
    const my = ((ts * 0.000014 * (0.4 + i * 0.09) + i * 0.07) % 1) * CANVAS_H;
    const ma = 0.05 + 0.04 * Math.sin(ts * 0.0007 + i * 1.5);
    ctx.fillStyle = `rgba(180,155,110,${ma})`; ctx.beginPath(); ctx.arc(mx, my, 0.8, 0, Math.PI*2); ctx.fill();
  }

  // Lantern glow from above
  const lgGrd = ctx.createRadialGradient(CANVAS_W/2, 0, 0, CANVAS_W/2, 0, 280);
  const flkr = 0.8 + 0.2 * Math.sin(ts * 0.011);
  lgGrd.addColorStop(0, `rgba(255,170,40,${0.13 * flkr})`);
  lgGrd.addColorStop(0.5, `rgba(200,80,0,${0.05 * flkr})`);
  lgGrd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = lgGrd; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // ── Lantern icon ──
  ctx.font = '38px serif';
  ctx.shadowColor = `rgba(255,180,40,${0.6 * flkr})`; ctx.shadowBlur = 22 * flkr;
  ctx.fillText('🔦', CANVAS_W/2, 92); ctx.shadowBlur = 0;

  // ── Heading ──
  ctx.font = 'bold 13px Arial, sans-serif';
  ctx.fillStyle = 'rgba(190,155,80,0.7)';
  ctx.letterSpacing = '3px';
  ctx.fillText('B E F O R E   Y O U   D E S C E N D', CANVAS_W/2, 138);
  ctx.letterSpacing = '0px';

  // Title rule lines
  ctx.strokeStyle = 'rgba(170,130,60,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30, 150); ctx.lineTo(CANVAS_W - 30, 150); ctx.stroke();

  // ── Stone panel ──
  const panelX = 22, panelY = 162, panelW = CANVAS_W - 44, panelH = 290;
  const panelGrd = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
  panelGrd.addColorStop(0, 'rgba(18,13,28,0.96)');
  panelGrd.addColorStop(1, 'rgba(10,8,18,0.98)');
  ctx.fillStyle = panelGrd; roundRect(panelX, panelY, panelW, panelH, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(130,90,200,0.35)'; ctx.lineWidth = 1.5;
  roundRect(panelX, panelY, panelW, panelH, 10); ctx.stroke();
  ctx.strokeStyle = 'rgba(200,160,255,0.06)'; ctx.lineWidth = 1;
  roundRect(panelX + 4, panelY + 4, panelW - 8, panelH - 8, 8); ctx.stroke();

  // Flavour copy
  ctx.font = 'italic 14px Georgia, serif';
  ctx.fillStyle = 'rgba(215,195,155,0.82)';
  ctx.fillText('Your name will be carved into the stone.', CANVAS_W/2, panelY + 34);
  ctx.fillStyle = 'rgba(175,155,120,0.6)';
  ctx.font = '13px Arial, sans-serif';
  ctx.fillText('Letters & numbers only  ·  Max 12 characters', CANVAS_W/2, panelY + 56);

  // ── Input label ──
  ctx.font = 'bold 12px Arial, sans-serif';
  ctx.fillStyle = 'rgba(160,120,255,0.75)';
  ctx.textAlign = 'left';
  ctx.fillText('YOUR MINER\'S NAME', panelX + 18, panelY + 82);

  // ── Input box ──
  const boxX = panelX + 14, boxY = panelY + 96, boxW = panelW - 28, boxH = 52;
  ctx.fillStyle = 'rgba(8,6,16,0.95)'; roundRect(boxX, boxY, boxW, boxH, 6); ctx.fill();
  const pulse = 0.5 + 0.5 * Math.sin(ts * 0.005);
  const hasInput = registerInput.length > 0;
  ctx.strokeStyle = hasInput
    ? `rgba(160,110,255,${0.55 + pulse * 0.4})`
    : `rgba(100,75,170,${0.4 + pulse * 0.3})`;
  ctx.lineWidth = 2; roundRect(boxX, boxY, boxW, boxH, 6); ctx.stroke();

  // Input text + blinking cursor
  ctx.font = 'bold 24px Arial, sans-serif';
  ctx.fillStyle = registerInput.length > 0 ? '#f0e8d0' : 'rgba(120,100,160,0.4)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const cursor = Math.floor(ts / 400) % 2 === 0 ? '|' : ' ';
  const displayText = registerInput.length > 0
    ? registerInput + cursor
    : 'TYPE YOUR NAME' + cursor;
  ctx.shadowColor = registerInput.length > 0 ? 'rgba(200,160,255,0.3)' : 'transparent';
  ctx.shadowBlur = 6;
  ctx.fillText(displayText, CANVAS_W/2, boxY + boxH/2);
  ctx.shadowBlur = 0;

  // Character counter
  ctx.font = '12px Arial, sans-serif';
  ctx.fillStyle = registerInput.length >= 10
    ? 'rgba(255,150,80,0.7)'
    : 'rgba(130,110,180,0.5)';
  ctx.textAlign = 'right';
  ctx.fillText(`${registerInput.length}/12`, boxX + boxW - 8, boxY + boxH + 14);

  // Alphanumeric hint (shows only if user has typed nothing yet or recently backspaced to 0)
  if (registerInput.length === 0) {
    ctx.font = 'italic 12px Arial, sans-serif';
    ctx.fillStyle = 'rgba(150,120,200,0.45)';
    ctx.textAlign = 'center';
    ctx.fillText('A–Z and 0–9 only', CANVAS_W/2, boxY + boxH + 14);
  }

  // ── Confirm button ──
  const btnY = panelY + 196;
  const btnActive = registerInput.length > 0;
  const btnPulse = btnActive ? (0.5 + 0.5 * Math.sin(ts * 0.004)) : 0;
  ctx.fillStyle = btnActive
    ? `rgba(70,40,140,${0.45 + btnPulse * 0.15})`
    : 'rgba(30,22,55,0.35)';
  roundRect(panelX + 14, btnY, panelW - 28, 48, 8); ctx.fill();
  ctx.strokeStyle = btnActive
    ? `rgba(160,110,255,${0.6 + btnPulse * 0.35})`
    : 'rgba(70,55,110,0.25)';
  ctx.lineWidth = 1.5;
  roundRect(panelX + 14, btnY, panelW - 28, 48, 8); ctx.stroke();

  ctx.font = 'bold 18px Arial, sans-serif';
  ctx.fillStyle = btnActive ? '#ddc8ff' : 'rgba(120,100,180,0.35)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = btnActive ? 'rgba(160,100,255,0.5)' : 'transparent';
  ctx.shadowBlur = btnActive ? 10 + btnPulse * 8 : 0;
  ctx.fillText('⛏  ENGRAVE NAME  [ENTER]', CANVAS_W/2, btnY + 24);
  ctx.shadowBlur = 0;

  // Subtext
  ctx.font = '12px Arial, sans-serif';
  ctx.fillStyle = 'rgba(130,110,170,0.45)';
  ctx.fillText('You\'ll keep this name across all your runs', CANVAS_W/2, panelY + panelH - 18);

  // ── Bottom note ──
  ctx.strokeStyle = 'rgba(130,90,200,0.2)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30, panelY + panelH + 12); ctx.lineTo(CANVAS_W - 30, panelY + panelH + 12); ctx.stroke();

  ctx.font = 'italic 12px Georgia, serif';
  ctx.fillStyle = 'rgba(170,145,95,0.5)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('"Every miner who enters leaves a mark."', CANVAS_W/2, panelY + panelH + 28);
}

// ================================================================
//  LEADERBOARD SCREEN
// ================================================================
function drawLeaderboard(ts) {
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  // Stone wall background
  const lbg = ctx.createLinearGradient(0,0,0,CANVAS_H);
  lbg.addColorStop(0,'#080810'); lbg.addColorStop(1,'#030308');
  ctx.fillStyle=lbg; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  // Rock texture grain
  for(let i=0;i<80;i++){
    const gx=(Math.sin(i*83.7)*0.5+0.5)*CANVAS_W, gy=(Math.cos(i*61.3)*0.5+0.5)*CANVAS_H;
    const ga=0.03+0.02*Math.sin(ts*0.0004+i);
    ctx.fillStyle=`rgba(120,100,80,${ga})`; ctx.beginPath(); ctx.arc(gx,gy,0.7,0,Math.PI*2); ctx.fill();
  }

  ctx.textAlign='center'; ctx.textBaseline='middle';
  // Trophy with glow
  ctx.font='32px serif';
  ctx.shadowColor='rgba(200,170,80,0.5)'; ctx.shadowBlur=12;
  ctx.fillText('🏆', CANVAS_W/2, 48); ctx.shadowBlur=0;

  const hg=ctx.createLinearGradient(0,66,CANVAS_W,82);
  hg.addColorStop(0,'#554466'); hg.addColorStop(0.5,'#bbbbdd'); hg.addColorStop(1,'#554466');
  ctx.font='bold 28px Arial, sans-serif'; ctx.fillStyle=hg;
  ctx.shadowColor='rgba(160,140,220,0.4)'; ctx.shadowBlur=12;
  ctx.fillText('HALL OF DEPTHS', CANVAS_W/2, 74); ctx.shadowBlur=0;

  // Stone divider with chisel marks
  ctx.strokeStyle='rgba(120,100,80,0.4)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(24,96); ctx.lineTo(376,96); ctx.stroke();
  for(let i=0;i<10;i++){ const mx=30+i*35; ctx.strokeStyle=`rgba(80,65,50,0.25)`; ctx.beginPath(); ctx.moveTo(mx,94); ctx.lineTo(mx+18,94); ctx.stroke(); }

  ctx.font='bold 11px Arial, sans-serif'; ctx.fillStyle='rgba(140,130,160,0.6)';
  ctx.textAlign='left'; ctx.fillText('RANK  NAME', 26, 112);
  ctx.textAlign='right'; ctx.fillText('DEPTH    SCORE    DATE', CANVAS_W-16, 112);
  ctx.strokeStyle='rgba(120,100,80,0.25)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(24,120); ctx.lineTo(376,120); ctx.stroke();

  const lb = loadLeaderboard();
  const rankEmoji  = ['🥇','🥈','🥉'];
  const rankColors = ['#ffd700','#c0c0c0','#cd7f32'];
  const rowH = 54, startY = 126;

  if (lb.length === 0) {
    ctx.font='italic 19px Arial, sans-serif'; ctx.fillStyle='rgba(160,150,130,0.65)'; ctx.textBaseline='middle'; ctx.textAlign='center';
    ctx.fillText('No miners recorded yet.', CANVAS_W/2, 290);
    ctx.font='15px Arial, sans-serif'; ctx.fillStyle='rgba(120,110,95,0.5)';
    ctx.fillText('Complete a descent to carve your name here.', CANVAS_W/2, 320);
  } else {
    lb.forEach((entry, i) => {
      const y = startY + i * rowH;
      if (y + rowH > 740) return;
      const isTop = i < 3;
      const colors3 = ['255,215,0','192,192,192','205,127,50'];
      ctx.fillStyle = isTop ? `rgba(${colors3[i]},0.06)` : (i%2===0?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.03)');
      roundRect(16,y+1,CANVAS_W-32,rowH-2,4); ctx.fill();
      if(isTop){ ctx.strokeStyle=`rgba(${colors3[i]},0.2)`; ctx.lineWidth=1; roundRect(16,y+1,CANVAS_W-32,rowH-2,4); ctx.stroke(); }

      ctx.font='20px serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(i<3?rankEmoji[i]:`${i+1}.`, 24, y+rowH/2);

      ctx.font=`bold 16px Arial, sans-serif`;
      ctx.fillStyle = isTop ? rankColors[i] : '#ccc8bc';
      ctx.shadowColor = isTop ? rankColors[i] : 'transparent'; ctx.shadowBlur = isTop?5:0;
      ctx.fillText(entry.name, 54, y+14); ctx.shadowBlur=0;
      ctx.font='11px Arial, sans-serif'; ctx.fillStyle='rgba(140,130,155,0.8)';
      ctx.fillText(`⛏ ${entry.biome}`, 54, y+32);

      ctx.textAlign='right'; ctx.font='bold 17px Arial, sans-serif';
      ctx.fillStyle = isTop ? rankColors[i] : '#b8b0a0';
      ctx.fillText(`${entry.depth}m`, CANVAS_W-118, y+14);
      ctx.font='11px Arial, sans-serif'; ctx.fillStyle='rgba(150,145,130,0.7)';
      ctx.fillText(`${entry.score}`, CANVAS_W-118, y+32);
      ctx.font='10px Arial, sans-serif'; ctx.fillStyle='rgba(110,105,90,0.55)';
      ctx.textAlign='right'; ctx.fillText(entry.date, CANVAS_W-16, y+rowH/2);
    });
  }

  const botY = Math.min(startY+lb.length*rowH+10, 748);
  ctx.strokeStyle='rgba(120,100,80,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(24,botY); ctx.lineTo(376,botY); ctx.stroke();
  ctx.globalAlpha=0.5+0.4*Math.sin(ts*0.0025);
  ctx.font='16px Arial, sans-serif'; ctx.fillStyle='#c0b898'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⛏  SPACE or tap to ascend  ⛏', CANVAS_W/2, botY+24);
  ctx.globalAlpha=1;
}

function drawWheel(ts) {
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  // Deep underground background
  const wbg = ctx.createLinearGradient(0,0,0,CANVAS_H);
  wbg.addColorStop(0,'#06040e'); wbg.addColorStop(0.5,'#04030a'); wbg.addColorStop(1,'#020206');
  ctx.fillStyle=wbg; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  // Underground starfield — bioluminescent cave motes
  for(let i=0;i<60;i++){
    const sx=(Math.sin(i*113.7)*0.5+0.5)*CANVAS_W, sy=(Math.cos(i*79.1)*0.5+0.5)*CANVAS_H;
    const a=0.04+0.04*Math.sin(ts*0.0007+i*0.9);
    const r=i%3===0?1.2:0.6;
    ctx.fillStyle=i%5===0?`rgba(100,220,180,${a})`:`rgba(180,140,255,${a})`;
    ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
  }

  // Stone ceiling texture at top
  ctx.fillStyle='rgba(14,12,18,0.92)';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(CANVAS_W,0);
  for(let x=CANVAS_W;x>=0;x-=12){
    const h=6+Math.sin(x*0.13)*4+Math.sin(x*0.27)*3;
    ctx.lineTo(x,h);
  }
  ctx.closePath(); ctx.fill();

  // Stalactites over wheel
  ctx.fillStyle='rgba(12,10,16,0.88)';
  for(let i=0;i<5;i++){
    const sx=60+(i)*(CANVAS_W-120)/4;
    const sh=18+Math.sin(i*1.9)*10;
    ctx.beginPath(); ctx.moveTo(sx-7,0); ctx.lineTo(sx+7,0); ctx.lineTo(sx+1.5,sh); ctx.lineTo(sx-1.5,sh); ctx.closePath(); ctx.fill();
  }

  // Title — ancient stone inscription style
  ctx.textAlign='center'; ctx.textBaseline='middle';
  // Stone tablet bg for title
  ctx.fillStyle='rgba(20,16,28,0.75)'; roundRect(18,16,CANVAS_W-36,48,4); ctx.fill();
  ctx.strokeStyle='rgba(140,100,200,0.3)'; ctx.lineWidth=1; roundRect(18,16,CANVAS_W-36,48,4); ctx.stroke();

  const wg=ctx.createLinearGradient(0,26,CANVAS_W,50);
  wg.addColorStop(0,'#8844cc'); wg.addColorStop(0.35,'#cc88ff'); wg.addColorStop(0.65,'#ffddff'); wg.addColorStop(1,'#8844cc');
  ctx.font='bold 28px Arial, sans-serif'; ctx.fillStyle=wg;
  ctx.shadowColor='rgba(160,80,255,0.6)'; ctx.shadowBlur=18;
  ctx.fillText('⛏  WHEEL OF FATE  ⛏', CANVAS_W/2, 40); ctx.shadowBlur=0;

  // Free/cost badge
  const free=hasFreeWheelSpin();
  ctx.font='bold 13px Arial, sans-serif';
  if(free){
    ctx.fillStyle='rgba(40,200,90,0.15)'; roundRect(110,68,180,22,4); ctx.fill();
    ctx.strokeStyle='rgba(40,200,90,0.45)'; ctx.lineWidth=1; roundRect(110,68,180,22,4); ctx.stroke();
    ctx.fillStyle='#55ee99'; ctx.fillText('✨ FREE SPIN AVAILABLE!', CANVAS_W/2, 79);
  } else {
    const aff=savedShards>=SPIN_COST;
    ctx.fillStyle=aff?'rgba(200,170,30,0.12)':'rgba(50,35,35,0.18)'; roundRect(112,68,176,22,4); ctx.fill();
    ctx.strokeStyle=aff?'rgba(200,170,30,0.4)':'rgba(90,50,50,0.35)'; ctx.lineWidth=1; roundRect(112,68,176,22,4); ctx.stroke();
    ctx.fillStyle=aff?'#ffdd55':'#886655';
    ctx.fillText(`Costs 💎 ${SPIN_COST}  ·  Bank: 💎 ${savedShards}`, CANVAS_W/2, 79);
  }

  // Active bonuses row
  const bonuses=loadRunBonuses();
  if(bonuses.length>0){
    ctx.font='12px Arial, sans-serif'; ctx.fillStyle='#cc9933'; ctx.textAlign='center';
    const bn=bonuses.map(b=>WHEEL_PRIZES.find(p=>p.type===b.type)?.emoji||'✨').join(' ');
    ctx.fillText(`Active for next descent: ${bn}`, CANVAS_W/2, 96);
  }

  // ── WHEEL ──
  const WX=CANVAS_W/2, WY=300, WR=175;
  const N=WHEEL_PRIZES.length, seg=(Math.PI*2)/N;

  // Stone altar ring behind the wheel
  const altarGrd = ctx.createRadialGradient(WX,WY,WR+6,WX,WY,WR+36);
  altarGrd.addColorStop(0,'rgba(40,28,60,0.6)'); altarGrd.addColorStop(0.5,'rgba(20,14,34,0.4)'); altarGrd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=altarGrd; ctx.beginPath(); ctx.arc(WX,WY,WR+36,0,Math.PI*2); ctx.fill();

  // Mystical glow pulse
  const gp=0.5+0.5*Math.sin(ts*0.002);
  const grd=ctx.createRadialGradient(WX,WY,WR-6,WX,WY,WR+22);
  grd.addColorStop(0,`rgba(130,60,220,${0.18+gp*0.14})`); grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(WX,WY,WR+22,0,Math.PI*2); ctx.fill();

  // Rune marks around outer ring
  ctx.save(); ctx.translate(WX,WY);
  const runeChars=['◈','◇','⋄','◆','◉','✦','⬡','✧'];
  for(let i=0;i<N;i++){
    const ra=i*seg-Math.PI/2+seg/2;
    const rx=Math.cos(ra)*(WR+18), ry=Math.sin(ra)*(WR+18);
    const ra2=0.3+0.25*Math.sin(ts*0.001+i*0.7);
    ctx.fillStyle=`rgba(180,120,255,${ra2})`; ctx.font='11px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(runeChars[i%runeChars.length], rx, ry);
  }
  ctx.restore();

  // Segments
  ctx.save(); ctx.translate(WX,WY); ctx.rotate(wheelAngle);
  for(let i=0;i<N;i++){
    const a1=i*seg-Math.PI/2, a2=a1+seg, p=WHEEL_PRIZES[i];
    const sg=ctx.createRadialGradient(0,0,WR*0.1,0,0,WR);
    sg.addColorStop(0,p.color); sg.addColorStop(1,p.darkColor);
    ctx.fillStyle=sg; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,WR,a1,a2); ctx.closePath(); ctx.fill();

    // Stone texture overlay on each segment
    ctx.fillStyle='rgba(0,0,0,0.08)'; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,WR,a1,a2); ctx.closePath(); ctx.fill();

    // Winning segment golden flash
    if(!wheelSpinning && wheelResultTimer>0 && i===wheelResult){
      const flash=0.4+0.35*Math.sin(ts*0.012);
      ctx.fillStyle=`rgba(255,220,60,${flash*0.25})`;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,WR,a1,a2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=`rgba(255,220,60,${flash*0.8})`; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,WR,a1,a2); ctx.closePath(); ctx.stroke();
    }

    // Divider lines with slight bevel look
    ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a1)*WR, Math.sin(a1)*WR); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a1)*WR, Math.sin(a1)*WR); ctx.stroke();

    ctx.save();
    const midA=a1+seg/2; ctx.rotate(midA);
    ctx.font='15px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.emoji, WR*0.50, 0);
    ctx.save();
    ctx.translate(WR*0.76, 0);
    ctx.rotate(Math.PI/2);
    ctx.font='bold 11px Arial, sans-serif'; ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=5;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.beginPath(); ctx.rect(-38, -10, 76, 20); ctx.clip();
    ctx.fillText(p.label, 0, 0);
    ctx.shadowBlur=0;
    ctx.restore();
    ctx.restore();
  }

  // Center stone cap — ancient seal
  const cap=ctx.createRadialGradient(0,0,0,0,0,22);
  cap.addColorStop(0,'#3a2255'); cap.addColorStop(0.6,'#1a0a28'); cap.addColorStop(1,'#0d0614');
  ctx.fillStyle=cap; ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.fill();
  // Seal ring
  ctx.strokeStyle='rgba(180,120,255,0.55)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(255,200,255,0.2)'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.stroke();
  // Seal rune
  ctx.font='14px serif'; ctx.fillStyle='rgba(200,150,255,0.7)'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✦', 0, 0);
  ctx.restore();

  // Tick marks at segment boundaries
  ctx.save(); ctx.translate(WX,WY);
  for(let i=0;i<N;i++){
    const a=i*seg-Math.PI/2;
    ctx.strokeStyle='rgba(200,160,255,0.5)'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*(WR-5), Math.sin(a)*(WR-5));
    ctx.lineTo(Math.cos(a)*(WR+9), Math.sin(a)*(WR+9));
    ctx.stroke();
  }
  ctx.restore();

  // Outer stone ring
  ctx.strokeStyle='rgba(80,60,110,0.5)'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.arc(WX,WY,WR+1,0,Math.PI*2); ctx.stroke();
  const ringPulse=0.5+0.5*Math.sin(ts*0.002);
  ctx.strokeStyle=`rgba(160,100,255,${0.3+ringPulse*0.22})`; ctx.lineWidth=2;
  ctx.shadowColor='rgba(140,80,255,0.35)'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(WX,WY,WR+3,0,Math.PI*2); ctx.stroke();
  ctx.shadowBlur=0;

  // Pointer — stone-carved tooth
  ctx.save(); ctx.translate(WX, WY-WR-3);
  const pGlow = ctx.createRadialGradient(0,0,0,0,6,30);
  pGlow.addColorStop(0,'rgba(220,180,255,0.3)'); pGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=pGlow; ctx.beginPath(); ctx.arc(0,8,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(200,160,255,0.2)';
  ctx.beginPath(); ctx.moveTo(0,22); ctx.lineTo(-18,-10); ctx.lineTo(18,-10); ctx.closePath(); ctx.fill();
  const pGrd = ctx.createLinearGradient(0,-8,0,22);
  pGrd.addColorStop(0,'#ccaaee'); pGrd.addColorStop(1,'#ffffff');
  ctx.fillStyle=pGrd;
  ctx.shadowColor='rgba(220,180,255,0.95)'; ctx.shadowBlur=18;
  ctx.beginPath(); ctx.moveTo(0,20); ctx.lineTo(-11,-6); ctx.lineTo(11,-6); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(180,130,255,0.7)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,20); ctx.lineTo(-11,-6); ctx.lineTo(11,-6); ctx.closePath(); ctx.stroke();
  ctx.shadowBlur=0; ctx.restore();

  // Burst particles
  if(wheelParticles.length>0){
    wheelParticles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.02;
      if(p.life>0){
        ctx.globalAlpha=p.life;
        ctx.fillStyle=p.color;
        ctx.shadowColor=p.color; ctx.shadowBlur=7;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
      }
    });
    wheelParticles=wheelParticles.filter(p=>p.life>0);
    ctx.globalAlpha=1;
  }

  // ── RESULT PANEL ──
  if(wheelResultTimer>0 && !wheelSpinning){
    const p=WHEEL_PRIZES[wheelResult];
    const fi=Math.min(wheelResultTimer/25,1);
    ctx.globalAlpha=fi;

    // Stone slab result panel
    ctx.fillStyle='rgba(8,6,14,0.95)';
    roundRect(18,492,364,168,10); ctx.fill();
    const isJack=p.type==='shards'&&p.value>=250;
    // Stone border — carved look
    ctx.strokeStyle=isJack?'rgba(255,200,0,0.7)':'rgba(120,220,120,0.4)'; ctx.lineWidth=2;
    roundRect(18,492,364,168,10); ctx.stroke();
    ctx.strokeStyle=isJack?'rgba(255,200,0,0.2)':'rgba(80,160,80,0.15)'; ctx.lineWidth=1;
    roundRect(22,496,356,160,8); ctx.stroke();

    if(isJack){
      const jg=ctx.createLinearGradient(0,510,CANVAS_W,524);
      jg.addColorStop(0,'#cc8800'); jg.addColorStop(0.5,'#ffffaa'); jg.addColorStop(1,'#cc8800');
      ctx.font='bold 22px Arial, sans-serif'; ctx.fillStyle=jg;
      ctx.shadowColor='rgba(255,200,0,0.9)'; ctx.shadowBlur=20+8*Math.sin(ts*0.008);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('⛏ THE LOST HOARD! ⛏', CANVAS_W/2, 516); ctx.shadowBlur=0;
    } else {
      ctx.font='bold 20px Arial, sans-serif';
      ctx.fillStyle='#aaff99';
      ctx.shadowColor='rgba(100,255,80,0.5)'; ctx.shadowBlur=10;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('THE DEPTHS PROVIDE', CANVAS_W/2, 516); ctx.shadowBlur=0;
    }

    ctx.font='26px serif'; ctx.fillText(p.emoji, CANVAS_W/2, 547);
    ctx.font='bold 18px Arial, sans-serif'; ctx.fillStyle='#d8ccb0';
    ctx.fillText(p.label, CANVAS_W/2, 573);

    const descs={
      shards:`+${p.value} Soul Shards recovered from the deep!`,
      oilBoost:`+${p.value} Max Lantern Oil — the flame burns longer!`,
      spiritBane:`The spirits recoil — stunned for ${p.value}s at run start!`,
      doubleGems:`Gemcutter's Eye active — all shards worth 2×!`,
      flaskCache:`A cache of 3 oil flasks hidden near the surface!`,
    };
    if(descs[p.type]){
      ctx.font='13px Arial, sans-serif'; ctx.fillStyle='rgba(175,195,165,0.75)';
      ctx.fillText(descs[p.type], CANVAS_W/2, 594);
    }
    ctx.globalAlpha=1;
    wheelResultTimer++;
  }

  // ── SPIN BUTTON ──
  if(!wheelSpinning){
    const canSpin=hasFreeWheelSpin()||savedShards>=SPIN_COST;
    const bpulse=0.5+0.5*Math.sin(ts*0.003);
    // Stone button with forge glow
    ctx.fillStyle=canSpin?`rgba(80,40,140,${0.22+bpulse*0.1})`:'rgba(40,40,50,0.18)';
    ctx.strokeStyle=canSpin?`rgba(140,80,240,${0.55+bpulse*0.4})`:'rgba(60,60,70,0.3)';
    ctx.lineWidth=2; roundRect(82,686,236,44,6); ctx.fill(); roundRect(82,686,236,44,6); ctx.stroke();
    // Inner bevel
    ctx.strokeStyle=canSpin?`rgba(200,150,255,${0.2+bpulse*0.15})`:'rgba(80,80,90,0.1)';
    ctx.lineWidth=1; roundRect(86,690,228,36,4); ctx.stroke();
    ctx.font='bold 18px Arial, sans-serif';
    ctx.fillStyle=canSpin?'#ddbbff':'#444';
    ctx.shadowColor=canSpin?'rgba(180,120,255,0.55)':'transparent'; ctx.shadowBlur=canSpin?10:0;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const lbl=wheelResultTimer>0?'⛏ Spin Again!':(free?'✨ FREE SPIN!': `⛏ Spin  💎 ${SPIN_COST}`);
    ctx.fillText(lbl, CANVAS_W/2, 708); ctx.shadowBlur=0;
  } else {
    ctx.font='italic 15px Arial, sans-serif'; ctx.fillStyle='rgba(180,140,255,0.6)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('The stones are deciding your fate…', CANVAS_W/2, 708);
  }

  // Floor stalactites at bottom (stalagmites)
  ctx.fillStyle='rgba(14,12,20,0.85)';
  ctx.beginPath(); ctx.moveTo(0,CANVAS_H);
  for(let x=0;x<=CANVAS_W;x+=16){
    const h=14+Math.sin(x*0.11)*8+Math.sin(x*0.23)*5;
    ctx.lineTo(x, CANVAS_H-h);
  }
  ctx.lineTo(CANVAS_W,CANVAS_H); ctx.closePath(); ctx.fill();

  // ESC hint
  if(!wheelSpinning){
    ctx.globalAlpha=0.4+0.3*Math.sin(ts*0.002);
    ctx.font='14px Arial, sans-serif'; ctx.fillStyle='#9080a8'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('ESC to return to the surface', CANVAS_W/2, 754);
    ctx.globalAlpha=1;
  }
}

// Per-ability ambient aura drawn around the player in-game
function drawPickaxeAura(ctx, px, py, pick, t, oilRatio) {
  const ability = pick.ability;
  if (ability === 'none') return;
  const pulse = 0.5 + 0.5*Math.sin(t*0.07);

  if (ability === 'oilRegen') {
    // Orange ember sparks drifting upward
    for (let i=0;i<3;i++){
      const a = t*0.04 + i*2.1;
      const sx = px + Math.cos(a)*10, sy = py - 14 - ((t*0.02+i*0.7)%1)*12;
      ctx.fillStyle=`rgba(255,${100+i*40},0,${0.5*pulse})`;
      ctx.beginPath(); ctx.arc(sx,sy,1.2,0,Math.PI*2); ctx.fill();
    }
  } else if (ability === 'gemPlus1') {
    // Cyan gem sparkles orbiting
    for (let i=0;i<4;i++){
      const a = t*0.05 + i*(Math.PI*0.5);
      const sx = px + Math.cos(a)*16, sy = py + Math.sin(a)*10;
      ctx.fillStyle=`rgba(68,238,255,${0.6*pulse})`;
      ctx.shadowColor='#44eeff'; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.arc(sx,sy,1.5,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
  } else if (ability === 'spiritShield') {
    // Steel-blue hexagonal shield shimmer
    ctx.strokeStyle=`rgba(170,187,204,${0.25+0.15*pulse})`;
    ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=i*(Math.PI/3)+t*0.01;
      const r=20+2*Math.sin(t*0.08+i);
      i===0?ctx.moveTo(px+Math.cos(a)*r, py+Math.sin(a)*r):ctx.lineTo(px+Math.cos(a)*r, py+Math.sin(a)*r);
    }
    ctx.closePath(); ctx.stroke();
  } else if (ability === 'phaseClip') {
    // Ghostly purple wisps
    for(let i=0;i<5;i++){
      const a=t*0.03+i*1.26, r=18+5*Math.sin(t*0.07+i);
      const sx=px+Math.cos(a)*r, sy=py+Math.sin(a)*r;
      ctx.fillStyle=`rgba(153,51,255,${(0.2+0.2*Math.sin(t*0.1+i))*pulse})`;
      ctx.beginPath(); ctx.arc(sx,sy,2,0,Math.PI*2); ctx.fill();
    }
  } else if (ability === 'midas') {
    // Gold coin glints
    for(let i=0;i<3;i++){
      const a=t*0.035+i*2.09, r=15;
      const sx=px+Math.cos(a)*r, sy=py+Math.sin(a)*r;
      const ga=0.4+0.5*Math.sin(t*0.12+i*1.5);
      ctx.fillStyle=`rgba(255,215,0,${ga})`;
      ctx.shadowColor='#ffd700'; ctx.shadowBlur=5;
      ctx.beginPath(); ctx.arc(sx,sy,2,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
  } else if (ability === 'deepFreeze') {
    // Icy frost ring expanding and contracting
    const fr=16+4*Math.sin(t*0.06);
    ctx.strokeStyle=`rgba(136,221,255,${0.35+0.15*pulse})`;
    ctx.lineWidth=1.5;
    ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.arc(px,py,fr,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // frost motes
    for(let i=0;i<4;i++){
      const a=t*0.025+i*1.57, r=fr+2;
      ctx.fillStyle=`rgba(200,245,255,${0.5*pulse})`;
      ctx.beginPath(); ctx.arc(px+Math.cos(a)*r, py+Math.sin(a)*r, 1.5, 0, Math.PI*2); ctx.fill();
    }
  } else if (ability === 'chainLightning') {
    // Electric arcs crackling off the pickaxe
    if (Math.random()<0.3){
      const a=Math.random()*Math.PI*2, r=12+Math.random()*8;
      ctx.strokeStyle=`rgba(255,238,68,${0.5+0.5*pulse})`;
      ctx.shadowColor='#ffee44'; ctx.shadowBlur=6;
      ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+Math.cos(a)*r, py+Math.sin(a)*r); ctx.stroke();
      ctx.shadowBlur=0;
    }
  } else if (ability === 'soulHarvest') {
    // Purple soul orbs orbiting slowly
    for(let i=0;i<3;i++){
      const a=t*0.022+i*2.09, r=18;
      const sx=px+Math.cos(a)*r, sy=py+Math.sin(a)*r;
      const opa=0.4+0.4*Math.sin(t*0.08+i*1.3);
      ctx.fillStyle=`rgba(204,68,255,${opa})`;
      ctx.shadowColor='#cc44ff'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(sx,sy,2.5,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      // trail
      ctx.fillStyle=`rgba(180,50,255,${opa*0.4})`;
      ctx.beginPath(); ctx.arc(sx-Math.cos(a)*4,sy-Math.sin(a)*4,1.5,0,Math.PI*2); ctx.fill();
    }
  } else if (ability === 'voidMastery') {
    // Cosmic outer ring with rotating nebula stars
    const vr=22+3*Math.sin(t*0.05);
    const vg=ctx.createRadialGradient(px,py,vr-3,px,py,vr+3);
    vg.addColorStop(0,`rgba(255,34,170,${0.25*pulse})`);
    vg.addColorStop(0.5,`rgba(100,0,200,${0.15*pulse})`);
    vg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=vg; ctx.beginPath(); ctx.arc(px,py,vr+3,0,Math.PI*2); ctx.fill();
    // Rotating stars
    for(let i=0;i<6;i++){
      const a=t*0.03+i*(Math.PI/3), r=vr;
      ctx.fillStyle=`rgba(255,180,255,${0.5+0.4*Math.sin(t*0.1+i)})`;
      ctx.shadowColor='#ff22aa'; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.arc(px+Math.cos(a)*r, py+Math.sin(a)*r, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
    // Spectral inner ring
    ctx.strokeStyle=`rgba(255,34,170,${0.3*pulse})`;
    ctx.lineWidth=1; ctx.beginPath(); ctx.arc(px,py,12,0,Math.PI*2); ctx.stroke();
  }
}

// ================================================================
//  PICKAXE ICON RENDERER — unique canvas-drawn texture per tier
//  cx,cy = center, s = size scalar (base ~32), idx = tier 0-9
//  ts = timestamp for animations, pulse = glow pulse (0 = none)
// ================================================================
function drawPickaxeIcon(ctx, cx, cy, s, idx, ts, pulse) {
  // ── Emoji-based pickaxes. All tiers use ⛏ as the base, with
  //    progressive colour tints, glows, particles and overlays.
  // ── A small off-screen canvas is used to tint the emoji cleanly.

  const fsz = Math.round(s * 1.55);          // emoji font size
  const pick = PICKAXES[idx] || PICKAXES[0]; // metadata for colour / glow

  // Helper: draw tinted ⛏ by rendering it into a temp canvas then
  // compositing a colour wash on top with source-in.
  function drawTintedPick(destCtx, tintColor, alpha) {
    const tmp = document.createElement('canvas');
    tmp.width = tmp.height = fsz * 2;
    const tx = tmp.getContext('2d');
    tx.font = `${fsz}px serif`;
    tx.textAlign = 'center'; tx.textBaseline = 'middle';
    tx.fillText('⛏', fsz, fsz);
    // Tint overlay
    tx.globalCompositeOperation = 'source-in';
    tx.fillStyle = tintColor;
    tx.globalAlpha = alpha;
    tx.fillRect(0, 0, fsz*2, fsz*2);
    destCtx.drawImage(tmp, -fsz, -fsz);
  }

  ctx.save();
  ctx.translate(cx, cy);

  // ── SHARED BASE: draw the raw ⛏ emoji first for all tiers ────────
  ctx.font = `${fsz}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  switch (idx) {

    // ── T0: RUSTED CLEFT — dull, chipped, slightly faded ───────────
    case 0: {
      ctx.globalAlpha = 0.78;
      ctx.fillText('⛏', 0, 0);
      // Brown-rust tint wash
      drawTintedPick(ctx, '#8B4513', 0.38);
      // Chip marks — dark scratches over the head area
      ctx.globalAlpha = 1;
      ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 1.1;
      ctx.beginPath(); ctx.moveTo(-s*0.18, -s*0.28); ctx.lineTo(-s*0.08, -s*0.18); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-s*0.28, -s*0.12); ctx.lineTo(-s*0.20, -s*0.05); ctx.stroke();
      // Rust speckle dots
      ctx.fillStyle = 'rgba(160,55,10,0.5)';
      [[-0.22,-0.20],[0.05,-0.08],[-0.10,-0.05]].forEach(([dx,dy]) => {
        ctx.beginPath(); ctx.arc(dx*s, dy*s, s*0.04, 0, Math.PI*2); ctx.fill();
      });
      break;
    }

    // ── T1: EMBER PICK — hot forge orange, living glow at tip ───────
    case 1: {
      const f = 0.7 + 0.3 * Math.sin(ts * 0.015);
      // Base emoji with orange tint
      ctx.globalAlpha = 1;
      ctx.fillText('⛏', 0, 0);
      drawTintedPick(ctx, '#ff5500', 0.55);
      // Tip glow — upper-left corner of the ⛏
      const gx = -s*0.35, gy = -s*0.35;
      const tg = ctx.createRadialGradient(gx, gy, 0, gx, gy, s*0.5);
      tg.addColorStop(0, `rgba(255,200,40,${0.80*f})`);
      tg.addColorStop(0.4, `rgba(255,80,0,${0.45*f})`);
      tg.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = tg; ctx.beginPath(); ctx.arc(gx, gy, s*0.5, 0, Math.PI*2); ctx.fill();
      // Tiny sparks orbiting tip
      for (let i = 0; i < 5; i++) {
        const a = ts*0.018 + i*1.257;
        const sx2 = gx + Math.cos(a)*s*0.22, sy2 = gy + Math.sin(a)*s*0.18;
        ctx.fillStyle = `rgba(255,${160+i*16},0,${0.9*f})`;
        ctx.beginPath(); ctx.arc(sx2, sy2, s*0.04, 0, Math.PI*2); ctx.fill();
      }
      // Animated heat cracks
      ctx.strokeStyle = `rgba(255,200,60,${0.65*f})`; ctx.lineWidth = 0.9;
